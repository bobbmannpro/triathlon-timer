                                          <div style={{ fontFamily: "'Bebas Neue',sans-serif", fontSize: 18, color: i === 0 ? "#ffd166" : i === 1 ? "#a0aec0" : i === 2 ? "#c47e2f" : "#3a6080", minWidth: 22 }}>{i + 1}</div>
                                          <div style={{ flex: 1, color: "#e8f4fb", fontWeight: 600, fontSize: 13 }}>{ath.name}</div>
                                          <div style={{ fontFamily: "monospace", color: "#f472b6", fontSize: 12, fontWeight: 700 }}>{ath.finishMs != null ? formatElapsed(ath.finishMs) : "--"}</div>
                                        </div>
                                      ))}
                                    </div>
                                  ))}
                                </div>
                              );
                            })()}
                            <div style={{ marginTop: 14, borderTop: "1px solid rgba(244,114,182,0.15)", paddingTop: 12 }}>
                              <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", color: "#5a86a8", marginBottom: 8 }}>Individual Certificates</div>
                              <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
                                {finishers.map(ath => (
                                  <button key={ath.id} onClick={() => printArchivedCert(resultsRace, ath)} style={{ ...btnStyle("#ffd166", true), padding: "4px 12px", fontSize: 11 }}>🏅 {ath.name}</button>
                                ))}
                              </div>
                            </div>
                          </div>
                        ) : (
                          <div style={{ background: "#0c2240", border: "1px solid rgba(244,114,182,0.2)", borderRadius: 8, padding: "20px", textAlign: "center", color: "#3a6080", fontSize: 13 }}>
                            No athletes with all 5 segments filled in. Make sure all times are in MM:SS format.
                          </div>
                        )}
                      </div>
                    )}
                  </div>
                );
              })()}

              {/* ── PAST RACES ── */}
              {view === "archive" && (
                <div style={{ paddingTop: 8 }}>
                  <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 3, textTransform: "uppercase", color: "#f4742b", marginBottom: 16 }}>📁 Past Races</div>
                  {savedArchive.length === 0 ? (
                    <div style={{ background: "#0a1e36", border: "1px solid rgba(244,116,43,0.2)", borderRadius: 8, padding: "28px 20px", textAlign: "center", color: "#3a6080", fontSize: 13 }}>
                      No past races yet — races are saved automatically when an athlete finishes.
                    </div>
                  ) : (
                    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                      {[...savedArchive].sort((a, b) => (b.savedAt || 0) - (a.savedAt || 0)).map(race => {
                        const isOpen = archiveOpenId === race.id;
                        const finishers = (race.athletes || []).filter(a => a.finished).sort((a, b) => (a.finishMs || Infinity) - (b.finishMs || Infinity));
                        const dnf = (race.athletes || []).filter(a => !a.finished);
                        const segs = race.segments || SEGMENTS;
                        return (
                          <div key={race.id} style={{ background: "#0c2240", borderRadius: 10, border: "1px solid rgba(244,116,43,0.2)", overflow: "hidden" }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "12px 14px" }}>
                              <div style={{ flex: 1, minWidth: 0 }}>
                                <div style={{ fontWeight: 700, fontSize: 15, color: "#e8f4fb" }}>{race.name}</div>
                                <div style={{ fontSize: 11, color: "#3a6080", marginTop: 2 }}>{race.date} · {race.finishedCount}/{race.totalCount} finished</div>
                              </div>
                              <button onClick={() => printArchivedCert(race, null)} style={{ ...btnStyle("#ffd166", true), padding: "4px 10px", fontSize: 11, flexShrink: 0 }}>🏆 Certs</button>
                              <button onClick={() => setArchiveOpenId(isOpen ? null : race.id)} style={{ background: "none", border: "none", color: "#5a86a8", fontSize: 18, cursor: "pointer", padding: "0 4px" }}>{isOpen ? "▲" : "▼"}</button>
                              {archiveDeleteConfirm === race.id ? (
                                <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                                  <span style={{ fontSize: 11, color: "#f87171" }}>Delete?</span>
                                  <button onClick={() => { const updated = savedArchive.filter(r => r.id !== race.id); setSavedArchive(updated); try { localStorage.setItem("tri-archive", JSON.stringify(updated)); } catch(e) { console.warn("Archive persist failed:", e); } if (currentUser) rtdb.ref("users/" + currentUser.uid + "/archive").set(updated).catch(console.error); setArchiveDeleteConfirm(null); }} style={{ ...btnStyle("#f87171"), padding: "3px 8px", fontSize: 11 }}>Yes</button>
                                  <button onClick={() => setArchiveDeleteConfirm(null)} style={{ ...btnStyle("#5a86a8", true), padding: "3px 8px", fontSize: 11 }}>No</button>
                                </div>
                              ) : (
                                <button onClick={() => setArchiveDeleteConfirm(race.id)} style={{ background: "none", border: "none", color: "#3a6080", fontSize: 18, cursor: "pointer", padding: "0 2px" }}>&times;</button>
                              )}
                            </div>
                            {isOpen && (
                              <div style={{ borderTop: "1px solid rgba(255,255,255,0.06)", padding: "10px 14px" }}>
                                {finishers.map((ath, rank) => {
                                  const athOpen = archiveOpenAthId === `${race.id}-${ath.id}`;
                                  const medals = ["🥇","🥈","🥉"];
                                  return (
                                    <div key={ath.id} style={{ marginBottom: 8 }}>
                                      <div style={{ display: "flex", alignItems: "center", gap: 8, padding: "7px 0", borderBottom: "1px solid rgba(255,255,255,0.04)", cursor: "pointer" }} onClick={() => setArchiveOpenAthId(athOpen ? null : `${race.id}-${ath.id}`)}>
                                        <div style={{ fontSize: 14 }}>{rank < 3 ? medals[rank] : `${rank + 1}.`}</div>
                                        <div style={{ flex: 1, fontSize: 13, color: "#e8f4fb", fontWeight: 600 }}>{ath.name}</div>
                                        <div style={{ fontFamily: "'Bebas Neue'", fontSize: 18, color: "#4ade80", letterSpacing: 2 }}>{ath.finishMs != null ? formatElapsed(ath.finishMs) : "--"}</div>
                                        <button onClick={e => { e.stopPropagation(); printArchivedCert(race, ath); }} style={{ background: "none", border: "1px solid rgba(0,174,239,0.3)", borderRadius: 4, padding: "3px 8px", fontSize: 10, color: "#00aeef", cursor: "pointer" }}>🏆</button>
                                      </div>
                                      {athOpen && (
                                        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", padding: "6px 0 4px 22px" }}>
                                          {segs.map((seg, si) => { const dur = archiveSegDur(ath, si); return dur !== null ? (<div key={si} style={{ background: "rgba(0,174,239,0.08)", border: "1px solid rgba(0,174,239,0.18)", borderRadius: 4, padding: "3px 8px", textAlign: "center" }}><div style={{ fontSize: 9, color: "#5a86a8", letterSpacing: 1, textTransform: "uppercase" }}>{seg}</div><div style={{ fontSize: 12, color: "#e8f4fb", fontWeight: 700 }}>{formatElapsed(dur)}</div></div>) : null; })}
                                        </div>
                                      )}
                                    </div>
                                  );
                                })}
                                {dnf.length > 0 && <div style={{ fontSize: 11, color: "#5a86a8", marginTop: 6 }}>DNF: {dnf.map(a => a.name).join(", ")}</div>}
                              </div>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              )}

              {/* ── ATHLETES ROSTER ── */}
              {view === "athletes" && (
                <div style={{ paddingTop: 8 }}>

                  {/* ── All Athletes from Saved Races ── */}
                  {(() => {
                    const raceAthletes = [];
                    savedRaces.forEach(race => {
                      (race.athletes || []).forEach(a => {
                        if (!a.name || !a.name.trim()) return;
                        const key = a.name.trim().toLowerCase();
                        const existing = raceAthletes.find(x => x.key === key);
                        if (existing) {
                          if (!existing.races.includes(race.name)) existing.races.push(race.name);
                        } else {
                          raceAthletes.push({ key, name: a.name.trim(), gender: a.gender, ageGroup: a.ageGroup, dob: a.dob, races: [race.name] });
                        }
                      });
                    });
                    raceAthletes.sort((a, b) => a.name.localeCompare(b.name));
                    return (
                      <div style={{ marginBottom: 20 }}>
                        <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 3, textTransform: "uppercase", color: "#5a86a8", marginBottom: 10 }}>

                          <div style={{ background: "#0a1e36", border: "1px solid rgba(0,174,239,0.15)", borderRadius: 8, padding: "16px", textAlign: "center", color: "#3a6080", fontSize: 13 }}>

                          </div>
                        ) : (
                          <div style={{ background: "#0a1e36", border: "1px solid rgba(0,174,239,0.12)", borderRadius: 8, overflow: "hidden" }}>

                              const age = ath.dob ? calcAge(ath.dob) : null;
                              return (
                                <div key={ath.key} style={{ borderBottom: i < raceAthletes.length - 1 ? "1px solid rgba(0,174,239,0.08)" : "none" }}>

                                  <div style={{ display: "flex", alignItems: "center", gap: 10, padding: "9px 14px", background: isEditing ? "rgba(0,174,239,0.06)" : i % 2 === 0 ? "transparent" : "rgba(0,174,239,0.03)" }}>
                                    <div style={{ fontFamily: "'Bebas Neue'", fontSize: 16, color: "#00aeef", width: 24, flexShrink: 0, textAlign: "right" }}>{i + 1}</div>

                                      <div style={{ fontSize: 13, color: "#e8f4fb", fontWeight: 600, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{ath.name}</div>
                                      <div style={{ fontSize: 11, color: "#5a86a8", marginTop: 1 }}>
                                        {ath.gender && <span style={{ marginRight: 8 }}>{ath.gender}</span>}
                                        {ath.ageGroup && <span style={{ marginRight: 8 }}>{ath.ageGroup}</span>}
                                        {age !== null && <span style={{ marginRight: 8 }}>Age {age}</span>}
                                        {ath.dob && <span style={{ marginRight: 8, color: "#3a6080" }}>{ath.dob}</span>}
                                      </div>
                                    </div>
                                    <div style={{ fontSize: 10, color: "#3a6080", flexShrink: 0 }}>
                                      {ath.races.length === 1
                                        ? <span>{ath.races[0]}</span>
                                        : <span style={{ color: "#00aeef" }}>{ath.races.length} races</span>}
                                    </div>
                                    <button onClick={() => {
                                      if (isEditing) { setEditingAthleteKey(null); setEditingAthleteData(null); }

                                    }} style={{ background: isEditing ? "rgba(0,174,239,0.15)" : "none", border: isEditing ? "1px solid rgba(0,174,239,0.3)" : "none", color: isEditing ? "#00aeef" : "#3a6080", fontSize: 13, cursor: "pointer", padding: "4px 8px", borderRadius: 4, flexShrink: 0, lineHeight: 1 }}>
                                      {isEditing ? "✕" : "✎"}
                                    </button>
                                  </div>

                                  {/* Inline edit panel */}
                                  {isEditing && editingAthleteData && (
                                    <div style={{ padding: "12px 14px 14px", background: "rgba(0,174,239,0.04)", borderTop: "1px solid rgba(0,174,239,0.1)" }}>
                                      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                                        <input value={editingAthleteData.name} onChange={e => setEditingAthleteData(d => ({ ...d, name: e.target.value }))}
                                          placeholder="Name" style={{ background: "#0c2240", border: "1px solid rgba(0,174,239,0.3)", borderRadius: 4, padding: "8px 12px", color: "#e8f4fb", fontSize: 13, outline: "none", width: "100%", boxSizing: "border-box" }} />
                                        <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                                          <select value={editingAthleteData.gender} onChange={e => setEditingAthleteData(d => ({ ...d, gender: e.target.value }))}
                                            style={{ background: "#0c2240", border: "1px solid rgba(0,174,239,0.25)", borderRadius: 4, padding: "7px 10px", color: "#e8f4fb", fontSize: 12, outline: "none", cursor: "pointer" }}>
                                            <option value="Male">Male</option>
                                            <option value="Female">Female</option>
                                          </select>
                                          <select value={editingAthleteData.ageGroup} onChange={e => setEditingAthleteData(d => ({ ...d, ageGroup: e.target.value }))}
                                            style={{ background: "#0c2240", border: "1px solid rgba(0,174,239,0.25)", borderRadius: 4, padding: "7px 10px", color: "#e8f4fb", fontSize: 12, outline: "none", cursor: "pointer", flex: 1 }}>
                                            {ageGroups.map(ag => <option key={ag} value={ag}>{ag}</option>)}
                                          </select>
                                          <input type="date" value={editingAthleteData.dob} onChange={e => setEditingAthleteData(d => ({ ...d, dob: e.target.value }))}
                                            style={{ background: "#0c2240", border: "1px solid rgba(0,174,239,0.25)", borderRadius: 4, padding: "7px 8px", color: "#e8f4fb", fontSize: 12, outline: "none", colorScheme: "dark" }} />
                                          {editingAthleteData.dob && calcAge(editingAthleteData.dob) !== null && (
                                            <div style={{ background: "#071829", border: "1px solid rgba(0,174,239,0.2)", borderRadius: 4, padding: "7px 8px", fontSize: 12, color: "#00aeef", fontWeight: 700, flexShrink: 0 }}>
                                              Age {calcAge(editingAthleteData.dob)}
                                            </div>
                                          )}
                                        </div>
                                        <div style={{ display: "flex", gap: 8 }}>
                                          <button onClick={() => saveAthleteEdit(ath.name, editingAthleteData)}
                                            style={{ ...btnStyle("#00aeef"), padding: "7px 18px", fontSize: 12 }}>Save</button>
                                          <button onClick={() => { setEditingAthleteKey(null); setEditingAthleteData(null); }}
                                            style={{ ...btnStyle("#5a86a8", true), padding: "7px 14px", fontSize: 12 }}>Cancel</button>
                                          <div style={{ fontSize: 11, color: "#3a6080", alignSelf: "center", marginLeft: 4 }}>
                                            Updates across {ath.races.length} race{ath.races.length !== 1 ? "s" : ""}
                                          </div>
                                        </div>
                                      </div>
                                    </div>
                                  )}
                                </div>
                              );
                            })}
                          </div>
                        )}
                      </div>
                    );
                  })()}

                </div>
              )}

              {/* ── JOIN ── */}
              {view === "join" && (
                <div style={{ paddingTop: 8, maxWidth: 480, margin: "0 auto" }}>

                  {/* My Races */}
                  {Object.keys(joinedRaces).length > 0 && registrationStep === "code" && !joinRace && (
                    <div style={{ marginBottom: 20 }}>
                      <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 3, textTransform: "uppercase", color: "#4ade80", marginBottom: 10 }}>My Races</div>
                      <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                        {Object.values(joinedRaces).sort((a, b) => (b.joinedAt || 0) - (a.joinedAt || 0)).map(jr => (
                          <div key={jr.code} style={{ background: "#0c2240", border: "1px solid rgba(74,222,128,0.25)", borderRadius: 8, padding: "12px 14px", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10 }}>
                            <div style={{ flex: 1, minWidth: 0 }}>
                              <div style={{ fontWeight: 700, fontSize: 14, color: "#e8f4fb", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{jr.raceName}</div>
                              <div style={{ fontSize: 11, color: "#5a86a8", marginTop: 2 }}>
                                {jr.hostName} &nbsp;·&nbsp; CODE: <span style={{ color: "#4ade80", fontFamily: "'Bebas Neue'", letterSpacing: 2 }}>{jr.code}</span>
                              </div>
                            </div>
                            <div style={{ display: "flex", gap: 6, flexShrink: 0, alignItems: "center" }}>
                              {deleteJoinedConfirm === jr.code ? (
                                <>
                                  <button onClick={() => { deleteJoinedRace(jr.code); setDeleteJoinedConfirm(null); }} style={{ ...btnStyle("#f87171"), padding: "5px 10px", fontSize: 11 }}>Delete?</button>
                                  <button onClick={() => setDeleteJoinedConfirm(null)} style={{ ...btnStyle("#5a86a8", true), padding: "5px 10px", fontSize: 11 }}>No</button>
                                </>
                              ) : (
                                <>
                                  <button onClick={() => rejoinRace(jr.code)} style={{ ...btnStyle("#4ade80"), padding: "6px 14px", fontSize: 12 }}>Rejoin</button>
                                  <button onClick={() => setDeleteJoinedConfirm(jr.code)} style={{ background: "none", border: "none", color: "#3a6080", fontSize: 18, cursor: "pointer", padding: "0 4px", lineHeight: 1 }}>&times;</button>
                                </>
                              )}
                            </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* Enter new code */}
                  {registrationStep === "code" && !joinRace && (
                    <div>
                      <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 2, color: "#5a86a8", marginBottom: 8 }}>RACE CODE</div>
                      <div style={{ display: "flex", gap: 8 }}>
                        <input value={joinCode} onChange={e => { setJoinCode(e.target.value.toUpperCase()); setRegError(""); }}
                          onKeyDown={e => e.key === "Enter" && joinRaceByCode()}
                          placeholder="e.g. ABC123" maxLength={6}
                          style={{ flex: 1, background: "#0c2240", border: "2px solid rgba(74,222,128,0.4)", borderRadius: 8, padding: "12px 14px", color: "#4ade80", fontSize: 22, fontFamily: "'Bebas Neue'", letterSpacing: 6, outline: "none", textAlign: "center" }} />
                        <button onClick={() => joinRaceByCode()} disabled={regWorking} style={{ ...btnStyle("#4ade80"), padding: "12px 20px", fontSize: 13, opacity: regWorking ? 0.6 : 1 }}>{regWorking ? "…" : "Find Race"}</button>
                      </div>
                      {regError && <div style={{ fontSize: 12, color: "#f87171", marginTop: 8 }}>{regError}</div>}
                    </div>
                  )}

                  {/* Confirm your info step */}
                  {registrationStep === "confirm" && regRaceData && !joinRace && (
                    <div>
                      <div style={{ background: "#0c2240", borderRadius: 8, padding: "12px 14px", marginBottom: 14 }}>
                        <div style={{ fontFamily: "'Bebas Neue'", fontSize: 22, letterSpacing: 3, color: "#4ade80" }}>{regRaceData.raceName || "Race"}</div>
                        <div style={{ fontSize: 10, color: "#5a86a8", letterSpacing: 1 }}>Host: {regRaceData.publisherName} &nbsp;·&nbsp; Code: {regRaceData.code}</div>
                      </div>
                      <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 2, color: "#5a86a8", marginBottom: 10 }}>CONFIRM YOUR INFO</div>
                      <div style={{ display: "flex", gap: 8, marginBottom: 8 }}>
                        <input value={regProfile.firstName} onChange={e => setRegProfile(p => ({ ...p, firstName: e.target.value }))}
                          placeholder="First name"
                          style={{ flex: 1, background: "#0c2240", border: "1px solid rgba(0,174,239,0.3)", borderRadius: 6, padding: "10px 12px", color: "#e8f4fb", fontSize: 14, outline: "none" }} />
                        <input value={regProfile.lastName} onChange={e => setRegProfile(p => ({ ...p, lastName: e.target.value }))}
                          placeholder="Last name"
                          style={{ flex: 1, background: "#0c2240", border: "1px solid rgba(0,174,239,0.3)", borderRadius: 6, padding: "10px 12px", color: "#e8f4fb", fontSize: 14, outline: "none" }} />
                      </div>
                      <div style={{ display: "flex", gap: 8, marginBottom: 8, flexWrap: "wrap" }}>
                        <select value={regProfile.gender} onChange={e => setRegProfile(p => ({ ...p, gender: e.target.value }))}
                          style={{ flex: 1, background: "#0c2240", border: "1px solid rgba(0,174,239,0.25)", borderRadius: 6, padding: "10px 12px", color: "#e8f4fb", fontSize: 13, outline: "none", cursor: "pointer" }}>
                          <option value="Male">Male</option>
                          <option value="Female">Female</option>
                          <option value="Non-binary">Non-binary</option>
                          <option value="Prefer not to say">Prefer not to say</option>
                        </select>
                        <select value={regProfile.ageGroup} onChange={e => setRegProfile(p => ({ ...p, ageGroup: e.target.value }))}
                          style={{ flex: 1, background: "#0c2240", border: "1px solid rgba(0,174,239,0.25)", borderRadius: 6, padding: "10px 12px", color: "#e8f4fb", fontSize: 13, outline: "none", cursor: "pointer" }}>
                          {(regRaceData.ageGroups || ageGroups).map(ag => <option key={ag} value={ag}>{ag}</option>)}
                        </select>
                      </div>
                      <div style={{ marginBottom: 8 }}>
                        <div style={{ fontSize: 10, color: "#5a86a8", marginBottom: 4 }}>Date of Birth (auto-assigns age group)</div>
                        <input type="date" value={regProfile.dob} onChange={e => {
                          const dob = e.target.value;
                          const matched = resolveAgeGroup(dob, regRaceData.ageGroups || ageGroups);
                          setRegProfile(p => ({ ...p, dob, ageGroup: matched || p.ageGroup }));
                        }} style={{ width: "100%", background: "#0c2240", border: "1px solid rgba(0,174,239,0.25)", borderRadius: 6, padding: "10px 12px", color: "#e8f4fb", fontSize: 13, outline: "none", colorScheme: "dark", boxSizing: "border-box" }} />
                      </div>
                      {(regRaceData.courses || []).length > 1 && (
                        <div style={{ marginBottom: 8 }}>
                          <div style={{ fontSize: 10, color: "#5a86a8", marginBottom: 6 }}>Select Course</div>
                          <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                            {regRaceData.courses.map(c => (
                              <button key={c.id} onClick={() => setRegCourseId(c.id)}
                                style={{ padding: "7px 14px", fontSize: 12, fontWeight: 700, background: regCourseId === c.id ? "#4ade80" : "transparent", color: regCourseId === c.id ? "#071829" : "#5a86a8", border: `1px solid ${regCourseId === c.id ? "#4ade80" : "rgba(74,222,128,0.3)"}`, borderRadius: 6, cursor: "pointer" }}>
                                {c.name}
                              </button>
                            ))}
                          </div>
                        </div>
                      )}
                      {/* BLE device signal check */}
                      {btDevices.filter(d => d.connected).length > 0 && (
                        <div style={{ marginBottom: 10 }}>
                          <div style={{ fontSize: 10, color: "#5a86a8", letterSpacing: 1, marginBottom: 6 }}>CONNECTED DEVICES</div>
                          {btDevices.filter(d => d.connected).map(dev => {
                            const hr = dev.readings.heartRate;
                            const spd = dev.readings.speed;
                            const cad = dev.readings.cadence;
                            const distMi = dev.readings.trainerDistMi;
                            return (
                              <div key={dev.id} style={{ background: "#071829", borderRadius: 6, padding: "8px 12px", marginBottom: 5, display: "flex", alignItems: "center", gap: 10, border: "1px solid rgba(74,222,128,0.2)" }}>
                                <span style={{ fontSize: 16, flexShrink: 0 }}>{hr != null ? "❤️" : "🚲"}</span>
                                <div style={{ flex: 1, minWidth: 0 }}>
                                  <div style={{ fontSize: 12, color: "#e8f4fb", fontWeight: 600, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{dev.name}</div>
                                  <div style={{ fontSize: 11, color: "#5a86a8" }}>
                                    {hr != null && <span style={{ color: "#f4742b" }}>❤️ {hr} bpm</span>}
                                    {spd != null && <span style={{ marginLeft: hr != null ? 8 : 0 }}>{(spd * 0.621).toFixed(1)} mph</span>}
                                    {cad != null && <span style={{ marginLeft: 6 }}>{cad} rpm</span>}
                                    {distMi != null && <span style={{ marginLeft: 6 }}>{distMi.toFixed(2)} mi</span>}
                                  </div>
                                </div>
                                <div style={{ width: 7, height: 7, borderRadius: "50%", background: "#4ade80", flexShrink: 0 }} />
                              </div>
                            );
                          })}
                        </div>
                      )}
                      {regError && <div style={{ fontSize: 12, color: "#f87171", marginBottom: 8 }}>{regError}</div>}
                      <div style={{ display: "flex", gap: 8, marginTop: 4 }}>
                        <button onClick={() => { setRegistrationStep("code"); setRegError(""); setRegRaceData(null); }}
                          style={{ ...btnStyle("#5a86a8", true), padding: "10px 18px", fontSize: 13 }}>Back</button>
                        <button onClick={() => registerForRace(regRaceData.code, regProfile, regCourseId)}
                          disabled={regWorking || !regProfile.firstName.trim() || !regProfile.lastName.trim()}
                          style={{ ...btnStyle("#4ade80"), flex: 1, padding: "12px", fontSize: 14, letterSpacing: 1, opacity: (regWorking || !regProfile.firstName.trim() || !regProfile.lastName.trim()) ? 0.5 : 1 }}>
                          {regWorking ? "Joining…" : "Join Race"}
                        </button>
                      </div>
                    </div>
                  )}

                  {joinRace && (
                    <div>
                      <div style={{ background: "#0c2240", borderRadius: 8, padding: "12px 14px", marginBottom: 14, display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                        <div style={{ flex: 1, minWidth: 0 }}>
                          <div style={{ fontFamily: "'Bebas Neue'", fontSize: 20, letterSpacing: 3, color: "#4ade80", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                            {joinLiveData?.raceName || joinRace.raceName || joinRace.publisherName + "'s Race"}
                          </div>
                          <div style={{ fontSize: 10, color: "#5a86a8", letterSpacing: 1 }}>
                            {joinRace.publisherName} · CODE: {joinRace.code} · {(joinLiveData?.athletes || joinRace.athletes || []).length} athletes
                            {joinLiveData && !joinLiveData.clockStarted && <span style={{ color: "#ffd166", marginLeft: 8 }}>● WAITING TO START</span>}
                            {joinLiveData?.clockRunning && <span style={{ color: "#4ade80", marginLeft: 8 }}>● LIVE</span>}
                          </div>
                        </div>
                        <button onClick={() => { setJoinRace(null); setJoinAthIdx(null); stopGpsTracking(); joinGpsTrailRef.current = []; setJoinGpsTrail([]); setJoinLiveData(null); localStorage.removeItem("tri-active-join"); try { localStorage.removeItem("tri-gps-trail"); } catch(_) {} }} style={{ background: "none", border: "1px solid rgba(90,134,168,0.3)", borderRadius: 4, color: "#5a86a8", fontSize: 11, cursor: "pointer", padding: "5px 10px", flexShrink: 0, marginLeft: 8 }}>Leave</button>
                      </div>

                      {joinAthIdx === null ? (
                        <div>
                          {/* Course map preview while picking name */}
                          {(joinRace.waypoints || []).some(w => w.lat !== null) && (
                            <div style={{ marginBottom: 14, borderRadius: 10, overflow: "hidden", border: "1px solid rgba(0,174,239,0.25)", position: "relative", zIndex: 0, isolation: "isolate", contain: "layout paint" }}>
                              <div style={{ fontSize: 10, letterSpacing: 3, color: "#00aeef", padding: "7px 12px", background: "#0c2240" }}>📍 RACE COURSE</div>
                              <div ref={joinMapContainerRef} style={{ height: 200 }} />
                            </div>
                          )}
                          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 2, color: "#5a86a8", marginBottom: 10 }}>SELECT YOUR NAME</div>
                          {(joinRace.athletes || []).map((ath, idx) => (
                            <button key={idx} onClick={() => setJoinAthIdx(idx)}
                              style={{ display: "block", width: "100%", background: "#0c2240", border: "1px solid rgba(74,222,128,0.2)", borderRadius: 6, padding: "12px 14px", color: "#e8f4fb", fontSize: 14, fontWeight: 600, cursor: "pointer", marginBottom: 6, textAlign: "left" }}>
                              {ath.name} <span style={{ fontSize: 11, color: "#5a86a8", fontWeight: 400 }}>{ath.gender} · {ath.ageGroup}</span>
                            </button>
                          ))}
                        </div>
                      ) : (
                        <div>
                          {/* Race clock — always visible */}
                          <div style={{ background: "linear-gradient(135deg,#0c2240,#0d3a6e)", borderRadius: 10, padding: "10px 16px", marginBottom: 12, textAlign: "center", border: "1px solid rgba(0,174,239,0.25)" }}>
                            <div style={{ fontSize: 9, letterSpacing: 3, color: "#5a86a8" }}>
                              {joinLiveData?.clockStarted ? "RACE CLOCK" : joinLiveData ? "RACE NOT STARTED" : "CONNECTING…"}
                            </div>
                            <div style={{ fontFamily: "'Bebas Neue'", fontSize: 44, letterSpacing: 4, color: joinLiveData?.clockStarted ? "#00aeef" : "#3a6080", lineHeight: 1 }}>
                              {joinLiveData?.clockStarted ? formatTime(joinLiveClockMs) : "0:00:00"}
                            </div>
                            {joinLiveData && !joinLiveData.clockStarted && (
                              <div style={{ fontSize: 10, color: "#5a86a8", marginTop: 2 }}>{joinLiveData.raceName || "Race"} · {joinLiveData.publisherName}</div>
                            )}
                          </div>

                          {/* GPS status bar */}
                          <div style={{ display: "flex", alignItems: "center", gap: 8, background: joinGpsActive ? "rgba(74,222,128,0.06)" : "rgba(255,255,255,0.03)", border: `1px solid ${joinGpsActive ? "rgba(74,222,128,0.25)" : "rgba(255,255,255,0.06)"}`, borderRadius: 6, padding: "8px 12px", marginBottom: 12 }}>
                            <div style={{ width: 8, height: 8, borderRadius: "50%", background: joinGpsActive ? "#4ade80" : "#3a6080", boxShadow: joinGpsActive ? "0 0 0 0 rgba(74,222,128,0.6)" : "none", animation: joinGpsActive ? "gpsping 1.4s ease-out infinite" : "none", flexShrink: 0 }} />
                            <div style={{ fontSize: 11, color: joinGpsActive ? "#4ade80" : "#3a6080", flex: 1 }}>
                              {joinGpsActive ? joinGpsStatus : (joinGpsStatus || "Starting GPS…")}
                            </div>
                            {(() => { const hrDev = btDevices.find(d => d.readings.heartRate != null); return hrDev ? <span style={{ fontSize: 12, color: "#f4742b", fontWeight: 700, flexShrink: 0 }}>❤️ {hrDev.readings.heartRate}</span> : null; })()}
                            <div style={{ fontSize: 10, color: "#3a6080" }}>
                              {joinRace.athletes[joinAthIdx]?.name}
                              <button onClick={() => setJoinAthIdx(null)} style={{ fontSize: 10, color: "#3a6080", background: "none", border: "none", cursor: "pointer", padding: "0 0 0 6px" }}>change</button>
                            </div>
                          </div>

                          {/* Live GPS map with waypoints + trail */}
                          <div style={{ marginBottom: 12, borderRadius: 10, overflow: "hidden", border: "1px solid rgba(74,222,128,0.3)", position: "relative", zIndex: 0, isolation: "isolate", contain: "layout paint" }}>
                            <div style={{ fontSize: 10, letterSpacing: 3, color: "#4ade80", padding: "7px 12px", background: "#0c2240", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                              <span>📍 RACE MAP</span>
                              {joinGpsTrail.length > 0 && <span style={{ color: "#5a86a8" }}>{joinGpsTrail.length} pts tracked</span>}
                            </div>
                            <div ref={joinMapContainerRef} style={{ height: 260 }} />
                            {joinGpsActive && (
                              <div style={{ position: "absolute", bottom: 8, right: 8, display: "flex", alignItems: "center", gap: 5, background: "rgba(7,24,41,0.8)", borderRadius: 20, padding: "4px 8px", zIndex: 1000 }}>
                                <div style={{ width: 7, height: 7, borderRadius: "50%", background: "#4ade80", animation: "gpsping 1.4s ease-out infinite" }} />
                                <span style={{ fontSize: 9, color: "#4ade80", letterSpacing: 1, fontWeight: 700 }}>GPS LIVE</span>
                              </div>
                            )}
                            {joinGpsPos && (
                              <button onClick={() => { joinFollowingRef.current = true; try { joinLeafletMapRef.current?.setView([joinGpsPos.lat, joinGpsPos.lng], 16, { animate: true }); } catch(_) {} }}
                                style={{ position: "absolute", bottom: 8, left: 8, zIndex: 1000, background: "rgba(7,24,41,0.85)", border: "1px solid rgba(0,174,239,0.4)", borderRadius: 20, padding: "4px 10px", color: "#00aeef", fontSize: 11, fontWeight: 700, cursor: "pointer", letterSpacing: 1 }}>
                                ⊕ ME
                              </button>
                            )}
                          </div>

                          {/* Trainer panel — always visible when trainer is connected */}
                          {(() => {
                            const trainer = btDevices.find(d => d.connected && (d.readings.trainerDistMi != null || d.readings.speed != null || d.readings.cadence != null || d.readings.power != null));
                            if (!trainer) return null;
                            const myAth = joinRace.athletes?.[joinAthIdx];
                            const myCourse = (joinRace.courses || []).find(c => c.id === myAth?.courseId) || (joinRace.courses || [])[0];
                            const coursebikeType = myCourse?.bikeType || "gps";
                            const splits = joinLiveData?.athletes?.[joinAthIdx]?.splits || [];
                            const inBikeSeg = splits[1] != null && splits[2] == null;
                            const targetMi = parseFloat(myCourse?.bikeMiles) || 0;
                            const distMi = trainer.readings.trainerDistMi ?? 0;
                            const showProgress = inBikeSeg && coursebikeType !== "gps" && targetMi > 0;
                            const pct = showProgress ? Math.min(100, (distMi / targetMi) * 100) : 0;
                            const bikeLabel = coursebikeType === "spin" ? "SPIN BIKE" : "BIKE TRAINER";
                            return (
                              <div style={{ background: "#0c2240", borderRadius: 8, padding: "12px 14px", marginBottom: 12, border: "1px solid rgba(255,213,102,0.4)" }}>
                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: showProgress ? 8 : 4 }}>
                                  <div style={{ fontSize: 10, color: "#ffd166", letterSpacing: 2 }}>🚲 {bikeLabel}</div>
                                  <div style={{ display: "flex", gap: 10, alignItems: "center" }}>
                                    {trainer.readings.speed != null && <span style={{ fontFamily: "'Bebas Neue'", fontSize: 18, color: "#ffd166", letterSpacing: 1 }}>{(trainer.readings.speed * 0.621).toFixed(1)} <span style={{ fontSize: 10, color: "#5a86a8" }}>mph</span></span>}
                                    {trainer.readings.cadence != null && <span style={{ fontFamily: "'Bebas Neue'", fontSize: 18, color: "#ffd166", letterSpacing: 1 }}>{trainer.readings.cadence} <span style={{ fontSize: 10, color: "#5a86a8" }}>rpm</span></span>}
                                    {trainer.readings.power != null && <span style={{ fontFamily: "'Bebas Neue'", fontSize: 18, color: "#ffd166", letterSpacing: 1 }}>{trainer.readings.power} <span style={{ fontSize: 10, color: "#5a86a8" }}>W</span></span>}
                                  </div>
                                </div>
                                {showProgress && (
                                  <>
                                    <div style={{ fontFamily: "'Bebas Neue'", fontSize: 36, color: "#ffd166", lineHeight: 1, marginBottom: 6 }}>
                                      {distMi.toFixed(2)} <span style={{ fontSize: 14, color: "#5a86a8" }}>/ {targetMi} mi</span>
                                    </div>
                                    <div style={{ background: "rgba(255,213,102,0.1)", borderRadius: 4, height: 6, overflow: "hidden", marginBottom: 6 }}>
                                      <div style={{ height: "100%", width: `${pct}%`, background: pct >= 100 ? "#4ade80" : "#ffd166", borderRadius: 4, transition: "width 0.5s" }} />
                                    </div>
                                  </>
                                )}
                                <div style={{ fontSize: 10, color: "#5a86a8" }}>{trainer.name}{showProgress ? ` · ${pct.toFixed(0)}% complete` : ''}</div>
                              </div>
                            );
                          })()}

                          {/* HR monitor panel — always visible when HR device connected */}
                          {(() => {
                            const hrDev = btDevices.find(d => d.connected && d.readings.heartRate != null);
                            if (!hrDev) return null;
                            return (
                              <div style={{ background: "#0c2240", borderRadius: 8, padding: "10px 14px", marginBottom: 12, border: "1px solid rgba(244,116,43,0.3)" }}>
                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                  <div style={{ fontSize: 10, color: "#f4742b", letterSpacing: 2 }}>❤️ HEART RATE</div>
                                  <div style={{ fontFamily: "'Bebas Neue'", fontSize: 30, color: "#f4742b", letterSpacing: 1, lineHeight: 1 }}>
                                    {hrDev.readings.heartRate} <span style={{ fontSize: 11, color: "#5a86a8" }}>bpm</span>
                                  </div>
                                </div>
                                <div style={{ fontSize: 10, color: "#5a86a8", marginTop: 2 }}>{hrDev.name}</div>
                              </div>
                            );
                          })()}

                          {/* Garmin watch panel */}
                          {(() => {
                            const gpsData = joinLiveData?.athletes?.[joinAthIdx]?.gps;
                            const splits = joinLiveData?.athletes?.[joinAthIdx]?.splits || [];
                            const curSeg = (() => { const s = splits.findIndex(x => x === null); return s === -1 ? SEGMENTS.length - 1 : s; })();
                            return (
                              <div style={{ background: "#0c2240", borderRadius: 8, padding: "10px 14px", marginBottom: 12, border: `1px solid ${watchConnected ? "rgba(74,222,128,0.4)" : "rgba(0,174,239,0.15)"}` }}>
                                {/* Header row */}
                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: watchConnected ? 10 : 6 }}>
                                  <div style={{ fontSize: 10, color: "#00aeef", letterSpacing: 2 }}>⌚ GARMIN WATCH</div>
                                  {watchConnected
                                    ? <span style={{ fontSize: 10, color: "#4ade80", letterSpacing: 1, animation: "gpsping 1.4s ease-out infinite" }}>● WORKOUT ACTIVE</span>
                                    : watchToken && <span style={{ fontSize: 10, color: "#5a86a8" }}>Waiting for watch…</span>}
                                </div>

                                {/* Workout stats — only when watch is streaming */}
                                {watchConnected && (
                                  <div style={{ marginBottom: 10 }}>
                                    <div style={{ display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 8 }}>
                                      {/* Distance */}
                                      <div style={{ background: "#071829", borderRadius: 6, padding: "8px 12px", flex: 1, minWidth: 80, textAlign: "center" }}>
                                        <div style={{ fontSize: 9, color: "#5a86a8", letterSpacing: 2 }}>DISTANCE</div>
                                        <div style={{ fontFamily: "'Bebas Neue'", fontSize: 26, color: "#00aeef", lineHeight: 1 }}>
                                          {gpsData?.distanceMi != null ? gpsData.distanceMi.toFixed(2) : "0.00"}
                                          <span style={{ fontSize: 10, color: "#5a86a8", marginLeft: 2 }}>mi</span>
                                        </div>
                                      </div>
                                      {/* Current segment */}
                                      <div style={{ background: "#071829", borderRadius: 6, padding: "8px 12px", flex: 1, minWidth: 80, textAlign: "center" }}>
                                        <div style={{ fontSize: 9, color: "#5a86a8", letterSpacing: 2 }}>SEGMENT</div>
                                        <div style={{ fontFamily: "'Bebas Neue'", fontSize: 26, color: segColors[curSeg] || "#4ade80", lineHeight: 1 }}>
                                          {SEGMENTS[curSeg]}
                                        </div>
                                      </div>
                                      {/* GPS accuracy */}
                                      {gpsData?.accuracy != null && (
                                        <div style={{ background: "#071829", borderRadius: 6, padding: "8px 12px", flex: 1, minWidth: 80, textAlign: "center" }}>
                                          <div style={{ fontSize: 9, color: "#5a86a8", letterSpacing: 2 }}>GPS ACC</div>
                                          <div style={{ fontFamily: "'Bebas Neue'", fontSize: 26, color: gpsData.accuracy < 10 ? "#4ade80" : gpsData.accuracy < 25 ? "#ffd166" : "#f4742b", lineHeight: 1 }}>
                                            {gpsData.accuracy.toFixed(0)}<span style={{ fontSize: 10, color: "#5a86a8", marginLeft: 2 }}>m</span>
                                          </div>
                                        </div>
                                      )}
                                    </div>
                                    {/* Completed splits from watch */}
                                    {splits.some(s => s !== null) && (
                                      <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                                        {SEGMENTS.map((seg, si) => {
                                          if (splits[si] == null) return null;
                                          const myAth = joinLiveData?.athletes?.[joinAthIdx];
                                          const segMs = si === 0
                                            ? splits[si] - (myAth?.startOffset || 0)
                                            : splits[si] - splits[si - 1];
                                          return (
                                            <div key={si} style={{ background: "#071829", borderRadius: 4, padding: "4px 8px", fontSize: 10 }}>
                                              <span style={{ color: segColors[si] }}>{seg}</span>
                                              <span style={{ color: "#5a86a8", marginLeft: 4 }}>{segMs > 0 ? formatElapsed(segMs) : formatElapsed(splits[si])}</span>
                                            </div>
                                          );
                                        })}
                                      </div>
                                    )}
                                  </div>
                                )}

                                {/* Pair / token row */}
                                {!watchToken ? (
                                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                    <div style={{ fontSize: 11, color: "#5a86a8" }}>Start a multisport on your Garmin to sync</div>
                                    <button onClick={generateWatchToken} disabled={watchTokenLoading}
                                      style={{ ...btnStyle("#00aeef", true), padding: "5px 12px", fontSize: 11, flexShrink: 0, marginLeft: 8 }}>
                                      {watchTokenLoading ? "…" : "Pair"}
                                    </button>
                                  </div>
                                ) : !watchConnected ? (
                                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                    <div>
                                      <div style={{ fontFamily: "'Bebas Neue'", fontSize: 24, letterSpacing: 8, color: "#00aeef", lineHeight: 1 }}>
                                        {watchToken.slice(0, 4)} {watchToken.slice(4)}
                                      </div>
                                      <div style={{ fontSize: 10, color: "#5a86a8" }}>Enter this code on your Garmin watch</div>
                                    </div>
                                    <button onClick={clearWatchToken} style={{ background: "none", border: "1px solid rgba(90,134,168,0.3)", borderRadius: 4, color: "#3a6080", fontSize: 10, cursor: "pointer", padding: "4px 8px", flexShrink: 0, marginLeft: 8 }}>Unpair</button>
                                  </div>
                                ) : (
                                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                    <div style={{ fontSize: 10, color: "#4ade80" }}>Syncing live to race · token {watchToken.slice(0, 4)} {watchToken.slice(4)}</div>
                                    <button onClick={clearWatchToken} style={{ background: "none", border: "1px solid rgba(90,134,168,0.3)", borderRadius: 4, color: "#3a6080", fontSize: 10, cursor: "pointer", padding: "4px 8px", flexShrink: 0, marginLeft: 8 }}>Unpair</button>
                                  </div>
                                )}
                              </div>
                            );
                          })()}

                          {/* Next checkpoint */}
                          {(() => {
                            const allWps = (joinRace.waypoints || waypoints).filter(wp => wp.lat !== null);
                            const next = allWps[joinNextSeg];
                            return allWps.length > 0 && (
                              <div style={{ background: "#0c2240", borderRadius: 8, padding: "10px 14px", marginBottom: 12 }}>
                                <div style={{ fontSize: 10, color: "#5a86a8", letterSpacing: 2, marginBottom: 4 }}>NEXT CHECKPOINT</div>
                                {next
                                  ? <div style={{ fontWeight: 700, color: "#e8f4fb", fontSize: 13 }}>{next.label} <span style={{ color: "#5a86a8", fontWeight: 400, fontSize: 11 }}>· {next.radiusM}m radius</span></div>
                                  : <div style={{ color: "#4ade80", fontWeight: 700 }}>All checkpoints passed 🎉</div>}
                              </div>
                            );
                          })()}

                          {/* Race roster */}
                          <div style={{ fontSize: 10, letterSpacing: 3, color: "#5a86a8", marginBottom: 10 }}>RACE ROSTER</div>
                          {(joinLiveData?.athletes || joinRace.athletes || []).map((ath, idx) => {
                            const isMe = idx === joinAthIdx;
                            const clock = joinLiveClockMs;
                            const chipMs = ath.started && ath.startOffset != null ? clock - ath.startOffset : null;
                            const finishMs = ath.finished && ath.startOffset != null && ath.splits ? ath.splits[ath.splits.length - 1] - ath.startOffset : null;
                            return (
                              <div key={idx} style={{ background: isMe ? "rgba(74,222,128,0.07)" : "#0c2240", borderRadius: 8, marginBottom: 7, border: `1px solid ${isMe ? "rgba(74,222,128,0.35)" : "rgba(255,255,255,0.06)"}`, padding: "10px 14px" }}>
                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                                  <div>
                                    <div style={{ fontWeight: 700, fontSize: 13, color: isMe ? "#4ade80" : "#e8f4fb" }}>
                                      {ath.name || `${ath.firstName || ""} ${ath.lastName || ""}`.trim()}
                                      {isMe && <span style={{ fontSize: 9, color: "#4ade80", marginLeft: 7, letterSpacing: 1, fontWeight: 700 }}>YOU</span>}
                                    </div>
                                    <div style={{ fontSize: 11, color: "#5a86a8" }}>{ath.ageGroup}{ath.ageGroup && ath.gender ? " · " : ""}{ath.gender}</div>
                                  </div>
                                  <div style={{ textAlign: "right" }}>
                                    {ath.finished ? (
                                      <div style={{ fontFamily: "'Bebas Neue'", fontSize: 16, color: "#4ade80", letterSpacing: 1 }}>{formatElapsed(finishMs)} 🏁</div>
                                    ) : ath.started ? (
                                      <div style={{ fontFamily: "'Bebas Neue'", fontSize: 18, color: "#00aeef", letterSpacing: 1 }}>{formatElapsed(chipMs)}</div>
                                    ) : (
                                      <div style={{ fontSize: 11, color: "#3a6080" }}>Waiting…</div>
                                    )}
                                  </div>
                                </div>
                              </div>
                            );
                          })}

                          {joinGpsActive && (
                            <button onClick={stopGpsTracking} style={{ ...btnStyle("#f4742b", true), width: "100%", padding: "10px", marginTop: 8, fontSize: 12 }}>Stop GPS Tracking</button>
                          )}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              )}

              {/* ── DEVICES ── */}
              {view === "devices" && (
                <div style={{ paddingTop: 8, maxWidth: 480, margin: "0 auto" }}>
                  <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 30, letterSpacing: 4, color: "#e8f4fb", marginBottom: 18 }}>
                    Devices
                  </div>

                  {/* Bluetooth card */}
                  <div style={{ background: "rgba(255,255,255,0.04)", borderRadius: 12, border: "1px solid rgba(0,174,239,0.15)", padding: "18px 16px", marginBottom: 14 }}>
                    <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", color: "#5a86a8", marginBottom: 12 }}>
                      Bluetooth
                    </div>

                    {!btSupported ? (
                      <div style={{ background: "rgba(244,116,43,0.08)", border: "1px solid rgba(244,116,43,0.3)", borderRadius: 8, padding: "12px 14px", fontSize: 12, color: "#f4742b" }}>
                        Web Bluetooth is not available in this browser. Use Chrome or Edge on HTTPS.
                      </div>
                    ) : (
                      <>
                        <button
                          onClick={scanBluetooth}
                          disabled={btScanning}
                          style={{ ...btnStyle("#00aeef"), width: "100%", padding: "14px", fontSize: 14, letterSpacing: 1, fontFamily: "'Bebas Neue', sans-serif", opacity: btScanning ? 0.6 : 1, cursor: btScanning ? "not-allowed" : "pointer" }}
                        >
                          {btScanning ? "Scanning…" : "Scan for Bluetooth Devices"}
                        </button>

                        {btDevices.length > 0 && (
                          <div style={{ marginTop: 12, display: "flex", flexDirection: "column", gap: 10 }}>
                            {btDevices.map(dev => (
                              <div key={dev.id} style={{ background: "#071829", border: `1px solid ${dev.connected ? "#4ade80" : "#3a6080"}`, borderRadius: 10, padding: "14px 14px 10px" }}>
                                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 8 }}>
                                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                                    {dev.connected && (
                                      <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#4ade80", animation: "gpsping 1.2s ease-in-out infinite" }} />
                                    )}
                                    <span style={{ fontWeight: 700, fontSize: 13, color: "#e8f4fb" }}>{dev.name}</span>
                                  </div>
                                  <button onClick={() => disconnectBleDevice(dev.id)} style={{ ...btnStyle("#f4742b", true), padding: "4px 10px", fontSize: 11 }}>
                                    Disconnect
                                  </button>
                                </div>
                                <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
                                  {dev.readings.heartRate != null && (
                                    <div style={{ background: "#0c2240", borderRadius: 6, padding: "6px 10px", textAlign: "center" }}>
                                      <div style={{ fontSize: 9, letterSpacing: 2, color: "#5a86a8", textTransform: "uppercase" }}>HR</div>
                                      <div style={{ fontFamily: "'Bebas Neue'", fontSize: 22, color: "#f4742b", letterSpacing: 1 }}>
                                        {dev.readings.heartRate}<span style={{ fontSize: 10, color: "#5a86a8", marginLeft: 2 }}>bpm</span>
                                      </div>
                                    </div>
                                  )}
                                  {dev.readings.cadence != null && (
                                    <div style={{ background: "#0c2240", borderRadius: 6, padding: "6px 10px", textAlign: "center" }}>
                                      <div style={{ fontSize: 9, letterSpacing: 2, color: "#5a86a8", textTransform: "uppercase" }}>Cadence</div>
                                      <div style={{ fontFamily: "'Bebas Neue'", fontSize: 22, color: "#ffd166", letterSpacing: 1 }}>
                                        {dev.readings.cadence}<span style={{ fontSize: 10, color: "#5a86a8", marginLeft: 2 }}>rpm</span>
                                      </div>
                                    </div>
                                  )}
                                  {dev.readings.speed != null && (
                                    <div style={{ background: "#0c2240", borderRadius: 6, padding: "6px 10px", textAlign: "center" }}>
                                      <div style={{ fontSize: 9, letterSpacing: 2, color: "#5a86a8", textTransform: "uppercase" }}>Speed</div>
                                      <div style={{ fontFamily: "'Bebas Neue'", fontSize: 22, color: "#00aeef", letterSpacing: 1 }}>
                                        {dev.readings.speed}<span style={{ fontSize: 10, color: "#5a86a8", marginLeft: 2 }}>km/h</span>
                                      </div>
                                    </div>
                                  )}
                                  {dev.readings.power != null && (
                                    <div style={{ background: "#0c2240", borderRadius: 6, padding: "6px 10px", textAlign: "center" }}>
                                      <div style={{ fontSize: 9, letterSpacing: 2, color: "#5a86a8", textTransform: "uppercase" }}>Power</div>
                                      <div style={{ fontFamily: "'Bebas Neue'", fontSize: 22, color: "#a78bfa", letterSpacing: 1 }}>
                                        {dev.readings.power}<span style={{ fontSize: 10, color: "#5a86a8", marginLeft: 2 }}>W</span>
                                      </div>
                                    </div>
                                  )}
                                  {dev.readings.trainerDistMi != null && (
                                    <div style={{ background: "#0c2240", borderRadius: 6, padding: "6px 10px", textAlign: "center" }}>
                                      <div style={{ fontSize: 9, letterSpacing: 2, color: "#5a86a8", textTransform: "uppercase" }}>Trainer Dist</div>
                                      <div style={{ fontFamily: "'Bebas Neue'", fontSize: 22, color: "#ffd166", letterSpacing: 1 }}>
                                        {dev.readings.trainerDistMi.toFixed(2)}<span style={{ fontSize: 10, color: "#5a86a8", marginLeft: 2 }}>mi</span>
                                      </div>
                                      <button onClick={() => setBtDevices(prev => prev.map(d2 => d2.id !== dev.id ? d2 : { ...d2, trainerBaseRevs: d2.readings.cscRaw?.cumWheelRevs ?? null, trainerBaseDistM: d2.readings.ftmsDistM ?? null, readings: { ...d2.readings, trainerDistMi: 0 } }))}
                                        style={{ fontSize: 9, color: "#5a86a8", background: "none", border: "none", cursor: "pointer", marginTop: 2, padding: 0 }}>
                                        Reset
                                      </button>
                                    </div>
                                  )}
                                  {!dev.connected && Object.keys(dev.readings).filter(k => !["cscRaw", "trainerDistMi"].includes(k)).length === 0 && (
                                    <div style={{ fontSize: 11, color: "#3a6080" }}>Disconnected — no data</div>
                                  )}
                                </div>
                                {dev.hrHistory && dev.hrHistory.length > 1 && (() => {
                                  const pts = dev.hrHistory;
                                  const W = 280, H = 60;
                                  const minBpm = Math.min(...pts.map(p => p.bpm)) - 5;
                                  const maxBpm = Math.max(...pts.map(p => p.bpm)) + 5;
                                  const t0 = pts[0].t, t1 = pts[pts.length - 1].t;
                                  const tRange = Math.max(t1 - t0, 1);
                                  const x = t => ((t - t0) / tRange) * W;
                                  const y = bpm => H - ((bpm - minBpm) / Math.max(maxBpm - minBpm, 1)) * H;
                                  const polyPts = pts.map(p => `${x(p.t).toFixed(1)},${y(p.bpm).toFixed(1)}`).join(" ");
                                  const lastBpm = pts[pts.length - 1].bpm;
                                  const minsAgo = Math.round((t1 - t0) / 60000);
                                  return (
                                    <div style={{ marginTop: 10, background: "#071829", borderRadius: 6, padding: "8px 10px" }}>
                                      <div style={{ fontSize: 9, color: "#5a86a8", letterSpacing: 2, marginBottom: 6 }}>HR HISTORY</div>
                                      <svg width="100%" viewBox={`0 0 ${W} ${H}`} style={{ display: "block" }}>
                                        <polyline fill="none" stroke="#f4742b" strokeWidth="1.5" points={polyPts} />
                                        <text x={W - 2} y={y(lastBpm).toFixed(1)} fill="#f4742b" fontSize="9" textAnchor="end" dominantBaseline="middle">{lastBpm}</text>
                                      </svg>
                                      <div style={{ display: "flex", justifyContent: "space-between", fontSize: 9, color: "#3a6080", marginTop: 2 }}>
                                        <span>{minsAgo > 0 ? `${minsAgo}m ago` : "just started"}</span><span>now</span>
                                      </div>
                                    </div>
                                  );
                                })()}
                              </div>
                            ))}
                          </div>
                        )}
                      </>
                    )}
                  </div>

                  {/* Garmin Watch (WiFi) card */}
                  <div style={{ background: "rgba(255,255,255,0.04)", borderRadius: 12, border: "1px solid rgba(0,174,239,0.15)", padding: "18px 16px", marginBottom: 14 }}>
                    <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", color: "#5a86a8", marginBottom: 12 }}>
                      Garmin Watch (WiFi)
                    </div>

                    {!joinRace || joinAthIdx === null ? (
                      <div style={{ background: "rgba(0,174,239,0.04)", border: "1px solid rgba(0,174,239,0.12)", borderRadius: 8, padding: "14px" }}>
                        <div style={{ fontSize: 12, color: "#e8f4fb", fontWeight: 700, marginBottom: 6 }}>⌚ Garmin Watch</div>
                        <div style={{ fontSize: 11, color: "#5a86a8", marginBottom: 12, lineHeight: 1.6 }}>
                          Garmin watches connect via <strong style={{ color: "#00aeef" }}>WiFi</strong> — not Bluetooth.
                          The watch reads a token from the internet and streams GPS directly to the race.
                        </div>
                        <div style={{ fontSize: 11, color: "#5a86a8", marginBottom: 12, lineHeight: 1.8 }}>
                          To pair:{" "}
                          <span style={{ color: "#e8f4fb" }}>Join tab</span> → enter race code → select your name → token appears here automatically.
                        </div>
                        <button onClick={() => setView("join")} style={{ ...btnStyle("#00aeef", true), fontSize: 11, padding: "8px 16px" }}>
                          Go to Join Tab →
                        </button>
                      </div>
                    ) : !watchToken ? (
                      <button onClick={generateWatchToken} disabled={watchTokenLoading || joinGpsActive}
                        style={{ ...btnStyle("#00aeef", true), width: "100%", padding: "14px", fontSize: 13, letterSpacing: 1, opacity: (watchTokenLoading || joinGpsActive) ? 0.45 : 1, cursor: (watchTokenLoading || joinGpsActive) ? "not-allowed" : "pointer" }}>
                        {watchTokenLoading ? "Generating…" : "⌚ Pair Garmin Watch"}
                      </button>
                    ) : (
                      <div style={{ background: "#071829", border: `2px solid ${watchConnected ? "#4ade80" : "#00aeef"}`, borderRadius: 10, padding: "16px", textAlign: "center" }}>
                        <div style={{ fontSize: 11, letterSpacing: 3, textTransform: "uppercase", color: "#5a86a8", marginBottom: 8 }}>
                          ⌚ Garmin Watch Code
                        </div>
                        <div style={{ fontFamily: "'Bebas Neue', monospace", fontSize: 38, letterSpacing: 10, color: "#00aeef", marginBottom: 2 }}>
                          {watchToken.slice(0, 4)} {watchToken.slice(4)}
                        </div>
                        <div style={{ fontSize: 10, color: "#3a6080", marginBottom: 12 }}>
                          Enter in the Timeathon Garmin app · expires in 6 hours
                        </div>
                        {watchConnected ? (
                          <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 6, marginBottom: 10 }}>
                            <div style={{ width: 8, height: 8, borderRadius: "50%", background: "#4ade80", animation: "gpsping 1.2s ease-in-out infinite" }} />
                            <span style={{ fontSize: 12, color: "#4ade80", fontWeight: 700 }}>Watch connected · GPS active</span>
                          </div>
                        ) : (
                          <div style={{ fontSize: 11, color: "#5a86a8", marginBottom: 10 }}>Waiting for watch to connect…</div>
                        )}
                        <button onClick={clearWatchToken} style={{ ...btnStyle("#f4742b", true), padding: "6px 16px", fontSize: 11 }}>
                          Cancel
                        </button>
                      </div>
                    )}
                  </div>

                  {/* Live Data Dashboard card — only visible when at least one device is connected */}
                  {(() => {
                    const allReadings = btDevices.reduce((acc, dev) => ({ ...acc, ...dev.readings }), {});
                    const hasAny = btDevices.some(d => d.connected) || watchConnected;
                    if (!hasAny) return null;
                    return (
                      <div style={{ background: "rgba(255,255,255,0.04)", borderRadius: 12, border: "1px solid rgba(0,174,239,0.15)", padding: "18px 16px" }}>
                        <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", color: "#5a86a8", marginBottom: 14 }}>
                          Live Data Dashboard
                        </div>
                        <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(110px, 1fr))", gap: 10 }}>
                          {[
                            { key: "heartRate", label: "Heart Rate", unit: "bpm",  color: "#f4742b" },
                            { key: "cadence",   label: "Cadence",    unit: "rpm",  color: "#ffd166" },
                            { key: "speed",     label: "Speed",      unit: "km/h", color: "#00aeef" },
                            { key: "power",     label: "Power",      unit: "W",    color: "#a78bfa" },
                          ].map(({ key, label, unit, color }) => {
                            const val = allReadings[key];
                            return (
                              <div key={key} style={{ background: "#071829", borderRadius: 8, padding: "14px 10px", textAlign: "center", border: "1px solid rgba(255,255,255,0.06)" }}>
                                <div style={{ fontSize: 9, letterSpacing: 2, textTransform: "uppercase", color: "#5a86a8", marginBottom: 4 }}>{label}</div>
                                <div style={{ fontFamily: "'Bebas Neue'", fontSize: 32, color: val != null ? color : "#1e3a52", letterSpacing: 1 }}>
                                  {val != null ? val : "--"}
                                </div>
                                <div style={{ fontSize: 9, color: "#3a6080" }}>{unit}</div>
                              </div>
                            );
                          })}
                          {watchConnected && (
                            <div style={{ background: "#071829", borderRadius: 8, padding: "14px 10px", textAlign: "center", border: "1px solid rgba(255,255,255,0.06)" }}>
                              <div style={{ fontSize: 9, letterSpacing: 2, textTransform: "uppercase", color: "#5a86a8", marginBottom: 4 }}>GPS</div>
                              <div style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 4 }}>
                                <div style={{ width: 6, height: 6, borderRadius: "50%", background: "#4ade80", animation: "gpsping 1.2s ease-in-out infinite" }} />
                                <span style={{ fontFamily: "'Bebas Neue'", fontSize: 18, color: "#4ade80", letterSpacing: 1 }}>Active</span>
                              </div>
                              <div style={{ fontSize: 9, color: "#3a6080" }}>via Garmin</div>
                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })()}

                </div>
              )}

              {/* ── PROFILE ── */}
              {view === "profile" && (
                <div style={{ paddingTop: 8, maxWidth: 480, margin: "0 auto" }}>
                  <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 3, textTransform: "uppercase", color: "#5a86a8", marginBottom: 16 }}>My Profile</div>

                  <div style={{ background: "#0c2240", border: "1px solid rgba(0,174,239,0.2)", borderRadius: 10, padding: "18px 16px", marginBottom: 14 }}>
                    <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", color: "#5a86a8", marginBottom: 12 }}>Personal Info</div>
                    <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                      <div style={{ display: "flex", gap: 8 }}>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 10, color: "#5a86a8", marginBottom: 4 }}>First Name</div>
                          <input value={editProfile.firstName} onChange={e => setEditProfile(p => ({ ...p, firstName: e.target.value }))}
                            style={{ width: "100%", background: "#071829", border: "1px solid rgba(0,174,239,0.25)", borderRadius: 6, padding: "9px 12px", color: "#e8f4fb", fontSize: 13, outline: "none" }} />
                        </div>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 10, color: "#5a86a8", marginBottom: 4 }}>Last Name</div>
                          <input value={editProfile.lastName} onChange={e => setEditProfile(p => ({ ...p, lastName: e.target.value }))}
                            style={{ width: "100%", background: "#071829", border: "1px solid rgba(0,174,239,0.25)", borderRadius: 6, padding: "9px 12px", color: "#e8f4fb", fontSize: 13, outline: "none" }} />
                        </div>
                      </div>
                      <div>
                        <div style={{ fontSize: 10, color: "#5a86a8", marginBottom: 4 }}>Email</div>
                        <input value={currentUser?.email || ""} disabled
                          style={{ width: "100%", background: "#071829", border: "1px solid rgba(255,255,255,0.06)", borderRadius: 6, padding: "9px 12px", color: "#3a6080", fontSize: 13, outline: "none" }} />
                      </div>
                      <div style={{ display: "flex", gap: 8 }}>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 10, color: "#5a86a8", marginBottom: 4 }}>Birthday{editProfile.birthday && calcAge(editProfile.birthday) !== null ? ` · Age ${calcAge(editProfile.birthday)}` : ""}</div>
                          <input type="date" value={editProfile.birthday} onChange={e => setEditProfile(p => ({ ...p, birthday: e.target.value }))}
                            style={{ width: "100%", background: "#071829", border: "1px solid rgba(0,174,239,0.25)", borderRadius: 6, padding: "9px 10px", color: "#e8f4fb", fontSize: 13, outline: "none", colorScheme: "dark" }} />
                        </div>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 10, color: "#5a86a8", marginBottom: 4 }}>Gender</div>
                          <select value={editProfile.gender} onChange={e => setEditProfile(p => ({ ...p, gender: e.target.value }))}
                            style={{ width: "100%", background: "#071829", border: "1px solid rgba(0,174,239,0.25)", borderRadius: 6, padding: "9px 10px", color: "#e8f4fb", fontSize: 13, outline: "none", cursor: "pointer" }}>
                            <option value="">Select…</option>
                            <option value="Male">Male</option>
                            <option value="Female">Female</option>
                            <option value="Non-binary">Non-binary</option>
                            <option value="Prefer not to say">Prefer not to say</option>
                          </select>
                        </div>
                      </div>
                      <div>
                        <div style={{ fontSize: 10, color: "#5a86a8", marginBottom: 6 }}>Role</div>
                        <div style={{ display: "flex", gap: 8 }}>
                          {[["participant","🏊 Participant"],["spectator","👀 Spectator"]].map(([role, label]) => (
                            <button key={role} onClick={() => setEditProfile(p => ({ ...p, role }))}
                              style={{ flex: 1, padding: "9px 8px", background: editProfile.role === role ? "rgba(0,174,239,0.12)" : "transparent", border: `2px solid ${editProfile.role === role ? "#00aeef" : "rgba(0,174,239,0.15)"}`, borderRadius: 8, color: editProfile.role === role ? "#00aeef" : "#5a86a8", cursor: "pointer", fontSize: 12, fontWeight: 700 }}>
                              {label}
                            </button>
                          ))}
                        </div>
                      </div>
                      <button onClick={async () => {
                        setProfileSaving(true); setProfileSaved(false); setProfileError("");
                        const displayName = `${editProfile.firstName.trim()} ${editProfile.lastName.trim()}`;
                        const updated = { ...editProfile, displayName, email: currentUser.email };
                        try { await currentUser.updateProfile({ displayName }); } catch(e) { console.error("Auth update:", e); }
                        // Always update local state and localStorage immediately
                        setUserProfile(updated);
                        localStorage.setItem("tri-user-profile", JSON.stringify(updated));
                        setProfileSaved(true);
                        setTimeout(() => setProfileSaved(false), 2500);
                        rtdb.ref("users/" + currentUser.uid + "/profile").set(updated)
                          .catch(e => { console.error("RTDB profile save:", e); setProfileError("Saved locally — cloud sync failed."); });
                        setProfileSaving(false);
                      }} disabled={profileSaving}
                        style={{ background: profileSaved ? "#4ade80" : "#00aeef", border: "none", borderRadius: 6, padding: "11px", fontSize: 13, fontWeight: 700, color: "#071829", cursor: profileSaving ? "default" : "pointer", opacity: profileSaving ? 0.7 : 1, transition: "background 0.3s" }}>
                        {profileSaving ? "Saving…" : profileSaved ? "✓ Saved" : "Save Changes"}
                      </button>
                      {profileError && <div style={{ fontSize: 11, color: "#ffd166", marginTop: 8, textAlign: "center" }}>{profileError}</div>}
                    </div>
                  </div>

                  <div style={{ background: "#0c2240", border: "1px solid rgba(0,174,239,0.2)", borderRadius: 10, padding: "18px 16px", marginBottom: 14 }}>
                    <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", color: "#5a86a8", marginBottom: 12 }}>Change Password</div>
                    <div style={{ display: "flex", gap: 8 }}>
