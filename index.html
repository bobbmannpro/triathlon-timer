                      <input type="password" value={newPassword} onChange={e => setNewPassword(e.target.value)} placeholder="New password"
                        style={{ flex: 1, background: "#071829", border: "1px solid rgba(0,174,239,0.25)", borderRadius: 6, padding: "9px 12px", color: "#e8f4fb", fontSize: 13, outline: "none" }} />
                      <button onClick={async () => {
                        if (!newPassword || newPassword.length < 6) { setPwMsg("Password must be at least 6 characters."); return; }
                        setPwSaving(true); setPwMsg("");
                        try {
                          await currentUser.updatePassword(newPassword);
                          setPwMsg("Password updated successfully.");
                          setNewPassword("");
                        } catch(e) {
                          setPwMsg(e.code === "auth/requires-recent-login" ? "Please sign out and sign back in first." : "Could not update password.");
                        }
                        setPwSaving(false);
                      }} disabled={pwSaving} style={{ ...btnStyle("#5a86a8"), padding: "9px 16px", fontSize: 12, whiteSpace: "nowrap" }}>
                        {pwSaving ? "…" : "Update"}
                      </button>
                    </div>
                    {pwMsg && <div style={{ marginTop: 8, fontSize: 12, color: pwMsg.includes("success") ? "#4ade80" : "#f87171" }}>{pwMsg}</div>}
                  </div>

                  <button onClick={authSignOut}
                    style={{ width: "100%", background: "transparent", border: "1px solid rgba(248,113,113,0.3)", borderRadius: 6, padding: "11px", fontSize: 13, fontWeight: 700, color: "#f87171", cursor: "pointer" }}>
                    Sign Out
                  </button>
                </div>
              )}

              {/* ── WATCH A RACE ── */}
              {view === "watch" && (() => {
                const watchSegs = liveRace ? (liveRace.segments || SEGMENTS) : SEGMENTS;
                const rankedWatchAthletes = liveRace ? (() => {
                  const clock = spectatorClockMs || liveRace.clockMs || 0;
                  return (liveRace.athletes || []).map(ath => {
                    const chipMs = ath.started && ath.startOffset !== null ? clock - ath.startOffset : null;
                    const finishMs = ath.finished && ath.startOffset !== null && ath.splits
                      ? ath.splits[ath.splits.length - 1] - ath.startOffset : null;
                    let curSeg = null;
                    if (ath.started && !ath.finished && ath.splits) {
                      for (let i = 0; i < ath.splits.length; i++) {
                        if (ath.splits[i] === null) { curSeg = i; break; }
                      }
                    }
                    return { ...ath, chipMs, finishMs, curSeg };
                  }).sort((a, b) => {
                    if (a.finished && b.finished) return a.finishMs - b.finishMs;
                    if (a.finished) return -1; if (b.finished) return 1;
                    if (a.started && b.started) return b.chipMs - a.chipMs;
                    if (a.started) return -1; if (b.started) return 1;
                    return 0;
                  });
                })() : [];
                const watchMedals = ["🥇", "🥈", "🥉"];
                const wFinished = rankedWatchAthletes.filter(a => a.finished).length;
                const wOnCourse = rankedWatchAthletes.filter(a => a.started && !a.finished).length;
                return (
                  <div style={{ paddingTop: 8 }}>
                    {!liveRace ? (
                      <div style={{ maxWidth: 400, margin: "0 auto" }}>
                        <div style={{ textAlign: "center", marginBottom: 24 }}>
                          <div style={{ fontSize: 44, marginBottom: 10 }}>👀</div>
                          <div style={{ fontFamily: "'Bebas Neue'", fontSize: 26, letterSpacing: 3, color: "#e8f4fb" }}>Watch a Race</div>
                          <div style={{ fontSize: 13, color: "#5a86a8", marginTop: 4 }}>Enter the code from the race organizer</div>
                        </div>
                        <input value={spectatorCode} onChange={e => setSpectatorCode(e.target.value.toUpperCase())}
                          onKeyDown={e => e.key === "Enter" && watchRace(spectatorCode)}
                          placeholder="RACE CODE" maxLength={6}
                          style={{ width: "100%", boxSizing: "border-box", background: "#0c2240", border: "2px solid rgba(167,139,250,0.4)", borderRadius: 8, padding: "16px", marginBottom: 12, color: "#a78bfa", fontSize: 28, fontFamily: "'Bebas Neue'", letterSpacing: 8, outline: "none", textAlign: "center", display: "block" }} />
                        <button onClick={() => watchRace(spectatorCode)} disabled={liveRaceLoading}
                          style={{ width: "100%", background: "#a78bfa", border: "none", borderRadius: 8, padding: "14px", fontSize: 14, fontWeight: 700, color: "#071829", cursor: "pointer", letterSpacing: 1 }}>
                          {liveRaceLoading ? "Connecting…" : "Watch Race"}
                        </button>
                        {liveRaceError && <div style={{ marginTop: 12, fontSize: 13, color: "#f87171", textAlign: "center" }}>{liveRaceError}</div>}
                      </div>
                    ) : (
                      <div>
                        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
                          <div>
                            <div style={{ fontFamily: "'Bebas Neue'", fontSize: 20, letterSpacing: 3, color: "#e8f4fb", lineHeight: 1 }}>{liveRace.publisherName}'s Race</div>
                            <div style={{ fontSize: 10, color: "#5a86a8", letterSpacing: 1, marginTop: 3 }}>
                              CODE: {liveRace.code}&nbsp;&nbsp;·&nbsp;&nbsp;{wFinished} finished&nbsp;&nbsp;·&nbsp;&nbsp;{wOnCourse} on course
                            </div>
                          </div>
                          <button onClick={() => { if (liveRaceUnsubRef.current) { liveRaceUnsubRef.current.ref.off("value", liveRaceUnsubRef.current.fn); liveRaceUnsubRef.current = null; } setLiveRace(null); setSpectatorCode(""); setWatchSelectedAthId(null); watchSelectedAthIdRef.current = null; localStorage.removeItem("tri-active-watch"); }}
                            style={{ background: "none", border: "1px solid rgba(90,134,168,0.3)", borderRadius: 4, color: "#5a86a8", fontSize: 11, cursor: "pointer", padding: "5px 10px" }}>Leave</button>
                        </div>
                        <div style={{ background: "linear-gradient(135deg,#0c2240,#0d3a6e)", borderRadius: 10, padding: "12px 20px", marginBottom: 16, textAlign: "center", border: "1px solid rgba(0,174,239,0.25)" }}>
                          <div style={{ fontSize: 10, letterSpacing: 3, color: "#5a86a8", marginBottom: 2 }}>RACE CLOCK</div>
                          <div style={{ fontFamily: "'Bebas Neue'", fontSize: 52, letterSpacing: 4, color: "#00aeef", lineHeight: 1 }}>{formatTime(spectatorClockMs || liveRace.clockMs || 0)}</div>
                        </div>
                        <div style={{ fontSize: 10, letterSpacing: 3, color: "#5a86a8", textAlign: "center", marginBottom: 12 }}>LEADERBOARD</div>
                        {rankedWatchAthletes.length === 0 && <div style={{ textAlign: "center", color: "#3a6080", padding: "30px 0" }}>Waiting for athletes…</div>}
                        {rankedWatchAthletes.map((ath, idx) => {
                          const place = idx + 1;
                          const medal = watchMedals[idx] || null;
                          const curSeg = ath.curSeg;
                          const splitDurs = (ath.splits || []).map((s, si) => {
                            if (s === null || s === undefined) return null;
                            const prev = si === 0 ? ath.startOffset : ath.splits[si - 1];
                            return (prev !== null && prev !== undefined) ? s - prev : null;
                          });
                          const borderColor = ath.finished ? "rgba(74,222,128,0.4)" : ath.started ? "rgba(0,174,239,0.3)" : "rgba(255,255,255,0.07)";
                          const topAccent = ath.finished ? "#4ade80" : ath.started ? "#00aeef" : "transparent";
                          const isSelected = ath.id === watchSelectedAthId;
                          return (
                            <div key={ath.id}
                              onClick={() => { const next = isSelected ? null : ath.id; setWatchSelectedAthId(next); watchSelectedAthIdRef.current = next; }}
                              style={{ background: "#0c2240", borderRadius: 10, marginBottom: 10, border: `1px solid ${isSelected ? "rgba(167,139,250,0.6)" : borderColor}`, borderTop: `3px solid ${isSelected ? "#a78bfa" : topAccent}`, overflow: "hidden", cursor: "pointer" }}>
                              <div style={{ padding: "12px 14px" }}>
                                <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                                  <div style={{ minWidth: 40, textAlign: "center", flexShrink: 0 }}>
                                    {medal && ath.finished
                                      ? <div style={{ fontSize: 28, lineHeight: 1 }}>{medal}</div>
                                      : <div style={{ fontFamily: "'Bebas Neue'", fontSize: 30, color: ath.finished ? "#4ade80" : ath.started ? "#00aeef" : "#2a4060", lineHeight: 1 }}>{place}</div>}
                                  </div>
                                  <div style={{ flex: 1, minWidth: 0 }}>
                                    <div style={{ fontWeight: 700, fontSize: 15, color: "#e8f4fb", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>
                                      {ath.name}
                                      {ath.hr && (Date.now() - (ath.hr.t||0) < 15000) && <span style={{ fontSize: 11, color: "#f4742b", marginLeft: 6, fontWeight: 400 }}>❤️ {ath.hr.bpm}</span>}
                                    </div>
                                    <div style={{ fontSize: 11, color: "#5a86a8", marginTop: 1 }}>{ath.ageGroup}{ath.ageGroup && ath.gender ? " · " : ""}{ath.gender}</div>
                                  </div>
                                  <div style={{ textAlign: "right", flexShrink: 0 }}>
                                    {ath.finished ? (
                                      <div>
                                        <div style={{ fontSize: 9, fontWeight: 700, color: "#4ade80", letterSpacing: 1 }}>FINISHED</div>
                                        <div style={{ fontFamily: "'Bebas Neue'", fontSize: 24, color: "#4ade80", letterSpacing: 2, lineHeight: 1.2 }}>{formatElapsed(ath.finishMs)}</div>
                                      </div>
                                    ) : ath.started ? (
                                      <div>
                                        <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: 1, color: curSeg !== null ? segColors[curSeg % segColors.length] : "#00aeef", background: curSeg !== null ? `${segColors[curSeg % segColors.length]}18` : "transparent", borderRadius: 3, padding: "1px 6px", display: "inline-block", marginBottom: 2 }}>
                                          {curSeg !== null ? watchSegs[curSeg] : "RACING"}
                                        </div>
                                        <div style={{ fontFamily: "'Bebas Neue'", fontSize: 24, color: "#00aeef", letterSpacing: 2, lineHeight: 1 }}>{formatElapsed(ath.chipMs)}</div>
                                      </div>
                                    ) : (
                                      <div style={{ fontSize: 11, color: "#3a6080" }}>Waiting…</div>
                                    )}
                                  </div>
                                </div>
                                {ath.started && (
                                  <div style={{ display: "flex", gap: 4, marginTop: 10 }}>
                                    {watchSegs.map((seg, si) => {
                                      const done = splitDurs[si] !== null && splitDurs[si] !== undefined;
                                      const isCurrent = curSeg === si;
                                      const col = segColors[si % segColors.length];
                                      const prevMs = si === 0 ? ath.startOffset : (ath.splits || [])[si - 1];
                                      const curSegMs = isCurrent && prevMs !== null && prevMs !== undefined ? (spectatorClockMs || liveRace.clockMs || 0) - prevMs : null;
                                      return (
                                        <div key={seg} style={{ flex: "1 1 0", background: done ? `${col}15` : isCurrent ? `${col}10` : "rgba(255,255,255,0.03)", border: `1px solid ${done ? col + "50" : isCurrent ? col + "40" : "rgba(255,255,255,0.06)"}`, borderRadius: 5, padding: "4px 4px 5px", textAlign: "center", minWidth: 0 }}>
                                          <div style={{ fontSize: 8, color: done ? col : isCurrent ? col : "#2a4060", letterSpacing: 0.5, fontWeight: 700, marginBottom: 2 }}>{seg}</div>
                                          <div style={{ fontSize: 11, color: done ? "#e8f4fb" : isCurrent ? col : "#1a3050", fontFamily: (done || isCurrent) ? "'Bebas Neue'" : "inherit", letterSpacing: (done || isCurrent) ? 1 : 0 }}>
                                            {done ? formatElapsed(splitDurs[si]) : isCurrent && curSegMs !== null ? formatElapsed(curSegMs) : "—"}
                                          </div>
                                        </div>
                                      );
                                    })}
                                  </div>
                                )}
                                {isSelected && (() => {
                                  const gps = ath.gps || watchLastGpsRef.current[ath.id];
                                  if (!gps && !ath.hr) return null;
                                  return (
                                    <div style={{ borderTop: "1px solid rgba(167,139,250,0.2)", padding: "10px 14px", background: "rgba(167,139,250,0.05)" }}>
                                      <div style={{ fontSize: 10, color: "#a78bfa", letterSpacing: 2, marginBottom: 6 }}>📍 LIVE DATA</div>
                                      <div style={{ display: "flex", gap: 14, fontSize: 11, color: "#5a86a8", flexWrap: "wrap" }}>
                                        {gps?.distanceMi != null && <span>Distance: <strong style={{ color: "#e8f4fb" }}>{gps.distanceMi.toFixed(2)} mi</strong></span>}
                                        {gps?.speed != null && gps.speed > 0 && <span>Speed: <strong style={{ color: "#e8f4fb" }}>{(gps.speed * 2.237).toFixed(1)} mph</strong></span>}
                                        {ath.hr && (Date.now() - (ath.hr.t||0) < 15000) && <span>❤️ <strong style={{ color: "#f4742b" }}>{ath.hr.bpm} bpm</strong></span>}
                                        {ath.trainer && (Date.now() - (ath.trainer.t||0) < 15000) && <span>🚲 <strong style={{ color: "#ffd166" }}>{ath.trainer.distMi?.toFixed(2)} mi</strong></span>}
                                      </div>
                                    </div>
                                  );
                                })()}
                              </div>
                            </div>
                          );
                        })}
                        {/* Live GPS Map — below all athlete rows so it never overlaps the race clock on scroll */}
                        {(() => {
                          const wps = (liveRace.waypoints || []).filter(w => w.lat !== null && w.lng !== null);
                          const hasGps = rankedWatchAthletes.some(a => a.gps);
                          return (
                            <div style={{ marginTop: 16, borderRadius: 10, overflow: "hidden", border: "1px solid rgba(74,222,128,0.3)", position: "relative", zIndex: 0, isolation: "isolate", contain: "layout paint" }}>
                              <div style={{ fontSize: 10, letterSpacing: 3, color: "#4ade80", padding: "8px 12px", background: "#0c2240", display: "flex", alignItems: "center", justifyContent: "space-between" }}>
                                <span>📍 LIVE GPS MAP</span>
                                {liveRaceCode && <button onClick={() => clearWatchTrails(liveRace?.code)} style={{ background: "none", border: "1px solid rgba(90,134,168,0.3)", borderRadius: 4, color: "#5a86a8", fontSize: 10, cursor: "pointer", padding: "2px 8px" }}>🗑 Trails</button>}
                              </div>
                              <div ref={watchMapContainerRef} style={{ height: 220 }} />
                              <div style={{ position: "absolute", bottom: 8, right: 8, display: "flex", alignItems: "center", gap: 5, background: "rgba(7,24,41,0.75)", borderRadius: 20, padding: "4px 8px", zIndex: 1000 }}>
                                <div style={{ width: 8, height: 8, borderRadius: "50%", background: hasGps ? "#4ade80" : "#3a6080", boxShadow: hasGps ? "0 0 0 0 rgba(74,222,128,0.6)" : "none", animation: hasGps ? "gpsping 1.4s ease-out infinite" : "none" }} />
                                <span style={{ fontSize: 9, color: hasGps ? "#4ade80" : "#3a6080", letterSpacing: 1, fontWeight: 700 }}>{hasGps ? "GPS LIVE" : "NO SIGNAL"}</span>
                              </div>
                            </div>
                          );
                        })()}
                      </div>
                    )}
                  </div>
                );
              })()}

              {/* ── SETUP ── */}
              {view === "setup" && (
                <div>
                  {/* Clear Race button */}
                  <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 10 }}>
                    {clearRaceConfirm ? (
                      <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                        <span style={{ fontSize: 12, color: "#f87171" }}>Clear all setup?</span>
                        <button onClick={clearRace} style={{ ...btnStyle("#f87171"), padding: "5px 14px", fontSize: 12 }}>Yes, Clear</button>
                        <button onClick={() => setClearRaceConfirm(false)} style={{ ...btnStyle("#5a86a8", true), padding: "5px 12px", fontSize: 12 }}>Cancel</button>
                      </div>
                    ) : (
                      <button onClick={() => setClearRaceConfirm(true)} style={{ ...btnStyle("#5a86a8", true), padding: "5px 14px", fontSize: 12 }}>&#10005; Clear Race</button>
                    )}
                  </div>

                  {/* Save-before-registration modal */}
                  {showSaveBeforeReg && (
                    <div style={{ position: "fixed", inset: 0, background: "rgba(7,24,41,0.92)", zIndex: 300, display: "flex", alignItems: "center", justifyContent: "center", padding: "0 20px" }}
                      onClick={e => { if (e.target === e.currentTarget) setShowSaveBeforeReg(false); }}>
                      <div style={{ background: "#0c2240", border: "2px solid #4ade80", borderRadius: 12, padding: "24px 20px", width: "100%", maxWidth: 420 }}>
                        <div style={{ fontSize: 14, fontWeight: 700, color: "#e8f4fb", marginBottom: 6 }}>Name this race before opening registration</div>
                        <div style={{ fontSize: 12, color: "#5a86a8", marginBottom: 16 }}>The race code is locked in when you save — it will never change for this race.</div>
                        <input
                          autoFocus
                          value={saveRaceName}
                          onChange={e => setSaveRaceName(e.target.value)}
                          onKeyDown={e => { if (e.key === "Enter" && saveRaceName.trim()) saveAndOpenRegistration(saveRaceName); }}
                          placeholder="e.g. Spring 2026 Tri"
                          style={{ width: "100%", background: "#071829", border: "1px solid rgba(74,222,128,0.5)", borderRadius: 6, padding: "10px 12px", color: "#e8f4fb", fontSize: 14, outline: "none", boxSizing: "border-box", marginBottom: 12 }}
                        />

                          <div key={agIdx} style={{ display: "flex", alignItems: "center", gap: 6, background: "#071829", border: "1px solid rgba(0,174,239,0.18)", borderRadius: 6, padding: "6px 10px" }}>

                              </>
                            ) : (
                              <>
                                <input type="number" value={s.a} min={0} max={199}
                                  onChange={e => update(s.type, Math.max(0, +e.target.value), s.b)}
                                  style={{ background: "#0c2240", border: "1px solid rgba(0,174,239,0.2)", borderRadius: 4, padding: "4px 6px", color: "#e8f4fb", fontSize: 13, width: 52, outline: "none", textAlign: "center" }} />

                          </div>

                        style={{ background: "#071829", border: "1px solid rgba(0,174,239,0.3)", borderRadius: 4, padding: "8px 12px", color: "#e8f4fb", fontSize: 13, outline: "none" }} />
                      <input value={certConfig.orgName} onChange={e => setCertConfig(cfg => ({ ...cfg, orgName: e.target.value }))} placeholder="Organization name (optional)"
                        style={{ background: "#071829", border: "1px solid rgba(0,174,239,0.3)", borderRadius: 4, padding: "8px 12px", color: "#e8f4fb", fontSize: 13, outline: "none" }} />
                      <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                        <button onClick={() => logoInputRef.current.click()} style={{ ...btnStyle("#5a86a8", true), padding: "7px 14px", fontSize: 12 }}>&#8679; Custom Logo</button>
                        {certConfig.customLogoB64 && <span style={{ fontSize: 11, color: "#4ade80" }}>&#10003; Logo uploaded</span>}
                        {certConfig.customLogoB64 && <button onClick={() => setCertConfig(cfg => ({ ...cfg, customLogoB64: null }))} style={{ background: "none", border: "none", color: "#5a86a8", cursor: "pointer", fontSize: 12 }}>Remove</button>}
                        <input ref={logoInputRef} type="file" accept="image/*" style={{ display: "none" }} onChange={handleLogoImport} />
                      </div>
                    </div>
                  </div>

                  {/* ── GPS Waypoints ── */}
                  <div style={{ marginTop: 20, background: "#0c2240", border: "2px solid rgba(74,222,128,0.35)", borderRadius: 8 }}>

                    {/* Sticky map + heading — stays visible while scrolling waypoint list */}
                    <div style={{ position: "sticky", top: clockBannerH, zIndex: 50, background: "#0c2240", borderRadius: "8px 8px 0 0", padding: "10px 16px 0", boxShadow: "0 -20px 0 20px #071829" }}>
                      <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 4 }}>
                        <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 3, textTransform: "uppercase", color: "#4ade80" }}>📍 GPS Waypoints</div>
                        <div style={{ fontSize: 10, color: "#5a86a8" }}>— tap map to place pins</div>
                      </div>

                      {activePlacementId && (
                        <div style={{ fontSize: 11, color: "#ffd166", background: "rgba(255,209,102,0.08)", border: "1px solid rgba(255,209,102,0.3)", borderRadius: 6, padding: "7px 12px", marginBottom: 8, textAlign: "center" }}>
                          Click the map to place <strong>{waypoints.find(w => w.id === activePlacementId)?.label}</strong> — or press Esc to cancel
                        </div>
                      )}
                      <div ref={initSetupMap} style={{ height: 240, borderRadius: 8, overflow: "hidden", marginBottom: 10, cursor: activePlacementId ? "crosshair" : "grab", outline: activePlacementId ? "2px solid #ffd166" : "none" }} />

                    {/* Sync setup map pins on every render */}
                    {(() => {
                      const map = setupMapRef.current;
                      if (!map) return null;
                      Object.keys(setupMapPinsRef.current).forEach(id => {
                        if (!waypoints.find(wp => wp.id === id)) { setupMapPinsRef.current[id].remove(); delete setupMapPinsRef.current[id]; }
                      });
                      waypoints.forEach((wp, wi) => {
                        if (wp.lat == null || wp.lng == null) { if (setupMapPinsRef.current[wp.id]) { setupMapPinsRef.current[wp.id].remove(); delete setupMapPinsRef.current[wp.id]; } return; }
                        const color = WP_COLORS[wi % WP_COLORS.length];
                        const makeIcon = c => L.divIcon({ className: "", html: `<div style="background:${c};width:16px;height:16px;border-radius:50%;border:2px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.7)"></div>`, iconSize: [16,16], iconAnchor: [8,8] });
                        if (setupMapPinsRef.current[wp.id]) {
                          setupMapPinsRef.current[wp.id].setLatLng([wp.lat, wp.lng]);
                          setupMapPinsRef.current[wp.id].setIcon(makeIcon(color));
                          setupMapPinsRef.current[wp.id].setTooltipContent(wp.label);
                        } else {
                          const marker = L.marker([wp.lat, wp.lng], { draggable: true, icon: makeIcon(color) })
                            .bindTooltip(wp.label, { permanent: true, direction: "top", offset: [0,-14], className: "leaflet-ath-label" })
                            .addTo(map);
                          marker.on("dragend", e => { const p = e.target.getLatLng(); setWaypoints(wps => wps.map(w => w.id === wp.id ? { ...w, lat: +p.lat.toFixed(6), lng: +p.lng.toFixed(6) } : w)); });
                          setupMapPinsRef.current[wp.id] = marker;
                        }
                      });
                      return null;
                    })()}
                    </div>{/* end sticky map wrapper */}

                    {/* Waypoint cards — scroll under the sticky map */}
                    <div style={{ padding: "4px 16px 14px" }}>
                    {waypoints.map((wp, wi) => {
                      const wpColor = WP_COLORS[wi % WP_COLORS.length];
                      return (
                      <div key={wp.id} data-wp-drag-idx={wi}
                        onDragOver={e => onWpDragOver(e, wi)} onDrop={e => onWpDrop(e, wi)}
                        style={{ background: activePlacementId === wp.id ? "rgba(255,209,102,0.06)" : "#071829", borderRadius: 6, padding: "10px 12px", marginBottom: 8, border: `1px solid ${activePlacementId === wp.id ? "rgba(255,209,102,0.5)" : wpDragOverIdx === wi && wpDragIdx !== wi ? "rgba(74,222,128,0.6)" : `${wpColor}44`}`, transition: "border-color 0.15s", display: "flex", gap: 8, opacity: wpDragIdx === wi ? 0.4 : 1 }}>
                        {/* Color dot + drag handle */}
                        <div style={{ display: "flex", flexDirection: "column", alignItems: "center", gap: 4, flexShrink: 0 }}>
                          <div style={{ width: 12, height: 12, borderRadius: "50%", background: wpColor, border: "2px solid white", boxShadow: `0 0 6px ${wpColor}99`, flexShrink: 0 }} />
                          <div
                            draggable
                            onDragStart={e => onWpDragStart(e, wi)} onDragEnd={onWpDragEnd}
                            onTouchStart={e => onWpTouchStart(e, wi)} onTouchMove={onWpTouchMove} onTouchEnd={onWpTouchEnd}
                            style={{ display: "flex", alignItems: "center", justifyContent: "center", cursor: "grab", color: "#3a6080", fontSize: 20, userSelect: "none", touchAction: "none" }}
                            title="Drag to reorder">⠿</div>
                        </div>
                        <div style={{ flex: 1, minWidth: 0 }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 6 }}>
                          {wp.fixed
                            ? <div style={{ fontSize: 13, fontWeight: 700, color: "#4ade80", flex: 1 }}>{wp.label}</div>
                            : <input value={wp.label} onChange={e => setWaypoints(pws => pws.map(w => w.id === wp.id ? { ...w, label: e.target.value } : w))}
                                style={{ flex: 1, background: "transparent", border: "none", borderBottom: "1px solid rgba(74,222,128,0.3)", color: "#4ade80", fontSize: 13, fontWeight: 700, outline: "none", padding: "0 0 2px 0" }} />
                          }
                          <select
                            value={wp.action === "start" ? "start" : wp.action === "marker" ? "marker" : `seg_${wp.segIdx}`}
                            onChange={e => {
                              const v = e.target.value;
                              setWaypoints(pws => pws.map(w => w.id !== wp.id ? w :
                                v === "start"  ? { ...w, action: "start",  segIdx: undefined } :
                                v === "marker" ? { ...w, action: "marker", segIdx: undefined } :
                                                 { ...w, action: "split",  segIdx: parseInt(v.replace("seg_","")) }
                              ));
                            }}
                            style={{ background: "#0c2240", border: "1px solid rgba(0,174,239,0.25)", borderRadius: 4, padding: "2px 6px", fontSize: 11, color: "#e8f4fb", outline: "none", cursor: "pointer", flexShrink: 0 }}>
                            <option value="start">Starts clock</option>
                            <option value="marker">Map only</option>
                            {SEGMENTS.map((seg, si) => <option key={si} value={`seg_${si}`}>Logs {seg}</option>)}
                          </select>
                          <button onClick={() => setWaypoints(pws => pws.map(w => w.id === wp.id ? { ...w, enabled: !w.enabled } : w))}
                            title={wp.enabled !== false ? "GPS auto-trigger ON — click to disable" : "GPS auto-trigger OFF — click to enable"}
                            style={{ background: wp.enabled !== false ? "rgba(74,222,128,0.15)" : "rgba(248,113,113,0.1)", border: `1px solid ${wp.enabled !== false ? "rgba(74,222,128,0.4)" : "rgba(248,113,113,0.3)"}`, borderRadius: 4, padding: "2px 7px", fontSize: 9, color: wp.enabled !== false ? "#4ade80" : "#f87171", cursor: "pointer", letterSpacing: 1, flexShrink: 0 }}>
                            {wp.enabled !== false ? "GPS ON" : "GPS OFF"}
                          </button>
                          {!wp.fixed && <button onClick={() => setWaypoints(wps => wps.filter(w => w.id !== wp.id))} style={{ background: "none", border: "none", color: "#5a86a8", fontSize: 16, cursor: "pointer", lineHeight: 1, padding: "0 2px" }}>&times;</button>}
                        </div>
                        <div style={{ display: "flex", gap: 6, flexWrap: "wrap", alignItems: "center" }}>
                          <button onClick={() => { const id = activePlacementId === wp.id ? null : wp.id; activePlacementRef.current = id; setActivePlacementId(id); }}
                            style={{ ...btnStyle(activePlacementId === wp.id ? "#ffd166" : "#4ade80", activePlacementId !== wp.id), padding: "5px 10px", fontSize: 11 }}>
                            {activePlacementId === wp.id ? "✕ Cancel" : "🗺 Pick on Map"}
                          </button>
                          <button onClick={() => dropWaypointHere(wi)} style={{ ...btnStyle("#4ade80", true), padding: "5px 10px", fontSize: 11 }}>
                            📍 My Location
                          </button>
                          <div style={{ display: "flex", alignItems: "center", gap: 4 }}>
                            <span style={{ fontSize: 10, color: "#5a86a8" }}>±</span>
                            <input type="number" min="5" max="500" value={wp.radiusM}
                              onChange={e => setWaypoints(wps => wps.map((w, i) => i === wi ? { ...w, radiusM: +e.target.value } : w))}
                              style={{ width: 52, background: "#0c2240", border: "1px solid rgba(74,222,128,0.2)", borderRadius: 4, padding: "5px 6px", color: "#e8f4fb", fontSize: 11, outline: "none", textAlign: "center" }} />
                            <span style={{ fontSize: 10, color: "#5a86a8" }}>m</span>
                          </div>
                          {wp.lat != null
                            ? <div style={{ fontSize: 10, color: "#4ade80" }}>✓ {wp.lat.toFixed(4)}, {wp.lng.toFixed(4)}</div>
                            : <div style={{ fontSize: 10, color: "#5a86a8" }}>Not placed</div>}
                          {wp.lat != null && <button onClick={() => setWaypoints(wps => wps.map((w, i) => i === wi ? { ...w, lat: null, lng: null } : w))} style={{ background: "none", border: "none", color: "#5a86a8", fontSize: 13, cursor: "pointer" }}>&times;</button>}
                        </div>
                        </div>
                      </div>
                    ); })}

                    <button onClick={() => setWaypoints(wps => [...wps, { id: `cp_${Date.now()}`, label: "Checkpoint", lat: null, lng: null, radiusM: 30, action: "marker", fixed: false }])}
                      style={{ ...btnStyle("#5a86a8", true), width: "100%", padding: "8px", fontSize: 12, marginTop: 4 }}>
                      + Add Checkpoint
                    </button>
                    </div>{/* end cards section */}
                  </div>{/* end GPS Waypoints card */}

                  {/* ── Saved Races ── */}
                  <div style={{ marginTop: 20, background: "#0c2240", border: "1px solid rgba(0,174,239,0.2)", borderRadius: 8, padding: "14px 16px" }}>
                    <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 3, textTransform: "uppercase", color: "#5a86a8", marginBottom: 12 }}>
                      Saved Race Presets
                    </div>

                    {/* Save current setup */}
                    <div style={{ display: "flex", flexDirection: "column", gap: 8, marginBottom: savedRaces.length > 0 ? 14 : 0 }}>
                      <input
                        value={saveRaceName}
                        onChange={e => setSaveRaceName(e.target.value)}
                        onKeyDown={e => e.key === "Enter" && saveRace()}
                        placeholder="Race name (e.g. Spring 2026)"
                        style={{ width: "100%", background: "#071829", border: "1px solid rgba(0,174,239,0.3)", borderRadius: 4, padding: "10px 12px", color: "#e8f4fb", fontSize: 13, outline: "none" }}
                      />
                      <div style={{ display: "flex", gap: 8 }}>
                        <button onClick={saveRace} style={{ ...btnStyle("#4ade80"), flex: 1, padding: "10px", fontSize: 13 }}>
                          Save Setup
                        </button>
                        {loadedRaceId && (
                          <button onClick={updateSavedRace} style={{ ...btnStyle("#ffd166"), flex: 1, padding: "10px", fontSize: 13 }}>
                            Update Race
                          </button>
                        )}
                      </div>
                    </div>

                    {/* Saved race list */}
                    {savedRaces.length > 0 && (
                      <div style={{ display: "flex", flexDirection: "column", gap: 6 }}>
                        {savedRaces.map(race => (
                          <div key={race.id} style={{ background: "#071829", border: "1px solid rgba(255,255,255,0.07)", borderRadius: 6, padding: "10px 12px", display: "flex", alignItems: "center", justifyContent: "space-between", gap: 10, flexWrap: "wrap" }}>
                            <div style={{ flex: 1, minWidth: 0 }}>
                              <div style={{ fontWeight: 700, fontSize: 13, color: "#e8f4fb", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{race.name}</div>
                              <div style={{ fontSize: 11, color: "#3a6080", marginTop: 2 }}>
                                {race.athletes.length} athletes &nbsp;&middot;&nbsp; {(race.courses || []).map(c => c.name).join(" / ") || `${race.swimYards}y/${race.bikeMiles}mi/${race.runMiles}mi`} &nbsp;&middot;&nbsp; {race.savedAt}
                                {race.waypoints && race.waypoints.some(w => w.lat !== null) && <span style={{ color: "#4ade80", marginLeft: 6 }}>· 📍 {race.waypoints.filter(w => w.lat !== null).length} waypoints</span>}
                              </div>
                            </div>
                            <div style={{ display: "flex", gap: 6, flexShrink: 0 }}>
                              <button onClick={() => loadRace(race)} style={{ ...btnStyle("#00aeef"), padding: "5px 12px", fontSize: 11 }}>Load</button>
                              {deleteConfirm === race.id ? (
                                <>
                                  <button onClick={() => deleteRace(race.id)} style={{ ...btnStyle("#f4742b"), padding: "5px 10px", fontSize: 11 }}>Delete?</button>
                                  <button onClick={() => setDeleteConfirm(null)} style={{ ...btnStyle("#5a86a8", true), padding: "5px 10px", fontSize: 11 }}>No</button>
                                </>
                              ) : (
                                <button onClick={() => setDeleteConfirm(race.id)} style={{ background: "none", border: "none", color: "#3a6080", fontSize: 16, cursor: "pointer", padding: "0 4px" }}>&times;</button>
                              )}
                            </div>
                          </div>
                        ))}
                      </div>
                    )}

                    {savedRaces.length === 0 && (
                      <div style={{ fontSize: 12, color: "#3a6080", marginTop: 6 }}>
                        No presets saved yet — set up your athletes &amp; distances above, then save.
                      </div>
                    )}
                  </div>

                  <div style={{ marginTop: 14, background: "#0a3358", borderLeft: "3px solid #00aeef", borderRadius: 4, padding: "10px 14px", fontSize: 12, color: "#7aa8c8" }}>
                    {raceMode === "simultaneous"
                      ? <>All athletes start the moment you press <strong style={{ color: "#ffd166" }}>START RACE</strong>. Tap segments in order — <strong style={{ color: "#f4742b" }}>Run</strong> ends their race. Use <strong style={{ color: "#48cae4" }}>Edit Times</strong> to correct any mis-tap.</>
                      : <>Tap <strong style={{ color: "#48cae4" }}>Send Off</strong> per athlete at dive-in, or <strong style={{ color: "#ffd166" }}>Send Off All</strong> for a mass start. Tap segments in order — <strong style={{ color: "#f4742b" }}>Run</strong> ends their race. Use <strong style={{ color: "#48cae4" }}>Edit Times</strong> to correct any mis-tap.</>
                    }
                  </div>
                </div>
              )}

              {/* ── RACE ── */}
              {view === "race" && (
                <div>
                  {!clockStarted && (
                    <div style={{ background: "linear-gradient(135deg,#0a3358,#0d3a6e)", border: `2px solid ${raceMode === "simultaneous" ? "#ffd166" : "#00aeef"}`, borderRadius: 8, padding: "20px", marginBottom: 16, textAlign: "center" }}>
                      <div style={{ fontFamily: "'Bebas Neue'", fontSize: 22, letterSpacing: 3, color: "#e8f4fb", marginBottom: 4 }}>Ready to Race?</div>
                      {raceMode === "simultaneous" && (
                        <div style={{ fontSize: 11, color: "#ffd166", marginBottom: 10, letterSpacing: 1 }}>SIMULTANEOUS START — all athletes go at once</div>
                      )}
                      <button onClick={startClock} style={{ ...btnStyle(raceMode === "simultaneous" ? "#ffd166" : "#00aeef"), fontSize: 18, padding: "14px 40px", letterSpacing: 3, fontFamily: "'Bebas Neue'" }}>
                        &#9654; START RACE
                      </button>
                    </div>
                  )}

                  {clockStarted && anyUnstarted && raceMode === "separate" && (
                    <button onClick={sendOffAll} style={{ ...btnStyle("#ffd166"), width: "100%", marginBottom: 12, fontSize: 14, letterSpacing: 2 }}>
                      &#9654;&#9654; Send Off All (Simultaneous Start)
                    </button>
                  )}

                  <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 3, textTransform: "uppercase", color: "#5a86a8", marginBottom: 10 }}>
                    {athletes.length} Athletes &nbsp;&mdash;&nbsp; Tap to log splits
                    <div style={{ marginTop: 10 }}>
                      {!liveRaceCode ? (
                        <div>
                          <button disabled={livePublishing} onClick={async () => {
                            setLivePublishError("");
                            setLivePublishing(true);
                            const code = registrationCode || generateRaceCode();
                            const ok = await publishLiveRace(code);
                            setLivePublishing(false);
                            if (ok === true) { setLiveRaceCode(code); }
                            else { setLivePublishError(String(ok || "Could not go live.")); }
                          }} style={{ ...btnStyle("#ffd166", true), padding: "5px 14px", fontSize: 11, letterSpacing: 1, opacity: livePublishing ? 0.6 : 1 }}>
                            {livePublishing ? "Publishing…" : "📡 Go Live"}
                          </button>
                          {livePublishError && <div style={{ fontSize: 11, color: "#f87171", marginTop: 6, maxWidth: 280, lineHeight: 1.4 }}>{livePublishError}</div>}
                        </div>
                      ) : (
                        <div style={{ display: "inline-flex", flexWrap: "wrap", alignItems: "center", gap: 8, background: "rgba(255,209,102,0.08)", border: "1px solid rgba(255,209,102,0.3)", borderRadius: 6, padding: "6px 12px" }}>
                          <span style={{ fontSize: 11, color: "#5a86a8", letterSpacing: 1 }}>LIVE</span>
                          <span style={{ fontFamily: "'Bebas Neue'", fontSize: 22, color: "#ffd166", letterSpacing: 4 }}>{liveRaceCode}</span>
                          <span style={{ fontSize: 10, color: "#5a86a8" }}>share with spectators</span>
                          <button onClick={() => { if (liveRaceUnsubRef.current) { liveRaceUnsubRef.current.ref.off("value", liveRaceUnsubRef.current.fn); liveRaceUnsubRef.current = null; } setLiveRaceCode(null); localStorage.removeItem("tri-active-live"); rtdb.ref("liveRaces/" + liveRaceCode).remove().catch(console.error); }}
                            style={{ background: "none", border: "none", color: "#3a6080", cursor: "pointer", fontSize: 16, padding: "0 2px", lineHeight: 1 }}>&times;</button>
                        </div>
                      )}
                    </div>
                  </div>

                  {athletes.map((ath, i) => {
                    const next = nextUnloggedSeg(ath);
                    const done = ath.finished;
                    const chipElapsed = ath.startOffset !== null ? clockMs - ath.startOffset : null;
                    const gt = gunTime(ath);
                    const isEditing = editTarget === i;

                    // Live elapsed time for whichever segment the athlete is currently in
                    const liveSegMs = (!done && next >= 0)
                      ? (next === 0
                          ? (ath.startOffset !== null ? clockMs - ath.startOffset : null)
                          : (ath.splits[next - 1] !== null ? clockMs - ath.splits[next - 1] : null))
                      : null;

                    return (
                      <div key={ath.id} style={{
                        background: "#0c2240", borderRadius: 8, marginBottom: 10,
                        border: `1px solid ${done ? "#4ade80" : ath.started ? "rgba(0,174,239,0.3)" : "rgba(255,255,255,0.06)"}`,
                        overflow: "hidden",
                      }}>
                        {/* Header row */}
                        <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "10px 14px", borderBottom: "1px solid rgba(255,255,255,0.06)" }}>
                          <div style={{ display: "flex", alignItems: "center", gap: 10 }}>
                            <div style={{ fontFamily: "'Bebas Neue'", fontSize: 22, color: done ? "#4ade80" : "#00aeef", lineHeight: 1, minWidth: 24 }}>{i + 1}</div>
                            <div>
                              <div style={{ display: "flex", alignItems: "center", gap: 7 }}>
                                <span style={{ fontWeight: 700, fontSize: 14, color: "#e8f4fb" }}>{ath.name}</span>
                                {athleteGpsStatus[i] && (
                                  <div style={{ width: 7, height: 7, borderRadius: "50%", background: "#4ade80", boxShadow: "0 0 0 0 rgba(74,222,128,0.6)", animation: "gpsping 1.4s ease-out infinite", flexShrink: 0 }} title="GPS active" />
                                )}
                                {athleteHrData[i] && (
                                  <span style={{ fontSize: 11, color: "#f4742b", fontWeight: 700 }}>❤️ {athleteHrData[i].bpm}</span>
                                )}
                                {athleteTrainerData[i] && (
                                  <span style={{ fontSize: 11, color: "#ffd166", fontWeight: 700 }}>🚲{athleteTrainerData[i].speed != null ? ` ${(athleteTrainerData[i].speed * 0.621).toFixed(1)}mph` : ""}</span>
                                )}
                                {ath.dob && calcAge(ath.dob) !== null && (
                                  <span style={{ fontSize: 11, color: "#5a86a8" }}>Age {calcAge(ath.dob)}</span>
                                )}
                              </div>
                              <div style={{ display: "flex", gap: 12, flexWrap: "wrap" }}>
                                {ath.started && !done && (
                                  <>
                                    <span style={{ fontSize: 11, color: "#5a86a8" }}>Chip: <span style={{ color: "#48cae4" }}>{formatElapsed(chipElapsed)}</span></span>
                                    {liveSegMs !== null && next >= 0 && (
                                      <span style={{ fontSize: 11, color: "#5a86a8" }}>
                                        {SEGMENTS[next]}: <span style={{ color: segColors[next], fontWeight: 700 }}>{formatElapsed(liveSegMs)}</span>
                                      </span>
                                    )}
                                  </>
                                )}
                                {done && (
                                  <>
                                    <span style={{ fontSize: 11, color: "#5a86a8" }}>Chip: <span style={{ color: "#4ade80" }}>{formatElapsed(totalChipTime(ath))}</span></span>
                                    {gt !== null && <span style={{ fontSize: 11, color: "#5a86a8" }}>Gun: <span style={{ color: "#ffd166" }}>{formatElapsed(gt)}</span></span>}
                                  </>
                                )}
                              </div>
                            </div>
                          </div>
                          <div style={{ display: "flex", gap: 6, alignItems: "center" }}>
                            {done && <span style={{ fontSize: 11, fontWeight: 700, color: "#4ade80", letterSpacing: 1 }}>DONE</span>}
                            {!ath.started && clockStarted && (
                              <button onClick={() => sendOff(i)} style={{ ...btnStyle("#00aeef"), padding: "6px 14px", fontSize: 12 }}>Send Off</button>
                            )}
                            {ath.started && (
                              <button onClick={() => openEdit(i)} style={{ ...btnStyle(isEditing ? "#f4742b" : "#5a86a8", true), padding: "5px 10px", fontSize: 11 }}>
                                {isEditing ? "Cancel" : "Edit Times"}
                              </button>
                            )}
                          </div>
                        </div>

                        {/* Segment buttons */}
                        {ath.started && (
                          <div style={{ padding: "10px 14px", display: "flex", flexWrap: "wrap", gap: 6 }}>
                            {SEGMENTS.map((seg, si) => {
                              const logged = ath.splits[si] !== null;
                              const isNext = si === next;
                              const dur = segmentDuration(ath, si);
                              return (
                                <button key={si} onClick={() => !logged && isNext && logSplit(i, si)}
                                  style={{
                                    padding: "6px 12px", borderRadius: 4, border: "none",
                                    cursor: logged ? "default" : isNext ? "pointer" : "not-allowed",
                                    background: logged ? `${segColors[si]}22` : isNext ? segColors[si] : "rgba(255,255,255,0.04)",
                                    color: logged ? segColors[si] : isNext ? "#071829" : "#3a6080",
                                    fontWeight: 700, fontSize: 12, letterSpacing: 0.5, transition: "all 0.15s",
                                  }}>
                                  {seg}{logged && dur !== null ? ` · ${formatElapsed(dur)}` : isNext && liveSegMs !== null ? ` · ${formatElapsed(liveSegMs)}` : ""}
                                </button>
                              );
                            })}
                          </div>
                        )}

                        {/* Trainer bike progress — shows for trainer/spin courses or whenever live trainer data arrives */}
                        {!done && (() => {
                          const athCourse = (courses || []).find(c => c.id === ath.courseId) || (courses || [])[0];
                          const isTrainerCourse = (athCourse?.bikeType || "gps") !== "gps";
                          // Resolve tData BEFORE the gate so we can show the panel for any course when data is present
                          const tDataFb = athleteTrainerData[i];
                          // Fallback: host's own local BLE device — exact match, or solo-athlete case when no UID/name match resolved
                          const hostFallbackIdx = hostAthIdx ?? (athletes.length === 1 ? 0 : null);
                          const tDataLocal = (!tDataFb && i === hostFallbackIdx)
                            ? btDevices.find(d => d.connected && (d.readings.speed != null || d.readings.trainerDistMi != null || d.readings.power != null))
                            : null;
                          const tData = tDataFb || (tDataLocal ? {
                            distMi: tDataLocal.readings.trainerDistMi ?? null,
                            speed:  tDataLocal.readings.speed   ?? null,
                            cadence: tDataLocal.readings.cadence ?? null,
                            power:  tDataLocal.readings.power   ?? null,
                            t: Date.now()
                          } : null);
                          // Show panel if: trainer/spin course (always, to show no-signal prompt) OR any live trainer data arrived
                          if (!isTrainerCourse && !tData) return null;
                          if (next !== 2 && ath.splits[2] !== null) return null; // T2 already done — hide
                          const targetMi = isTrainerCourse ? (parseFloat(athCourse?.bikeMiles) || 0) : 0;
                          const distMi = tData?.distMi ?? null;
                          const pct = targetMi > 0 && distMi != null ? Math.min(100, (distMi / targetMi) * 100) : 0;
                          const inBike = next === 2;
                          return (
                            <div style={{ padding: "0 14px 10px" }}>
                              <div style={{ background: "#071829", borderRadius: 6, padding: "8px 12px", border: `1px solid ${inBike ? "rgba(255,213,102,0.5)" : "rgba(255,213,102,0.2)"}` }}>
                                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: (isTrainerCourse && distMi != null) ? 4 : 0 }}>
                                  <span style={{ fontSize: 10, color: "#ffd166", letterSpacing: 1 }}>🚲 {athCourse?.bikeType === "spin" ? "SPIN BIKE" : "TRAINER"}</span>
                                  <span style={{ fontFamily: "'Bebas Neue'", fontSize: 16, color: "#ffd166", letterSpacing: 1 }}>
                                    {isTrainerCourse
                                      ? (distMi != null ? `${distMi.toFixed(2)} / ${targetMi} mi` : (tData ? '0.00 mi' : 'No signal'))
                                      : (tData ? `${((tData.speed || 0) * 0.621).toFixed(1)} mph` : 'No signal')}
                                  </span>
                                </div>
                                {isTrainerCourse && targetMi > 0 && distMi != null && (
                                  <div style={{ background: "rgba(255,213,102,0.1)", borderRadius: 3, height: 5, marginBottom: 4 }}>
                                    <div style={{ height: "100%", width: `${pct}%`, background: pct >= 100 ? "#4ade80" : "#ffd166", borderRadius: 3, transition: "width 0.4s" }} />
                                  </div>
                                )}
                                <div style={{ fontSize: 10, color: tData ? "#5a86a8" : "#f87171" }}>
                                  {tData
                                    ? `${((tData.speed || 0) * 0.621).toFixed(1)} mph${tData.cadence != null ? ` · ${tData.cadence} rpm` : ''}${tData.power != null ? ` · ${tData.power}w` : ''}${isTrainerCourse && pct >= 100 ? ' · ✓ target reached' : ''}`
                                    : (inBike ? 'No trainer signal — use Bike button above to advance manually' : 'Waiting for trainer signal…')}
                                </div>
                              </div>
                            </div>
                          );
                        })()}

                        {/* Edit panel */}
                        {isEditing && (
                          <div style={{ padding: "14px", background: "#071829", borderTop: "1px solid rgba(255,255,255,0.08)" }}>
                            <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", color: "#5a86a8", marginBottom: 10 }}>
                              Edit Gun Times &nbsp;(MM:SS.T)
                            </div>
                            <div style={{ display: "flex", flexWrap: "wrap", gap: 12 }}>
                              {ath.startOffset !== null && (
                                <div>
                                  <div style={{ fontSize: 10, color: "#5a86a8", marginBottom: 4 }}>Send Off</div>
                                  <input value={editValues["start"] ?? ""} onChange={e => setEditValues(v => ({ ...v, start: e.target.value }))} style={editInputStyle} placeholder="00:00.0" />
                                </div>
                              )}
                              {SEGMENTS.map((seg, si) => ath.splits[si] !== null && (
                                <div key={si}>
                                  <div style={{ fontSize: 10, color: segColors[si], marginBottom: 4 }}>{seg}</div>
                                  <input value={editValues[si] !== undefined ? editValues[si] : ""} onChange={e => setEditValues(v => ({ ...v, [si]: e.target.value }))} style={editInputStyle} placeholder="00:00.0" />
                                </div>
                              ))}
                            </div>
                            <div style={{ marginTop: 8, fontSize: 11, color: "#3a6080" }}>
                              Times are gun times from clock zero. Chip times recalculate automatically.
                            </div>
                            <div style={{ display: "flex", gap: 8, marginTop: 10 }}>
                              <button onClick={() => saveEdits(i)} style={{ ...btnStyle("#4ade80"), padding: "7px 18px", fontSize: 12 }}>Save</button>
                              <button onClick={() => setEditTarget(null)} style={{ ...btnStyle("#5a86a8", true), padding: "7px 18px", fontSize: 12 }}>Cancel</button>
                            </div>
                          </div>
                        )}
                      </div>
                    );
                  })}

                  {allFinished && (
                    <button onClick={() => setView("results")} style={{ ...btnStyle("#4ade80"), width: "100%", marginTop: 8, fontSize: 14 }}>
                      View Results &#8594;
                    </button>
                  )}
                </div>
              )}

              {/* ── RESULTS ── */}
              {view === "results" && (
                <div>
                  <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14, padding: "12px 14px", background: "#0c2240", borderRadius: 8, border: "1px solid rgba(0,174,239,0.15)" }}>
                    <img src={certConfig.customLogoB64 || LOGO_B64} alt="Logo" style={{ height: 44, objectFit: "contain", flexShrink: 0 }} />
                    <div>
                      <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 22, letterSpacing: 3, color: "#e8f4fb", lineHeight: 1 }}>{certConfig.eventName || "Timeathon Results"}</div>
                      <div style={{ fontSize: 10, color: "#5a86a8", letterSpacing: 2, textTransform: "uppercase", marginTop: 2 }}>Swim &middot; Bike &middot; Run</div>
                    </div>
                  </div>
                  <div style={{ display: "flex", alignItems: "flex-start", justifyContent: "space-between", flexWrap: "wrap", gap: 8, marginBottom: 4 }}>
                    <div>
                      <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 3, textTransform: "uppercase", color: "#5a86a8" }}>Final Results</div>
                      <div style={{ fontSize: 11, color: "#3a6080", marginTop: 2 }}>
                        {courses.map(c => `${c.name}: ${c.swimYards}y / ${c.bikeMiles}mi / ${c.runMiles}mi`).join(" · ")}
                      </div>
                    </div>
                    {anyStarted && (
                      <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                        <button onClick={exportCSV} style={{ ...btnStyle("#48cae4", true), padding: "7px 14px", fontSize: 12 }}>
                          &#11015; Export CSV
                        </button>
                        <button onClick={printResults} style={{ ...btnStyle("#4ade80", true), padding: "7px 14px", fontSize: 12 }}>
                          &#128196; Print Results
                        </button>
                        <button onClick={printCertificates} style={{ ...btnStyle("#ffd166", true), padding: "7px 14px", fontSize: 12 }}>
                          &#127942; Print Certificates
                        </button>
                      </div>
                    )}
                  </div>
                  <div style={{ marginBottom: 12 }} />
                  {!anyStarted ? (
                    <div style={{ textAlign: "center", color: "#5a86a8", fontSize: 13, padding: "40px 20px" }}>
                      No race data yet — head to <strong style={{ color: "#00aeef" }}>Race</strong> to start timing.
                    </div>
                  ) : (
                    <div style={{ overflowX: "auto" }}>
                      <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", color: "#5a86a8", marginBottom: 6 }}>Overall</div>
                      <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                        <thead>
                          <tr style={{ borderBottom: "2px solid rgba(255,255,255,0.1)" }}>
                            <th style={thStyle("#5a86a8")}>#</th>
                            <th style={{ ...thStyle("#5a86a8"), textAlign: "left" }}>Athlete</th>
                            <th style={thStyle("#5a86a8")}>Gender</th>
                            <th style={thStyle("#48cae4")}>Age Grp</th>
                            <th style={thStyle("#48cae4")}>Ag #</th>
                            {courses.length > 1 && <th style={thStyle("#ffd166")}>Course</th>}
                            {SEGMENTS.map((seg, si) => <th key={si} style={thStyle(segColors[si])}>{seg}</th>)}
                            <th style={thStyle("#4ade80")}>Chip</th>
                            <th style={thStyle("#ffd166")}>Gun</th>
                            <th style={{ ...thStyle("#00aeef"), borderLeft: "1px solid rgba(255,255,255,0.08)" }}>Swim Pace</th>
                            <th style={thStyle("#ffd166")}>Bike</th>
                            <th style={thStyle("#f4742b")}>Run Pace</th>
                          </tr>
                        </thead>
                        <tbody>
                          {sorted.map((ath, place) => {
                            const chip = totalChipTime(ath);
                            const gt   = gunTime(ath);
                            const swimMs = segmentDuration(ath, 0);
                            const bikeMs = segmentDuration(ath, 2);
                            const runMs  = segmentDuration(ath, 4);
                            const ac = athleteCourse(ath);
                            const sp = calcSwimPace(swimMs, ac.swimYards, units.swim);
                            const bp = calcBikeMph(bikeMs, ac.bikeMiles, units.bike);
                            const rp = calcRunPace(runMs, ac.runMiles, units.run);
                            const agp = ageGroupPlace(ath);
                            const placeColor = place === 0 ? "#4ade80" : place === 1 ? "#ffd166" : place === 2 ? "#48cae4" : "#5a86a8";
                            return (
                              <tr key={ath.id} style={{ borderBottom: "1px solid rgba(255,255,255,0.05)", background: place === 0 && chip !== null ? "rgba(74,222,128,0.04)" : "transparent" }}>
                                <td style={{ padding: "10px 8px", fontFamily: "'Bebas Neue'", fontSize: 20, color: placeColor }}>{place + 1}</td>
                                <td style={{ padding: "10px 8px", fontWeight: 700, color: "#e8f4fb", whiteSpace: "nowrap" }}>{ath.name}</td>
                                <td style={{ padding: "10px 6px", textAlign: "center", color: ath.gender === "Female" ? "#f472b6" : "#48cae4", fontSize: 11, whiteSpace: "nowrap" }}>{ath.gender}</td>
                                <td style={{ padding: "10px 6px", textAlign: "center", color: "#48cae4", fontSize: 11, whiteSpace: "nowrap" }}>{ath.ageGroup}</td>
                                <td style={{ padding: "10px 6px", textAlign: "center", color: "#48cae4", fontWeight: 700, whiteSpace: "nowrap" }}>{agp !== null ? agp : "--"}</td>
                                {courses.length > 1 && <td style={{ padding: "10px 6px", textAlign: "center", color: "#ffd166", fontSize: 11, whiteSpace: "nowrap" }}>{athleteCourse(ath).name}</td>}
                                {SEGMENTS.map((_, si) => {
                                  const dur = segmentDuration(ath, si);
                                  return <td key={si} style={{ padding: "10px 6px", textAlign: "center", color: segColors[si], fontWeight: 600, whiteSpace: "nowrap" }}>{dur !== null ? formatElapsed(dur) : "--"}</td>;
                                })}
                                <td style={{ padding: "10px 8px", textAlign: "center", fontWeight: 800, color: "#4ade80", whiteSpace: "nowrap" }}>{chip !== null ? formatElapsed(chip) : "--"}</td>
                                <td style={{ padding: "10px 8px", textAlign: "center", fontWeight: 700, color: "#ffd166", whiteSpace: "nowrap" }}>{gt !== null ? formatElapsed(gt) : "--"}</td>
                                <td style={{ padding: "10px 8px", textAlign: "center", color: "#00aeef", whiteSpace: "nowrap", borderLeft: "1px solid rgba(255,255,255,0.08)" }}>{sp ?? "--"}</td>
                                <td style={{ padding: "10px 8px", textAlign: "center", color: "#ffd166", whiteSpace: "nowrap" }}>{bp ?? "--"}</td>
                                <td style={{ padding: "10px 8px", textAlign: "center", color: "#f4742b", whiteSpace: "nowrap" }}>{rp ?? "--"}</td>
                              </tr>
                            );
                          })}
                        </tbody>
                      </table>

                      {ageGroupSections.length > 0 && (
                        <div style={{ marginTop: 24 }}>
                          <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", color: "#5a86a8", marginBottom: 12 }}>Age Group Breakdown</div>
                          {ageGroupSections.map(([label, group]) => (
                            <div key={label} style={{ marginBottom: 20 }}>
                              <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", color: "#48cae4", marginBottom: 6, borderLeft: "3px solid #48cae4", paddingLeft: 8 }}>{label}</div>
                              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                                <thead>
                                  <tr style={{ borderBottom: "1px solid rgba(255,255,255,0.08)" }}>
                                    <th style={thStyle("#5a86a8")}>#</th>
                                    <th style={{ ...thStyle("#5a86a8"), textAlign: "left" }}>Athlete</th>
                                    {SEGMENTS.map((seg, si) => <th key={si} style={thStyle(segColors[si])}>{seg}</th>)}
                                    <th style={thStyle("#4ade80")}>Chip</th>
                                  </tr>
                                </thead>
                                <tbody>
                                  {group.map((ath, agPlace) => {
                                    const chip = totalChipTime(ath);
                                    const agPlaceColor = agPlace === 0 ? "#4ade80" : agPlace === 1 ? "#ffd166" : agPlace === 2 ? "#48cae4" : "#5a86a8";
                                    return (
                                      <tr key={ath.id} style={{ borderBottom: "1px solid rgba(255,255,255,0.04)" }}>
                                        <td style={{ padding: "8px 8px", fontFamily: "'Bebas Neue'", fontSize: 18, color: agPlaceColor }}>{agPlace + 1}</td>
                                        <td style={{ padding: "8px 8px", fontWeight: 700, color: "#e8f4fb", whiteSpace: "nowrap" }}>{ath.name}</td>
                                        {SEGMENTS.map((_, si) => {
                                          const dur = segmentDuration(ath, si);
                                          return <td key={si} style={{ padding: "8px 6px", textAlign: "center", color: segColors[si], whiteSpace: "nowrap" }}>{dur !== null ? formatElapsed(dur) : "--"}</td>;
                                        })}
                                        <td style={{ padding: "8px 8px", textAlign: "center", fontWeight: 800, color: "#4ade80", whiteSpace: "nowrap" }}>{chip !== null ? formatElapsed(chip) : "--"}</td>
                                      </tr>
                                    );
                                  })}
                                </tbody>
                              </table>
                            </div>
                          ))}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              )}

            </div>
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
      const splash = document.getElementById("splash");
      if (splash) { splash.classList.add("hide"); setTimeout(() => splash.remove(), 350); }
    </script>
  </body>
</html>
