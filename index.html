    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyCDMEMg22g22LdtSYDDKnK2al2n7bGPDhY",
        authDomain: "timeathon.firebaseapp.com",
        projectId: "timeathon",

    <script type="text/babel" data-presets="react">
      const { useState, useEffect, useRef, useCallback } = React;

      // Run is the final segment — logging it ends the race for that athlete
      const SEGMENTS   = ["Swim", "T1", "Bike", "T2", "Run"];
      const segColors  = ["#00aeef", "#48cae4", "#ffd166", "#48cae4", "#f4742b"];
      const WP_COLORS  = ["#ffd166","#06d6a0","#00aeef","#f4742b","#a78bfa","#f472b6","#34d399","#fb923c","#60a5fa","#facc15"];
      const DEFAULT_AGE_GROUPS = ["8 & Under", "9-10", "11-12", "13-14", "15+"];
      // LOGO_B64 is defined in the preceding plain <script> tag (keeps Babel fast)

      // ── Formatting helpers ───────────────────────────────────────────────────
      function formatTime(ms) {
        if (ms === null || ms === undefined) return "--:--.-";
        const totalSecs = Math.floor(ms / 1000);
        const mins = Math.floor(totalSecs / 60);
        const secs = totalSecs % 60;
        const tenths = Math.floor((ms % 1000) / 100);
        return `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}.${tenths}`;
      }

      function formatElapsed(ms) {
        if (ms === null || ms === undefined) return "--:--";
        const totalSecs = Math.floor(ms / 1000);
        const mins = Math.floor(totalSecs / 60);
        const secs = totalSecs % 60;
        return `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
      }

      function parseTimeInput(str) {
        if (!str) return null;
        const match = str.trim().match(/^(\d+):(\d{2})(?:\.(\d))?$/);
        if (!match) return null;
        const mins = parseInt(match[1]);
        const secs = parseInt(match[2]);
        const tenths = match[3] ? parseInt(match[3]) : 0;
        return (mins * 60 + secs) * 1000 + tenths * 100;
      }

      // ── Pace calculators ─────────────────────────────────────────────────────
      function calcSwimPace(ms, dist, unit) {
        if (!ms || !dist || dist <= 0) return null;
        const secsPerHundred = (ms / 1000) / dist * 100;
        const mins = Math.floor(secsPerHundred / 60);
        const secs = Math.floor(secsPerHundred % 60);
        return `${mins}:${String(secs).padStart(2, "0")} /100${unit === "meters" ? "m" : "y"}`;
      }

      function calcBikeMph(ms, dist, unit) {
        if (!ms || !dist || dist <= 0) return null;
        return `${(dist / (ms / 3600000)).toFixed(1)} ${unit === "km" ? "km/h" : "mph"}`;
      }

      function calcRunPace(ms, dist, unit) {
        if (!ms || !dist || dist <= 0) return null;
        const ppu = (ms / 60000) / dist;
        const mins = Math.floor(ppu);
        const secs = Math.floor((ppu - mins) * 60);
        return `${mins}:${String(secs).padStart(2, "0")} /${unit === "km" ? "km" : "mi"}`;
      }

      function calcAge(dob) {
        if (!dob) return null;
        const d = new Date(dob), today = new Date();
        let age = today.getFullYear() - d.getFullYear();
        if (today.getMonth() - d.getMonth() < 0 || (today.getMonth() === d.getMonth() && today.getDate() < d.getDate())) age--;
        return age;
      }

      function placeSuffix(n) {
        if (n === 11 || n === 12 || n === 13) return `${n}th`;
        const s = ["th","st","nd","rd"];
        return `${n}${s[n % 10] || s[0]}`;
      }

      // ── Athlete time helpers ─────────────────────────────────────────────────
      function segmentDuration(athlete, segIndex) {
        const times = athlete.splits;
        if (segIndex === 0) {
          if (times[0] === null || athlete.startOffset === null) return null;
          return times[0] - athlete.startOffset;
        }
        if (times[segIndex] === null || times[segIndex - 1] === null) return null;
        return times[segIndex] - times[segIndex - 1];
      }

      function totalChipTime(athlete) {
        const last = athlete.splits[SEGMENTS.length - 1];
        if (last === null || athlete.startOffset === null) return null;
        return last - athlete.startOffset;
      }

      function gunTime(athlete) {
        const last = athlete.splits[SEGMENTS.length - 1];
        return last !== null ? last : null;
      }

      function freshAthlete(name = "", id = Date.now(), gender = "Male", ageGroup = "9-10", courseId = null) {
        const parts = name.trim().split(" ");
        const firstName = parts[0] || "";
        const lastName = parts.slice(1).join(" ") || "";
        return { id, name: name.trim(), firstName, lastName, gender, ageGroup, courseId, dob: "", startOffset: null, splits: Array(SEGMENTS.length).fill(null), started: false, finished: false };
      }
      function athleteName(ath) {
        if (ath.firstName || ath.lastName) return `${ath.firstName || ""} ${ath.lastName || ""}`.trim();
        return ath.name || "";
      }

      function parseSegTime(str) {
        if (!str || !str.trim()) return null;
        const clean = str.trim().replace(/[^0-9:.]/g, "");
        const parts = clean.split(":");
        if (parts.length === 2) {
          const m = parseInt(parts[0], 10);
          const s = parseFloat(parts[1]);
          if (isNaN(m) || isNaN(s)) return null;
          return (m * 60 + s) * 1000;
        }
        if (parts.length === 1) {
          const s = parseFloat(parts[0]);
          return isNaN(s) ? null : s * 1000;
        }
        return null;
      }

      // ── Style helpers ────────────────────────────────────────────────────────
      function btnStyle(color, outline = false) {
        return {
          background: outline ? "transparent" : color,
          border: `2px solid ${color}`,
          color: outline ? color : "#071829",
          padding: "10px 20px",
          borderRadius: 4,
          fontWeight: 700,
          fontSize: 13,
          letterSpacing: 1,
          cursor: "pointer",
        };
      }

      function thStyle(color) {
        return { textAlign: "center", padding: "8px 6px", color, fontWeight: 700, letterSpacing: 1, fontSize: 10, textTransform: "uppercase", whiteSpace: "nowrap" };
      }

      // ── App ──────────────────────────────────────────────────────────────────
      function App() {
        const [view, setView] = useState("home");
        const [raceInitialized, setRaceInitialized] = useState(false); // true once a race is started or loaded; false after clear
        const [homeSection, setHomeSection] = useState(null); // "races" when Existing Race expanded
        const [athletes, setAthletes] = useState([
          { id: 1, name: "Sam",     gender: "Male",   ageGroup: "9-10",  startOffset: null, splits: Array(SEGMENTS.length).fill(null), started: false, finished: false },
          { id: 2, name: "Kai",     gender: "Male",   ageGroup: "9-10",  startOffset: null, splits: Array(SEGMENTS.length).fill(null), started: false, finished: false },
          { id: 3, name: "Larson",  gender: "Male",   ageGroup: "11-12", startOffset: null, splits: Array(SEGMENTS.length).fill(null), started: false, finished: false },
          { id: 4, name: "Everett", gender: "Male",   ageGroup: "11-12", startOffset: null, splits: Array(SEGMENTS.length).fill(null), started: false, finished: false },
          { id: 5, name: "Remy",    gender: "Female", ageGroup: "9-10",  startOffset: null, splits: Array(SEGMENTS.length).fill(null), started: false, finished: false },
          { id: 6, name: "Krish",   gender: "Male",   ageGroup: "11-12", startOffset: null, splits: Array(SEGMENTS.length).fill(null), started: false, finished: false },
          { id: 7, name: "Nixon",   gender: "Male",   ageGroup: "9-10",  startOffset: null, splits: Array(SEGMENTS.length).fill(null), started: false, finished: false },
          { id: 8, name: "Jack",    gender: "Male",   ageGroup: "11-12", startOffset: null, splits: Array(SEGMENTS.length).fill(null), started: false, finished: false },
        ]);

        // Race courses — each athlete is assigned to one; supports mixed-distance events
        const [courses, setCourses] = useState([
          { id: 1, name: "Sprint", swimYards: 100, bikeMiles: 6, runMiles: 1.5, bikeType: "gps" }
        ]);

        // Bike mode is now per-course (each course has its own bikeType field)

        // Age groups — fully customizable per race
        const [ageGroups, setAgeGroups] = useState(DEFAULT_AGE_GROUPS);
        const [certConfig, setCertConfig] = useState({ eventName: "Timeathon Race Event", accentColor: "#00aeef", orgName: "", customLogoB64: null });
        const [units, setUnits] = useState({ swim: "yards", bike: "miles", run: "miles" });
        const [loadedRaceId, setLoadedRaceId] = useState(null);

        const [clockMs, setClockMs]         = useState(0);
        const [clockRunning, setClockRunning] = useState(false);
        const [clockStarted, setClockStarted] = useState(false);
        const [resetConfirm, setResetConfirm] = useState(false);
        const [editTarget, setEditTarget]   = useState(null);
        const [editValues, setEditValues]   = useState({});

        // Auth state
        const [currentUser, setCurrentUser] = useState(null);
        const [authLoading, setAuthLoading] = useState(true);
        const [authMode, setAuthMode] = useState("login");
        const [authEmail, setAuthEmail] = useState("");
        const [authPassword, setAuthPassword] = useState("");
        const [authFirstName, setAuthFirstName] = useState("");
        const [authLastName, setAuthLastName] = useState("");
        const [authBirthday, setAuthBirthday] = useState("");
        const [authGender, setAuthGender] = useState("");
        const [authRole, setAuthRole] = useState("participant");
        const [authError, setAuthError] = useState("");
        const [authWorking, setAuthWorking] = useState(false);
        const [userProfile, setUserProfile] = useState(null);
        const [spectatorCode, setSpectatorCode] = useState("");
        const [liveRace, setLiveRace] = useState(null);
        const [liveRaceError, setLiveRaceError] = useState("");
        const [liveRaceLoading, setLiveRaceLoading] = useState(false);
        const liveRaceUnsubRef = useRef(null);
        const [spectatorClockMs, setSpectatorClockMs] = useState(0);
        const [watchSelectedAthId, setWatchSelectedAthId] = useState(null);
        const watchSelectedAthIdRef = useRef(null);
        const watchLastGpsRef = useRef({});
        const prevClockRunningRef = useRef(false);

        // Local ticker for spectator — interpolates clock forward between RTDB updates
        useEffect(() => {
          if (!liveRace) return;
          const tick = () => {
            if (!liveRace.clockRunning) { setSpectatorClockMs(liveRace.clockMs || 0); return; }
            const elapsed = Math.max(0, Date.now() - (liveRace.updatedAt || Date.now()));
            setSpectatorClockMs((liveRace.clockMs || 0) + elapsed);
          };
          tick();
          const id = setInterval(tick, 100);
          return () => clearInterval(id);
        }, [liveRace]);

        // Auto-clear watch trails when race clock transitions from stopped → running
        useEffect(() => {
          if (!liveRace) { prevClockRunningRef.current = false; return; }
          if (liveRace.clockRunning && !prevClockRunningRef.current) {
            clearWatchTrails(liveRace.code);
          }
          prevClockRunningRef.current = !!liveRace.clockRunning;
        }, [liveRace?.clockRunning]);

        // Dedicated GPS listener — updates Leaflet markers directly without React re-render
        useEffect(() => {
          if (!liveRace || view !== "watch") {
            if (gpsListenerRef.current) {
              gpsListenerRef.current.ref.off("value", gpsListenerRef.current.fn);
              gpsListenerRef.current = null;
            }
            return;
          }
          const raceCode = liveRace.code;
          const ref = rtdb.ref(`liveRaces/${raceCode}/athletes`);
          const fn = snap => {
            try {
              const map = leafletMapRef.current;
              if (!map) return;
              // Guard: map container must still be in the DOM
              const container = map.getContainer && map.getContainer();
              if (!container || !document.body.contains(container)) return;
              const athletes = snap.val() || [];
              athletes.forEach((ath, idx) => {
                if (!ath || !ath.gps) return;
                const pos = [ath.gps.lat, ath.gps.lng];
                const markerId = ath.id || idx;
                const curSeg = (ath.splits || []).findIndex(s => s === null);
                const col = segColors[curSeg === -1 ? SEGMENTS.length - 1 : curSeg] || "#00aeef";
                const athName = ath.firstName ? `${ath.firstName} ${ath.lastName || ""}`.trim() : ath.name || `Athlete ${idx + 1}`;
                const distLabel = ath.gps.distanceMi != null ? ` · ${ath.gps.distanceMi.toFixed(2)} mi` : "";
                const tipText = `${athName}${distLabel}`;
                // Cache last GPS for stable display
                watchLastGpsRef.current[ath.id || idx] = ath.gps;
                try {
                  if (leafletMarkersRef.current[markerId]) {
                    leafletMarkersRef.current[markerId].setLatLng(pos);
                    leafletMarkersRef.current[markerId].setTooltipContent(tipText);
                  } else {
                    leafletMarkersRef.current[markerId] = L.circleMarker(pos, { radius: 10, color: col, fillColor: col, fillOpacity: 0.8, weight: 2 })
                      .bindTooltip(tipText, { permanent: true, direction: "top", offset: [0, -10], className: "leaflet-ath-label" })
                      .addTo(map);
                  }
                  // Trail — only draw once athlete has started
                  if (ath.started) {
                    if (!leafletTrailPointsRef.current[markerId]) leafletTrailPointsRef.current[markerId] = [];
                    leafletTrailPointsRef.current[markerId].push(pos);
                    if (leafletTrailsRef.current[markerId]) {
                      leafletTrailsRef.current[markerId].setLatLngs(leafletTrailPointsRef.current[markerId]);
                      leafletTrailsRef.current[markerId].setStyle({ color: col });
                    } else {
                      leafletTrailsRef.current[markerId] = L.polyline(leafletTrailPointsRef.current[markerId], { color: col, weight: 2.5, opacity: 0.7 }).addTo(map);
                    }
                    // Persist trails to localStorage every 10 points
                    if (leafletTrailPointsRef.current[markerId].length % 10 === 0) {
                      try { localStorage.setItem(`tri-watch-trails-${raceCode}`, JSON.stringify(leafletTrailPointsRef.current)); } catch(_) {}
                    }
                  }
                  if (markerId === watchSelectedAthIdRef.current) {
                    map.panTo(pos, { animate: true, duration: 0.5 });
                  }
                } catch(_) { delete leafletMarkersRef.current[markerId]; }
              });
            } catch(_) {}
          };
          ref.on("value", fn);
          gpsListenerRef.current = { ref, fn };
          return () => { ref.off("value", fn); gpsListenerRef.current = null; };
        }, [liveRace?.code, view]);

        // Watch map init — only re-runs when the race changes, not on every GPS update
        useEffect(() => {
          if (view !== "watch" || !liveRace) {
            if (leafletMapRef.current) {
              leafletMapRef.current.remove();
              leafletMapRef.current = null;
              leafletMarkersRef.current = {};
              leafletTrailsRef.current = {};
              leafletTrailPointsRef.current = {};
            }
            return;
          }
          const el = watchMapContainerRef.current;
          if (!el || leafletMapRef.current) return;
          const wps = (liveRace.waypoints || []).filter(w => w.lat !== null && w.lng !== null);
          const athletes = liveRace.athletes || [];
          const firstGps = athletes.find && athletes.find(a => a && a.gps);
          const center = wps[0] ? [wps[0].lat, wps[0].lng]
            : firstGps ? [firstGps.gps.lat, firstGps.gps.lng]
            : [37.7749, -122.4194];
          const map = L.map(el, { zoomControl: true, attributionControl: false }).setView(center, 15);
          L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png").addTo(map);
          if (wps.length > 1) {
            L.polyline(wps.map(w => [w.lat, w.lng]), { color: "#4ade80", weight: 3, opacity: 0.7 }).addTo(map);
          }
          wps.forEach(wp => {
            L.circleMarker([wp.lat, wp.lng], { radius: 8, color: "#4ade80", fillColor: "#4ade80", fillOpacity: 0.3, weight: 2 })
              .bindTooltip(wp.label, { permanent: true, direction: "top", offset: [0, -10], className: "leaflet-ath-label" }).addTo(map);
          });
          // Restore persisted trails
          try {
            const savedTrails = JSON.parse(localStorage.getItem(`tri-watch-trails-${liveRace.code}`) || "{}");
            Object.entries(savedTrails).forEach(([markerId, pts]) => {
              if (!pts || pts.length < 2) return;
              leafletTrailPointsRef.current[markerId] = pts;
              leafletTrailsRef.current[markerId] = L.polyline(pts, { color: "#00aeef", weight: 2.5, opacity: 0.7 }).addTo(map);
            });
          } catch(_) {}
          athletes.forEach && athletes.forEach((ath, idx) => {
            if (!ath || !ath.gps) return;
            const pos = [ath.gps.lat, ath.gps.lng];
            const markerId = ath.id || idx;
            const curSeg = (ath.splits || []).findIndex(s => s === null);
            const col = segColors[curSeg === -1 ? SEGMENTS.length - 1 : curSeg] || "#00aeef";
            const athName = ath.firstName ? `${ath.firstName} ${ath.lastName || ""}`.trim() : ath.name || `Athlete ${idx + 1}`;
            const distLabel = ath.gps.distanceMi != null ? ` · ${ath.gps.distanceMi.toFixed(2)} mi` : "";
            leafletMarkersRef.current[markerId] = L.circleMarker(pos, { radius: 10, color: col, fillColor: col, fillOpacity: 0.8, weight: 2 })
              .bindTooltip(`${athName}${distLabel}`, { permanent: true, direction: "top", offset: [0, -10], className: "leaflet-ath-label" })
              .addTo(map);
          });
          leafletMapRef.current = map;
          setTimeout(() => map.invalidateSize(), 200);
        }, [liveRace?.code, view]);

        // Measure clock banner height so sticky map knows where to sit
        useEffect(() => {
          const measure = () => { if (clockBannerRef.current) setClockBannerH(clockBannerRef.current.offsetHeight); };
          measure();

                const theirCol = segColors[theirSeg === -1 ? SEGMENTS.length - 1 : theirSeg] || "#a78bfa";
                if (joinAllMarkersRef.current[markerId]) {
                  joinAllMarkersRef.current[markerId].setLatLng(pos);
                  joinAllMarkersRef.current[markerId].setStyle({ color: theirCol, fillColor: theirCol });
                } else {
                  joinAllMarkersRef.current[markerId] = L.circleMarker(pos, { radius: 8, color: theirCol, fillColor: theirCol, fillOpacity: 0.8, weight: 2 })
                    .bindTooltip(athName, { permanent: false, direction: "top" })
                    .on("click", () => { try { joinLeafletMapRef.current?.panTo(pos, { animate: true, duration: 0.5 }); } catch(_) {} })
                    .addTo(map);
                }
              });
            } catch(_) {}
          };
          ref.on("value", fn);
          joinGpsMapListenerRef.current = { ref, fn };
          return () => { ref.off("value", fn); joinGpsMapListenerRef.current = null; };
        }, [joinRace?.code, joinAthIdx, view]);

        // Reset trainer trigger flag when race changes
        useEffect(() => { bikeSegTriggeredRef.current = false; }, [joinRace?.code]);

        // Auto-trigger T2 split when trainer distance reaches the bike target
        useEffect(() => {
          if (!joinRace) return;
          const myAth = joinRace.athletes?.[joinAthIdx];
          const myCourse = (joinRace.courses || []).find(c => c.id === myAth?.courseId) || (joinRace.courses || [])[0];
          const coursebikeType = myCourse?.bikeType || "gps";
          if (coursebikeType === "gps") return;
          if (bikeSegTriggeredRef.current) return;
          const splits = joinLiveData?.athletes?.[joinAthIdx]?.splits || [];
          const bikeStarted = splits[1] != null;
          const bikeEnded = splits[2] != null;
          if (bikeEnded) { bikeSegTriggeredRef.current = true; return; }
          if (!bikeStarted) return;
          const targetMi = parseFloat(myCourse?.bikeMiles) || 0;
          if (targetMi <= 0) return;
          const trainer = btDevices.find(d => d.readings.trainerDistMi != null && d.readings.trainerDistMi >= targetMi);
          if (!trainer) return;
          bikeSegTriggeredRef.current = true;
          triggerSplit(2, () => setJoinNextSeg(n => n + 1));
        }, [btDevices, joinLiveData?.athletes?.[joinAthIdx]?.splits?.join(","), joinRace?.code]);

        // Re-acquire Wake Lock whenever the page becomes visible (lock is auto-released on hide)

                }

        async function authSignIn() {

        function generateRaceCode() {
          return Math.random().toString(36).substring(2, 8).toUpperCase();
        }

        function resolveAgeGroup(dob, groups) {
          if (!dob || !groups || !groups.length) return null;
          const age = calcAge(dob);
          if (age === null) return null;
          return groups.find(g => { const r = parseAgeRange(g); return r && age >= r.min && age <= r.max; }) || null;
        }

        async function _doOpenRegistration(code) {
          const payload = {
            code,
            publishedBy: currentUser.uid,
            publisherName: userProfile?.displayName || userProfile?.firstName || currentUser.email,
            status: "registration",
            raceName: certConfig.eventName || "Timeathon Race",
            courses: courses.map(c => ({ id: c.id, name: c.name, swimYards: c.swimYards, bikeMiles: c.bikeMiles, runMiles: c.runMiles })),
            ageGroups,
            segments: SEGMENTS,
            waypoints: waypoints.filter(wp => wp.lat !== null),
            updatedAt: Date.now(),
            registrations: {}
          };
          try {
            await rtdb.ref("liveRaces/" + code).set(payload);
            setRegistrationCode(code);
            setRegistrationOpen(true);
            setRegAthleteCount(0);
            stopRegListener(); // detach any previous listener before attaching a new one
            const ref = rtdb.ref("liveRaces/" + code + "/registrations");
            const fn = snap => {
              if (!snap.exists()) { setRegAthleteCount(0); return; }
              const regs = snap.val();
              const entries = Object.values(regs);
              setRegAthleteCount(entries.length);
              setAthletes(prev => {
                const existingUids = new Set(prev.map(a => a.uid).filter(Boolean));
                const toAdd = entries.filter(r => !existingUids.has(r.uid)).map(r => ({
                  ...freshAthlete(`${r.firstName} ${r.lastName}`.trim(), r.uid, r.gender, r.ageGroup),
                  uid: r.uid,
                  dob: r.dob || "",
                  courseId: r.courseId || courses[0]?.id || null
                }));
                return toAdd.length > 0 ? [...prev, ...toAdd] : prev;
              });
            };
            ref.on("value", fn, err => console.error("reg listener:", err));
            regListenerRef.current = { ref, fn };
          } catch(e) { console.error("openRegistration:", e); }
        }

        async function openRegistration() {
          if (!currentUser) return;
          if (!loadedRaceId) { setShowSaveBeforeReg(true); return; }
          // Reuse existing code or generate a new one and lock it in
          const code = registrationCode || generateRaceCode();
          if (!registrationCode) {
            // Persist the code into the saved race so it never changes
            persistRaces(savedRaces.map(r => r.id === loadedRaceId ? { ...r, code } : r));
          }
          await _doOpenRegistration(code);
        }

        async function saveAndOpenRegistration(nameVal) {
          if (!currentUser) return;
          const name = nameVal.trim() || `Race ${savedRaces.length + 1}`;
          const code = registrationCode || generateRaceCode();
          const id = Date.now();
          const raceAthletes = athletes.map(a => ({ name: a.name, firstName: a.firstName || "", lastName: a.lastName || "", gender: a.gender, ageGroup: a.ageGroup, dob: a.dob || "", courseId: a.courseId || null }));
          const entry = { id, name, code, savedAt: new Date().toLocaleDateString(), ageGroups, courses, units, certConfig, waypoints, athletes: raceAthletes };
          persistRaces([...savedRaces, entry]);
          mergeAthletesToLibrary(athletes);
          setLoadedRaceId(id);
          setSaveRaceName("");
          setShowSaveBeforeReg(false);
          await _doOpenRegistration(code);
        }

        async function registerForRace(code, profileData, selectedCourseId) {
          if (!currentUser) { setRegError("You must be logged in to register."); return; }
          setRegWorking(true); setRegError("");
          const uid = currentUser.uid;
          const raceName = regRaceData?.raceName || "Race";
          const hostName = regRaceData?.publisherName || "Unknown";
          const ageGroup = resolveAgeGroup(profileData.dob, regRaceData?.ageGroups || ageGroups) || profileData.ageGroup || (regRaceData?.ageGroups?.[0] ?? ageGroups[0]);
          const registration = {
            uid,
            firstName: profileData.firstName.trim(),
            lastName: profileData.lastName.trim(),
            name: `${profileData.firstName.trim()} ${profileData.lastName.trim()}`.trim(),
            gender: profileData.gender,
            ageGroup,
            dob: profileData.dob || "",
            courseId: selectedCourseId || regRaceData?.courses?.[0]?.id || null,
            joinedAt: Date.now()
          };
          try {
            await rtdb.ref("liveRaces/" + code + "/registrations/" + uid).set(registration);
            const joined = { code, raceName, hostName, joinedAt: Date.now() };
            const updatedJoined = { ...joinedRaces, [code]: joined };
            setJoinedRaces(updatedJoined);
            try { localStorage.setItem("tri-joined-races", JSON.stringify(updatedJoined)); } catch(e) {}
            rtdb.ref("users/" + uid + "/joinedRaces/" + code).set(joined).catch(console.error);
            // Always go to the dashboard — even if race isn't live yet, the Firebase
            // listener will update in real-time when the host publishes/starts.
            const athListSnap = await rtdb.ref("liveRaces/" + code + "/athletes").once("value");
            const currentAths = athListSnap.val() || [];
            let athIdx = currentAths.findIndex(a => a.uid === uid);
            if (athIdx === -1) {
              athIdx = currentAths.length;
              await rtdb.ref("liveRaces/" + code + "/athletes/" + athIdx).set({
                uid, id: uid, name: registration.name,
                firstName: registration.firstName, lastName: registration.lastName,
                gender: registration.gender, ageGroup,
                dob: registration.dob, courseId: registration.courseId,
                splits: Array(SEGMENTS.length).fill(null),
                started: false, finished: false, startOffset: null, joinedAt: registration.joinedAt
              });
            } else {
              await rtdb.ref("liveRaces/" + code + "/athletes/" + athIdx).update({ uid, courseId: registration.courseId });
            }
            const raceSnap = await rtdb.ref("liveRaces/" + code).once("value");
            const raceData = raceSnap.val();
            if (raceData) {
              const segs = raceData.segments || SEGMENTS;
              if (raceData.athletes) {
                raceData.athletes = raceData.athletes.map(ath => ({
                  ...ath, splits: Array.from({ length: segs.length }, (_, i) =>
                    ath.splits?.[i] !== undefined && ath.splits?.[i] !== null ? ath.splits[i] : null)
                }));
              }
              bikeSegTriggeredRef.current = false;
              setJoinRace({ ...raceData, code });
              setJoinAthIdx(athIdx);
              setJoinGpsActive(false);
              setJoinNextSeg(0);
            }
          } catch(e) {
            setRegError("Registration failed. Please try again.");
            console.error("registerForRace:", e);
          }
          setRegWorking(false);
        }

        async function publishLiveRace(codeIn) {
          if (!currentUser) return "Not logged in.";
          const code = codeIn || generateRaceCode();
          stopRegListener();
          setRegistrationOpen(false);
          const payload = {
            code, publishedBy: currentUser.uid,
            publisherName: userProfile?.displayName || userProfile?.firstName || currentUser.email,
            startedAt: Date.now(), clockMs, clockRunning: false, clockStarted: false, status: "live",
            raceName: certConfig.eventName || "Race",
            athletes: athletes.map(a => ({ id: a.id, uid: a.uid || null, name: a.name, firstName: a.firstName || "", lastName: a.lastName || "", gender: a.gender, ageGroup: a.ageGroup, courseId: a.courseId || null, dob: a.dob || null, started: a.started, finished: a.finished, startOffset: a.startOffset, splits: a.splits })),
            segments: SEGMENTS, updatedAt: Date.now(),
            courses,
            waypoints: waypoints.filter(wp => wp.lat !== null)
          };
          try {
            const timeout = new Promise((_, rej) => setTimeout(() => rej(new Error("timeout")), 8000));
            await Promise.race([rtdb.ref("liveRaces/" + code).set(payload), timeout]);
            return true;
          } catch(e) {
            console.error("publishLiveRace failed:", e.message);
            if (e.message === "timeout") return "Connection timed out — check your internet.";
            return e.message || "Failed to go live.";
          }

        function updateLiveRace(code) {
          if (!code || !currentUser) return;
          // Multi-path update: only touches explicit paths, never overwrites /athletes/{i}/gps, /trainer, /hr
          const updates = {
            clockMs, clockRunning,
            updatedAt: Date.now(),
            waypoints: waypoints.filter(wp => wp.lat !== null)
          };
          athletes.forEach((ath, i) => {
            updates[`athletes/${i}/id`]          = ath.id;
            updates[`athletes/${i}/uid`]         = ath.uid || null;
            updates[`athletes/${i}/name`]        = ath.name;
            updates[`athletes/${i}/firstName`]   = ath.firstName || "";
            updates[`athletes/${i}/lastName`]    = ath.lastName  || "";
            updates[`athletes/${i}/gender`]      = ath.gender;
            updates[`athletes/${i}/ageGroup`]    = ath.ageGroup;
            updates[`athletes/${i}/courseId`]    = ath.courseId  || null;
            updates[`athletes/${i}/dob`]         = ath.dob       || null;
            updates[`athletes/${i}/started`]     = ath.started;
            updates[`athletes/${i}/finished`]    = ath.finished;
            updates[`athletes/${i}/startOffset`] = ath.startOffset;
            updates[`athletes/${i}/splits`]      = ath.splits;
          });
          rtdb.ref("liveRaces/" + code).update(updates).catch(console.error);
        }

        function watchRace(code) {
          if (!code.trim()) { setLiveRaceError("Enter a race code."); return; }
          setLiveRaceLoading(true); setLiveRaceError("");
          if (liveRaceUnsubRef.current) { liveRaceUnsubRef.current.ref.off("value", liveRaceUnsubRef.current.fn); }
          const ref = rtdb.ref("liveRaces/" + code.trim().toUpperCase());
          const fn = snap => {
            setLiveRaceLoading(false);
            if (!snap.exists()) { setLiveRaceError("No active race found with that code."); setLiveRace(null); }
            else {
              const data = snap.val();
              const segCount = (data.segments || SEGMENTS).length;
              // RTDB strips null from arrays — restore them so split logic works
              if (data.athletes) {
                data.athletes = data.athletes.map(ath => ({
                  ...ath,
                  splits: Array.from({ length: segCount }, (_, i) =>
                    (ath.splits && ath.splits[i] !== undefined && ath.splits[i] !== null) ? ath.splits[i] : null
                  )
                }));
              }
              setLiveRace({ ...data, code: snap.key });
              setLiveRaceError("");
            }
          };
          ref.on("value", fn, () => { setLiveRaceLoading(false); setLiveRaceError("Could not connect. Check the code and try again."); });
          liveRaceUnsubRef.current = { ref, fn };
        }
        function friendlyAuthError(code) {
          const map = { "auth/invalid-email": "Invalid email address.", "auth/user-not-found": "No account with that email.", "auth/wrong-password": "Incorrect password.", "auth/email-already-in-use": "An account with that email already exists.", "auth/weak-password": "Password must be at least 6 characters.", "auth/invalid-credential": "Incorrect email or password." };

        function haversineM(lat1, lng1, lat2, lng2) {

        function parseHeartRate(dv) {

        }

        function parseCscMeasurement(dv, prevCsc, wheelCircM = 2.1) {
          const flags = dv.getUint8(0);
          const hasWheel = flags & 0x01;
          const hasCrank = flags & 0x02;
          let offset = 1;
          let speed = null, cadence = null;
          let cumWheelRevs, lastWheelEvt, cumCrankRevs, lastCrankEvt;

          if (hasWheel && dv.byteLength >= offset + 6) {
            cumWheelRevs = dv.getUint32(offset, true);
            lastWheelEvt = dv.getUint16(offset + 4, true);
            offset += 6;
            if (prevCsc && prevCsc.cumWheelRevs !== undefined) {
              const dRevs = (cumWheelRevs - prevCsc.cumWheelRevs + 0x100000000) % 0x100000000;
              const dTime = ((lastWheelEvt - prevCsc.lastWheelEvt + 0x10000) % 0x10000) / 1024;
              if (dTime > 0) speed = (dRevs * wheelCircM) / dTime;
            }
          }

          if (hasCrank && dv.byteLength >= offset + 4) {
            cumCrankRevs = dv.getUint16(offset, true);
            lastCrankEvt = dv.getUint16(offset + 2, true);
            if (prevCsc && prevCsc.cumCrankRevs !== undefined) {
              const dRevs = (cumCrankRevs - prevCsc.cumCrankRevs + 0x10000) % 0x10000;
              const dTime = ((lastCrankEvt - prevCsc.lastCrankEvt + 0x10000) % 0x10000) / 1024;
              if (dTime > 0) cadence = Math.round((dRevs / dTime) * 60);
            }
          }

          return {
            speed, cadence,
            cumWheelRevs: cumWheelRevs !== undefined ? cumWheelRevs : prevCsc?.cumWheelRevs,
            lastWheelEvt: lastWheelEvt !== undefined ? lastWheelEvt : prevCsc?.lastWheelEvt,
            cumCrankRevs: cumCrankRevs !== undefined ? cumCrankRevs : prevCsc?.cumCrankRevs,
            lastCrankEvt: lastCrankEvt !== undefined ? lastCrankEvt : prevCsc?.lastCrankEvt,

        }

        // FTMS Indoor Bike Data (0x2AD2) — used by Wahoo KICKR, Tacx, etc.
        function parseFtmsIndoorBike(dv) {
          if (dv.byteLength < 2) return {};
          const flags = dv.getUint16(0, true);
          let offset = 2;
          let speed = null, cadence = null, distanceM = null, power = null;
          // Bit 0 = "More Data" flag; when 0, instantaneous speed is present
          if (!(flags & 0x0001)) {
            if (dv.byteLength >= offset + 2) { speed = dv.getUint16(offset, true) / 100 / 3.6; offset += 2; } // km/h → m/s
          }
          if (flags & 0x0002) offset += 2; // avg speed
          if (flags & 0x0004) {
            if (dv.byteLength >= offset + 2) { cadence = dv.getUint16(offset, true) / 2; offset += 2; } // 0.5rpm res
          }
          if (flags & 0x0008) offset += 2; // avg cadence
          if (flags & 0x0010) {
            if (dv.byteLength >= offset + 3) {
              distanceM = dv.getUint8(offset) | (dv.getUint8(offset+1) << 8) | (dv.getUint8(offset+2) << 16);
              offset += 3;
            }
          }
          if (flags & 0x0020) offset += 2; // resistance
          if (flags & 0x0040) {
            if (dv.byteLength >= offset + 2) { power = dv.getInt16(offset, true); offset += 2; }
          }
          return { speed, cadence, distanceM, power };
        }

        async function connectBleDevice(device) {
          const gattServer = await device.gatt.connect();
          const deviceId = device.id;
          btCharacteristicsRef.current[deviceId] = {};

          const services = [
            {
              uuid: "0000180d-0000-1000-8000-00805f9b34fb",
              chars: [{ uuid: "00002a37-0000-1000-8000-00805f9b34fb", key: "hr", parser: (dv) => parseHeartRate(dv) }],
            },
            {
              uuid: "00001816-0000-1000-8000-00805f9b34fb",
              chars: [{ uuid: "00002a5b-0000-1000-8000-00805f9b34fb", key: "csc", parser: (dv, dev) => parseCscMeasurement(dv, dev.readings.cscRaw) }],
            },
            {
              uuid: "00001818-0000-1000-8000-00805f9b34fb",
              chars: [{ uuid: "00002a63-0000-1000-8000-00805f9b34fb", key: "power", parser: (dv) => parseCyclingPower(dv) }],
            },
            {
              uuid: "00001814-0000-1000-8000-00805f9b34fb",
              chars: [{ uuid: "00002a53-0000-1000-8000-00805f9b34fb", key: "rsc", parser: (dv) => parseRscMeasurement(dv) }],
            },
            {
              // FTMS — Fitness Machine Service (Wahoo KICKR, Tacx, most smart trainers)
              uuid: "00001826-0000-1000-8000-00805f9b34fb",
              chars: [{ uuid: "00002ad2-0000-1000-8000-00805f9b34fb", key: "ftms", parser: (dv) => parseFtmsIndoorBike(dv) }],
            },
          ];

          for (const svc of services) {
            let service;
            try { service = await gattServer.getPrimaryService(svc.uuid); } catch (_) { continue; }
            for (const { uuid, key, parser } of svc.chars) {
              let char;
              try { char = await service.getCharacteristic(uuid); } catch (_) { continue; }
              btCharacteristicsRef.current[deviceId][uuid] = char;
              await char.startNotifications();
              char.addEventListener("characteristicvaluechanged", e => {
                setBtDevices(prev => prev.map(d => {
                  if (d.id !== deviceId) return d;
                  const parsed = parser(e.target.value, d);
                  const r = { ...d.readings };
                  if (key === "csc") {
                    r.cscRaw = { ...parsed };
                    if (parsed.speed !== null && parsed.speed !== undefined) r.speed = +(parsed.speed * 3.6).toFixed(1);
                    if (parsed.cadence !== null && parsed.cadence !== undefined) r.cadence = parsed.cadence;
                    if (parsed.cumWheelRevs != null) {
                      const base = d.trainerBaseRevs ?? parsed.cumWheelRevs;
                      r.trainerDistMi = +Math.max(0, (parsed.cumWheelRevs - base) * 2.1 / 1609.344).toFixed(3);
                      const code = joinRaceCodeRef.current ?? hostRaceCodeRef.current, idx = joinAthIdxRef.current ?? hostAthIdxRef.current;
                      if (code !== null && idx !== null) {
                        rtdb.ref(`liveRaces/${code}/athletes/${idx}/trainer`)
                          .set({ distMi: r.trainerDistMi, speed: r.speed ?? null, cadence: r.cadence ?? null, power: r.power ?? null, t: Date.now() }).catch(console.error);
                      }
                      return { ...d, readings: r, trainerBaseRevs: base };
                    }
                    // No wheel revs — still push speed/cadence so trainer signal stays alive
                    if (r.speed != null || r.cadence != null) {
                      const code = joinRaceCodeRef.current ?? hostRaceCodeRef.current, idx = joinAthIdxRef.current ?? hostAthIdxRef.current;
                      if (code !== null && idx !== null) {
                        rtdb.ref(`liveRaces/${code}/athletes/${idx}/trainer`)
                          .set({ distMi: r.trainerDistMi ?? null, speed: r.speed ?? null, cadence: r.cadence ?? null, power: r.power ?? null, t: Date.now() }).catch(console.error);
                      }
                    }
                  } else if (key === "hr") {
                    r.heartRate = parsed.heartRate;
                    const code = joinRaceCodeRef.current ?? hostRaceCodeRef.current, idx = joinAthIdxRef.current ?? hostAthIdxRef.current;
                    if (code !== null && idx !== null) {
                      rtdb.ref(`liveRaces/${code}/athletes/${idx}/hr`)
                        .set({ bpm: parsed.heartRate, t: Date.now() }).catch(console.error);
                    }
                    return { ...d, readings: r, hrHistory: [...(d.hrHistory || []), { t: Date.now(), bpm: parsed.heartRate }].slice(-7200) };
                  } else if (key === "power") {
                    r.power = parsed.power;
                    const code = joinRaceCodeRef.current ?? hostRaceCodeRef.current, idx = joinAthIdxRef.current ?? hostAthIdxRef.current;
                    if (code !== null && idx !== null) {
                      rtdb.ref(`liveRaces/${code}/athletes/${idx}/trainer`)
                        .set({ distMi: r.trainerDistMi ?? null, speed: r.speed ?? null, cadence: r.cadence ?? null, power: r.power ?? null, t: Date.now() }).catch(console.error);
                    }
                  } else if (key === "rsc") {
                    r.speed = +(parsed.speed * 3.6).toFixed(1);
                    r.cadence = parsed.cadence;
                  } else if (key === "ftms") {
                    if (parsed.speed != null) r.speed = +(parsed.speed * 3.6).toFixed(1);
                    if (parsed.cadence != null) r.cadence = +parsed.cadence.toFixed(0);
                    if (parsed.power != null) r.power = parsed.power;
                    let baseM = d.trainerBaseDistM;
                    if (parsed.distanceM != null) {
                      r.ftmsDistM = parsed.distanceM;
                      baseM = d.trainerBaseDistM ?? parsed.distanceM;
                      r.trainerDistMi = +Math.max(0, (parsed.distanceM - baseM) / 1609.344).toFixed(3);
                    }
                    // Push on every FTMS notification — speed/cadence alone is enough to keep trainer signal alive
                    const code = joinRaceCodeRef.current ?? hostRaceCodeRef.current, idx = joinAthIdxRef.current ?? hostAthIdxRef.current;
                    if (code !== null && idx !== null) {
                      rtdb.ref(`liveRaces/${code}/athletes/${idx}/trainer`)
                        .set({ distMi: r.trainerDistMi ?? null, speed: r.speed ?? null, cadence: r.cadence ?? null, power: r.power ?? null, t: Date.now() }).catch(console.error);
                    }
                    return { ...d, readings: r, trainerBaseDistM: baseM };
                  }
                  return { ...d, readings: r };
                }));
              });
            }
          }

          device.addEventListener("gattserverdisconnected", () => {
            setBtDevices(prev => prev.map(d => d.id === deviceId ? { ...d, connected: false, gattServer: null } : d));
          });

          setBtDevices(prev => prev.map(d => d.id === deviceId ? { ...d, gattServer, connected: true } : d));
          acquireWakeLock();
        }

        async function scanBluetooth() {
          if (!btSupported) return;
          setBtScanning(true);
          try {
            const device = await navigator.bluetooth.requestDevice({
              filters: [
                { services: ["heart_rate"] },
                { services: ["cycling_speed_and_cadence"] },
                { services: ["cycling_power"] },
                { services: ["running_speed_and_cadence"] },
                { services: ["fitness_machine"] },
              ],
              optionalServices: ["heart_rate", "cycling_speed_and_cadence", "cycling_power", "running_speed_and_cadence", "fitness_machine"],
            });
            setBtDevices(prev => prev.some(d => d.id === device.id) ? prev
              : [...prev, { id: device.id, name: device.name || "Unknown Device", device, gattServer: null, connected: false, readings: {}, hrHistory: [], trainerBaseRevs: null, trainerBaseDistM: null }]);
            await connectBleDevice(device);
          } catch (err) {
            if (err.name !== "NotFoundError") console.error("BLE scan error:", err);
          } finally {
            setBtScanning(false);
          }
        }

        function disconnectBleDevice(deviceId) {
          const chars = btCharacteristicsRef.current[deviceId] || {};
          for (const char of Object.values(chars)) {
            try { char.stopNotifications(); } catch (_) {}
          }
          delete btCharacteristicsRef.current[deviceId];
          setBtDevices(prev => {
            const dev = prev.find(d => d.id === deviceId);
            if (dev?.gattServer?.connected) {
              try { dev.device.gatt.disconnect(); } catch (_) {}
            }
            return prev.filter(d => d.id !== deviceId);
          });
        }

        function goToRace() {
          setAthletes(a => a.map((ath, i) => ({ ...ath, name: ath.name || `Athlete ${i + 1}` })));
          setView("race");
        }

        function sendOff(athleteIdx) {
          setAthletes(a => a.map((ath, i) => i === athleteIdx ? { ...ath, startOffset: clockMs, started: true } : ath));
        }

        function sendOffAll() {
          const offset = clockStarted ? clockMs : 0;
          if (!clockStarted) {
            offsetRef.current = 0;
            setClockMs(0);
            setClockRunning(true);
            setClockStarted(true);
          }
          setAthletes(a => a.map(ath => ath.started ? ath : { ...ath, startOffset: offset, started: true }));
        }

        function logSplit(athleteIdx, segIndex) {
          setAthletes(a => a.map((ath, i) => {
            if (i !== athleteIdx) return ath;
            const newSplits = [...ath.splits];
            newSplits[segIndex] = clockMs;
            const finished = segIndex === SEGMENTS.length - 1;
            return { ...ath, splits: newSplits, finished };
          }));
        }

        function nextUnloggedSeg(athlete) {
          return athlete.splits.findIndex(s => s === null);
        }

        function openEdit(athleteIdx) {
          if (editTarget === athleteIdx) { setEditTarget(null); return; }
          const ath = athletes[athleteIdx];
          const vals = {};
          if (ath.startOffset !== null) vals["start"] = formatTime(ath.startOffset);
          ath.splits.forEach((s, si) => { if (s !== null) vals[si] = formatTime(s); });
          setEditValues(vals);
          setEditTarget(athleteIdx);
        }

        function saveEdits(athleteIdx) {
          setAthletes(a => a.map((ath, i) => {
            if (i !== athleteIdx) return ath;
            let newStart = ath.startOffset;
            if (editValues["start"] !== undefined) {
              const ms = parseTimeInput(editValues["start"]);
              if (ms !== null) newStart = ms;
            }
            const newSplits = [...ath.splits];
            SEGMENTS.forEach((_, si) => {
              if (editValues[si] !== undefined) {
                const ms = parseTimeInput(editValues[si]);
                if (ms !== null) newSplits[si] = ms;
              }
            });
            return { ...ath, startOffset: newStart, splits: newSplits, finished: newSplits[SEGMENTS.length - 1] !== null };
          }));
          setEditTarget(null);
        }

        function exportCSV() {
          const headers = ["Place","Athlete","Gender","Age Group","Ag Place","Course",...SEGMENTS.map(s => s+" Time"),"Chip Time","Gun Time","Swim Pace (/100y)","Bike Speed (mph)","Run Pace (/mi)"];
          const rows = sorted.map((ath, place) => {
            const chip = totalChipTime(ath);
            const gt   = gunTime(ath);
            const swimMs = segmentDuration(ath, 0);
            const bikeMs = segmentDuration(ath, 2);
            const runMs  = segmentDuration(ath, 4);
            const agp = ageGroupPlace(ath);
            const ac = athleteCourse(ath);
            return [
              place + 1, ath.name, ath.gender, ath.ageGroup, agp !== null ? agp : "", ac.name,
              ...SEGMENTS.map((_, si) => { const d = segmentDuration(ath, si); return d !== null ? formatElapsed(d) : ""; }),
              chip !== null ? formatElapsed(chip) : "",
              gt   !== null ? formatElapsed(gt)   : "",
              calcSwimPace(swimMs, ac.swimYards, units.swim) ?? "",
              calcBikeMph(bikeMs, ac.bikeMiles, units.bike)  ?? "",
              calcRunPace(runMs, ac.runMiles, units.run)   ?? "",
            ];
          });
          const csv = [headers, ...rows].map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(",")).join("\r\n");
          const a = Object.assign(document.createElement("a"), {
            href: URL.createObjectURL(new Blob([csv], { type: "text/csv;charset=utf-8;" })),
            download: "timeathon-results.csv",
          });
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
        }

            <div class="header">

        const allFinished  = athletes.length > 0 && athletes.every(a => a.finished);

            groups[key].push(ath);

        const editInputStyle = {

        const distInputStyle = {

            <div style={{ width: "100%", maxWidth: 400 }}>
              <div style={{ textAlign: "center", marginBottom: 32 }}>

                <div style={{ fontSize: 11, letterSpacing: 3, textTransform: "uppercase", color: "#5a86a8", marginTop: 6 }}>Swim &nbsp;&middot;&nbsp; Bike &nbsp;&middot;&nbsp; Run</div>

                    </div>
                    <div style={{ display: "flex", gap: 8 }}>

                      </div>

                    <div>

                      <div style={{ display: "flex", gap: 8 }}>
                        {[["participant","🏊 Participant","I race"],["spectator","👀 Spectator","I watch"]].map(([role, label, sub]) => (

                            <div style={{ fontSize: 16, marginBottom: 2 }}>{label.split(" ")[0]}</div>

                          </button>
                        ))}
                      </div>
                    </div>
                  </>)}
                  <input type="email" value={authEmail} onChange={e => setAuthEmail(e.target.value)} placeholder="Email address"
                    onKeyDown={e => e.key === "Enter" && (authMode === "login" ? authSignIn() : authSignUp())}

                      {authError}

                  <button onClick={authMode === "login" ? authSignIn : authSignUp} disabled={authWorking}

                  </button>

                  {authMode === "login" && (
                    <button onClick={authResetPassword} style={{ background: "none", border: "none", color: "#5a86a8", fontSize: 12, cursor: "pointer", textAlign: "center", padding: "4px" }}>

                    </button>
                  )}
                </div>
              </div>
            </div>
          </div>
        );

        // Spectator view
        const isSpectator = userProfile?.role === "spectator";
        if (isSpectator) {
          const liveSegs = liveRace ? (liveRace.segments || SEGMENTS) : SEGMENTS;

          // Build ranked list: finished (by chip time asc) → in-progress (by elapsed desc) → not started
          const rankedAthletes = liveRace ? (() => {
            const clock = spectatorClockMs || liveRace.clockMs || 0;
            return (liveRace.athletes || []).map(ath => {
              const chipMs = ath.started && ath.startOffset !== null ? clock - ath.startOffset : null;
              const finishMs = ath.finished && ath.startOffset !== null && ath.splits
                ? ath.splits[ath.splits.length - 1] - ath.startOffset : null;
              let curSeg = null;
              if (ath.started && !ath.finished && ath.splits) {
                for (let i = 0; i < ath.splits.length; i++) {
                  if (ath.splits[i] === null) { curSeg = i; break; }
                }
              }
              return { ...ath, chipMs, finishMs, curSeg };
            }).sort((a, b) => {
              if (a.finished && b.finished) return a.finishMs - b.finishMs;
              if (a.finished) return -1;
              if (b.finished) return 1;
              if (a.started && b.started) return b.chipMs - a.chipMs;
              if (a.started) return -1;
              if (b.started) return 1;
              return 0;
            });
          })() : [];

          const medals = ["🥇", "🥈", "🥉"];
          const finishedCount = rankedAthletes.filter(a => a.finished).length;
          const onCourseCount = rankedAthletes.filter(a => a.started && !a.finished).length;

          return (

                  {userProfile?.firstName} &#8594;

              </div>

                {!liveRace ? (
                  <div>

                      <div style={{ fontSize: 44, marginBottom: 10 }}>👀</div>

                      style={{ width: "100%", boxSizing: "border-box", background: "#0c2240", border: "2px solid rgba(0,174,239,0.3)", borderRadius: 8, padding: "16px", marginBottom: 12, color: "#00aeef", fontSize: 28, fontFamily: "'Bebas Neue'", letterSpacing: 8, outline: "none", textAlign: "center", display: "block" }} />
                    <button onClick={() => watchRace(spectatorCode)} disabled={liveRaceLoading}
                      style={{ width: "100%", background: "#00aeef", border: "none", borderRadius: 8, padding: "15px", fontSize: 15, fontWeight: 700, color: "#071829", cursor: "pointer", letterSpacing: 1 }}>
                      {liveRaceLoading ? "Connecting…" : "Watch Race"}
                    </button>
                    {liveRaceError && <div style={{ marginTop: 12, fontSize: 13, color: "#f87171", textAlign: "center" }}>{liveRaceError}</div>}
                  </div>
                ) : (
                  <div>
                    {/* Race header row */}
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
                      <div>
                        <div style={{ fontFamily: "'Bebas Neue'", fontSize: 22, letterSpacing: 3, color: "#e8f4fb", lineHeight: 1 }}>{liveRace.publisherName}'s Race</div>
                        <div style={{ fontSize: 10, color: "#5a86a8", letterSpacing: 1, marginTop: 3 }}>
                          CODE: {liveRace.code}&nbsp;&nbsp;·&nbsp;&nbsp;{finishedCount} finished&nbsp;&nbsp;·&nbsp;&nbsp;{onCourseCount} on course
                        </div>
                      </div>
                      <button onClick={() => { if (liveRaceUnsubRef.current) { liveRaceUnsubRef.current.ref.off("value", liveRaceUnsubRef.current.fn); liveRaceUnsubRef.current = null; } setLiveRace(null); setSpectatorCode(""); setWatchSelectedAthId(null); watchSelectedAthIdRef.current = null; localStorage.removeItem("tri-active-watch"); }}
                        style={{ background: "none", border: "1px solid rgba(90,134,168,0.3)", borderRadius: 4, color: "#5a86a8", fontSize: 11, cursor: "pointer", padding: "5px 10px", flexShrink: 0 }}>Leave</button>
                    </div>

                    {/* Live clock */}

                      <div style={{ fontSize: 10, letterSpacing: 3, color: "#5a86a8", marginBottom: 2 }}>RACE CLOCK</div>
                      <div style={{ fontFamily: "'Bebas Neue'", fontSize: 56, letterSpacing: 4, color: "#00aeef", lineHeight: 1 }}>{formatTime(spectatorClockMs || liveRace.clockMs || 0)}</div>

                      const curSeg = ath.curSeg;

                      const splitDurs = (ath.splits || []).map((s, si) => {
                        if (s === null || s === undefined) return null;
                        const prev = si === 0 ? ath.startOffset : ath.splits[si - 1];
                        return (prev !== null && prev !== undefined) ? s - prev : null;
                      });

                      const borderColor = ath.finished ? "rgba(74,222,128,0.4)" : ath.started ? "rgba(0,174,239,0.3)" : "rgba(255,255,255,0.07)";

                      return (

                          <div style={{ padding: "12px 14px" }}>
                            {/* Top row: place + name + status/time */}
                            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                              {/* Placement */}

                                  const done = splitDurs[si] !== null && splitDurs[si] !== undefined;

                                  const col = segColors[si % segColors.length];
                                  const prevMs = si === 0 ? ath.startOffset : (ath.splits || [])[si - 1];

                                  return (

                                      <div style={{ fontSize: 11, color: done ? "#e8f4fb" : isCurrent ? col : "#1a3050", fontFamily: (done || isCurrent) ? "'Bebas Neue'" : "inherit", letterSpacing: (done || isCurrent) ? 1 : 0 }}>
                                        {done ? formatElapsed(splitDurs[si]) : isCurrent && curSegMs !== null ? formatElapsed(curSegMs) : "—"}
                                      </div>
                                    </div>
                                  );
                                })}
                              </div>
                            )}

        return (

                <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 56, letterSpacing: 4, color: clockRunning ? "#00aeef" : clockStarted ? "#ffd166" : "#3a6080", lineHeight: 1 }}>
                  {formatTime(clockMs)}
                </div>
                <div style={{ display: "flex", gap: 10, justifyContent: "center", marginTop: 12, flexWrap: "wrap" }}>

                      ? <button onClick={pauseClock} style={btnStyle("#ffd166")}>Pause</button>
                      : <button onClick={resumeClock} style={btnStyle("#4ade80")}>Resume</button>

                  {!resetConfirm
                    ? <button onClick={() => setResetConfirm(true)} style={btnStyle("#f4742b", true)}>Reset All</button>

                            style={{ background: "#0c2240", border: "1px solid rgba(0,174,239,0.2)", borderRadius: 4, padding: "5px 10px", color: "#e8f4fb", fontSize: 12, outline: "none", cursor: "pointer" }}>
                            {manualAgeGroups.map(ag => <option key={ag} value={ag}>{ag}</option>)}
                          </select>
                        </div>
                        {(() => {
                          const segColors = ["#00aeef","#4ade80","#ffd166","#4ade80","#f4742b"];
                          const resolvedMs = resolveSegsMs(ma);
                          const cumFromSegs = [];
                          let c = 0;
                          for (let j = 0; j < 5; j++) {
                            const d = parseSegTime(ma.segs[j]);
                            if (d !== null) { c += d; cumFromSegs[j] = c; } else { cumFromSegs[j] = null; break; }
                          }
                          return (
                            <div style={{ display: "flex", gap: 8, marginLeft: 38, flexWrap: "wrap" }}>
                              {SEGMENTS.map((seg, si) => {
                                const col = segColors[si];
                                const segInvalid = ma.segs[si] && !parseSegTime(ma.segs[si]);
                                const totalInvalid = (ma.totals||[])[si] && !parseSegTime((ma.totals||[])[si]);
                                const backMs = ma.segs[si] === "" && resolvedMs[si] ? resolvedMs[si] : null;
                                const splitPlaceholder = backMs ? formatElapsed(backMs) : "0:00";
                                const totalPlaceholder = cumFromSegs[si] != null ? formatElapsed(cumFromSegs[si]) : "total";
                                return (
                                  <div key={si} style={{ display: "flex", flexDirection: "column", gap: 2 }}>
                                    <label style={{ fontSize: 9, color: col, letterSpacing: 1, fontWeight: 700, textTransform: "uppercase", textAlign: "center" }}>{seg}</label>
                                    <input value={ma.segs[si]} onChange={e => updateManualSeg(ma.id, si, e.target.value)} placeholder={splitPlaceholder}
                                      title="Segment split time (MM:SS)"
                                      style={{ background: "#0c2240", border: `1px solid ${segInvalid ? "rgba(255,80,80,0.6)" : col + "44"}`, borderRadius: 4, padding: "5px 8px", color: "#e8f4fb", fontSize: 13, width: 68, outline: "none", textAlign: "center", fontFamily: "monospace" }} />
                                    <input value={(ma.totals||[])[si] || ""} onChange={e => {
                                      const val = e.target.value;
                                      setManualAthletes(prev => prev.map(a => a.id === ma.id ? { ...a, totals: (a.totals || ["","","","",""]).map((t, i) => i === si ? val : t) } : a));
                                      setManualResults(null);
                                    }} placeholder={totalPlaceholder}
                                      title="Total elapsed time at this checkpoint (MM:SS) — auto-calculates missing split"
                                      style={{ background: "#071829", border: `1px solid ${totalInvalid ? "rgba(255,80,80,0.6)" : "rgba(244,114,182,0.2)"}`, borderRadius: 4, padding: "4px 8px", color: "#c084fc", fontSize: 11, width: 68, outline: "none", textAlign: "center", fontFamily: "monospace" }} />
                                    <div style={{ fontSize: 8, color: "#3a6080", textAlign: "center", letterSpacing: 0.5 }}>Σ total</div>
                                  </div>
                                );
                              })}
                            </div>
                          );
                        })()}
                      </div>
                    ))}
                    <div style={{ display: "flex", gap: 10, marginTop: 12, flexWrap: "wrap" }}>
                      <button onClick={() => { setManualAthletePickerSearch(""); setShowManualAthletePicker(true); }} style={btnStyle("#48cae4", true)}>+ Add Athlete</button>
                      <button onClick={() => setManualResults(computeManualRace())} style={btnStyle("#f472b6")}>Calculate Results</button>
                    </div>

                    {/* Athlete picker modal */}
                    {showManualAthletePicker && (
                      <div style={{ position: "fixed", inset: 0, background: "rgba(7,24,41,0.92)", zIndex: 200, display: "flex", alignItems: "flex-end", justifyContent: "center" }}
                        onClick={e => { if (e.target === e.currentTarget) { setShowManualAthletePicker(false); setManualAthletePickerSearch(""); } }}>
                        <div style={{ background: "#0c2240", borderTop: "2px solid #f472b6", borderRadius: "12px 12px 0 0", width: "100%", maxWidth: 500, maxHeight: "70vh", display: "flex", flexDirection: "column", padding: "16px 16px 24px" }}>
                          <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12 }}>
                            <div style={{ fontSize: 13, fontWeight: 700, color: "#e8f4fb", letterSpacing: 1 }}>Add Athlete</div>
                            <button onClick={() => { setShowManualAthletePicker(false); setManualAthletePickerSearch(""); }} style={{ background: "none", border: "none", color: "#5a86a8", fontSize: 20, cursor: "pointer", padding: 0 }}>&times;</button>
                          </div>
                          <input autoFocus value={manualAthletePickerSearch} onChange={e => setManualAthletePickerSearch(e.target.value)} placeholder="Search athletes…"
                            style={{ background: "#071829", border: "1px solid rgba(244,114,182,0.3)", borderRadius: 6, padding: "9px 12px", color: "#e8f4fb", fontSize: 13, outline: "none", marginBottom: 10, width: "100%", boxSizing: "border-box" }} />
                          <div style={{ overflowY: "auto", flex: 1 }}>
                            <button onClick={() => { addBlankManual(); setShowManualAthletePicker(false); setManualAthletePickerSearch(""); }}
                              style={{ display: "flex", alignItems: "center", gap: 10, width: "100%", background: "rgba(244,114,182,0.08)", border: "1px dashed rgba(244,114,182,0.3)", borderRadius: 6, padding: "10px 12px", color: "#f472b6", fontSize: 13, cursor: "pointer", marginBottom: 6, textAlign: "left" }}>
                              <span style={{ fontSize: 18, lineHeight: 1 }}>+</span>
                              <span style={{ fontWeight: 700 }}>New Athlete</span>
                            </button>
                            {filteredRoster.length === 0 && manualAthletePickerSearch && (
                              <div style={{ fontSize: 12, color: "#3a6080", textAlign: "center", padding: "12px 0" }}>No match — use New Athlete above.</div>
                            )}
                            {filteredRoster.map((ath, idx) => {
                              const already = addedNames.has(ath.name.toLowerCase().trim());
                              return (
                                <button key={idx} onClick={() => { if (!already) { addFromLib(ath); setShowManualAthletePicker(false); setManualAthletePickerSearch(""); } }} disabled={already}
                                  style={{ display: "flex", alignItems: "center", gap: 10, width: "100%", background: "transparent", border: "1px solid rgba(0,174,239,0.1)", borderRadius: 6, padding: "9px 12px", color: already ? "#3a6080" : "#e8f4fb", fontSize: 13, cursor: already ? "default" : "pointer", marginBottom: 4, textAlign: "left" }}>
                                  <div style={{ flex: 1, minWidth: 0 }}>
                                    <div style={{ fontWeight: 600, whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{ath.name}</div>
                                    <div style={{ fontSize: 11, color: "#5a86a8" }}>{ath.gender}{ath.ageGroup ? ` · ${ath.ageGroup}` : ""}</div>
                                  </div>
                                  {already && <span style={{ fontSize: 10, color: "#3a6080", flexShrink: 0 }}>already added</span>}
                                </button>
                              );
                            })}
                          </div>
                        </div>
                      </div>
                    )}

                    {/* Results */}
                    {resultsRace && (
                      <div style={{ marginTop: 20 }}>
                        {finishers.length > 0 ? (
                          <div style={{ background: "#0c2240", borderRadius: 10, border: "1px solid rgba(244,114,182,0.25)", padding: "16px", marginBottom: 14 }}>
                            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 12, flexWrap: "wrap", gap: 8 }}>
                              <div style={{ fontSize: 11, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", color: "#f472b6" }}>
                                Results — {finishers.length} Finisher{finishers.length !== 1 ? "s" : ""}
                              </div>
                              <div style={{ display: "flex", gap: 8, flexWrap: "wrap" }}>
                                <button onClick={() => printArchivedResults(resultsRace)} style={{ ...btnStyle("#00aeef", true), padding: "5px 10px", fontSize: 11 }}>📊 Print Results</button>
                                <button onClick={() => printArchivedCert(resultsRace, null)} style={{ ...btnStyle("#ffd166", true), padding: "5px 10px", fontSize: 11 }}>🏆 All Certs</button>
                                <button onClick={() => {
                                  const entry = { ...resultsRace, id: "manual_" + Date.now() };
                                  const updated = [...savedArchive, entry];
                                  setSavedArchive(updated);
                                  localStorage.setItem("tri-archive", JSON.stringify(updated));
                                  if (currentUser) rtdb.ref("users/" + currentUser.uid + "/archive").set(updated).catch(console.error);
                                  setManualSavedMsg("Saved to Past Races!");
                                  setTimeout(() => setManualSavedMsg(""), 3000);
                                }} style={{ ...btnStyle("#4ade80", true), padding: "5px 10px", fontSize: 11 }}>💾 Save</button>
                              </div>
                            </div>
                            {manualSavedMsg && <div style={{ color: "#4ade80", fontSize: 12, fontWeight: 700, marginBottom: 10, textAlign: "center" }}>{manualSavedMsg}</div>}
                            <div style={{ overflowX: "auto" }}>
                              <table style={{ width: "100%", borderCollapse: "collapse", fontSize: 12 }}>
                                <thead>
                                  <tr>{["#","Athlete","Gender","Age Grp",...SEGMENTS,"Chip Time"].map((h, i) => (
                                    <th key={i} style={{ padding: "6px 8px", background: "#071829", color: "#5a86a8", fontSize: 9, fontWeight: 700, letterSpacing: 1, textTransform: "uppercase", textAlign: i < 2 ? "left" : "center", whiteSpace: "nowrap" }}>{h}</th>
                                  ))}</tr>
                                </thead>
                                <tbody>
                                  {finishers.map((ath, rank) => (
                                    <tr key={ath.id} style={{ borderBottom: "1px solid rgba(255,255,255,0.05)" }}>
                                      <td style={{ padding: "7px 8px", color: rank === 0 ? "#ffd166" : rank === 1 ? "#a0aec0" : rank === 2 ? "#c47e2f" : "#e8f4fb", fontFamily: "'Bebas Neue',sans-serif", fontSize: 16 }}>{rank + 1}</td>
                                      <td style={{ padding: "7px 8px", color: "#e8f4fb", fontWeight: 700 }}>{ath.name}</td>
                                      <td style={{ padding: "7px 8px", color: "#5a86a8", textAlign: "center" }}>{ath.gender}</td>
                                      <td style={{ padding: "7px 8px", color: "#5a86a8", textAlign: "center" }}>{ath.ageGroup}</td>
                                      {SEGMENTS.map((_, si) => { const dur = archiveSegDur(ath, si); return <td key={si} style={{ padding: "7px 8px", color: "#aac4d8", textAlign: "center", fontFamily: "monospace" }}>{dur !== null ? formatElapsed(dur) : "--"}</td>; })}
                                      <td style={{ padding: "7px 8px", color: "#f472b6", fontWeight: 700, textAlign: "center", fontFamily: "monospace" }}>{ath.finishMs != null ? formatElapsed(ath.finishMs) : "--"}</td>
                                    </tr>
                                  ))}
                                </tbody>
                              </table>
                            </div>
                            {(() => {
                              const agMap = {};
                              finishers.forEach(a => { const key = `${a.gender} · ${a.ageGroup}`; if (!agMap[key]) agMap[key] = []; agMap[key].push(a); });
                              const keys = Object.keys(agMap);
                              if (keys.length <= 1) return null;
                              return (
                                <div style={{ marginTop: 16 }}>
                                  <div style={{ fontSize: 10, fontWeight: 700, letterSpacing: 2, textTransform: "uppercase", color: "#5a86a8", marginBottom: 10 }}>Age Group Breakdown</div>
                                  {keys.map(key => (
                                    <div key={key} style={{ marginBottom: 12 }}>
                                      <div style={{ fontSize: 11, fontWeight: 700, color: "#00aeef", letterSpacing: 1, textTransform: "uppercase", marginBottom: 6, borderLeft: "3px solid #00aeef", paddingLeft: 8 }}>{key}</div>
                                      {agMap[key].map((ath, i) => (
