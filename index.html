    <script>
      const firebaseConfig = {
        apiKey: "AIzaSyCDMEMg22g22LdtSYDDKnK2al2n7bGPDhY",
        authDomain: "timeathon.firebaseapp.com",
        projectId: "timeathon",
        storageBucket: "timeathon.firebasestorage.app",
        messagingSenderId: "1068021372190",
        appId: "1:1068021372190:web:5891801b76b228c860650f"

      firebase.initializeApp(firebaseConfig);
      var auth = firebase.auth();
      var db = firebase.firestore();

    <script type="text/babel" data-presets="react">
      const { useState, useEffect, useRef } = React;

      // Run is the final segment — logging it ends the race for that athlete
      const SEGMENTS   = ["Swim", "T1", "Bike", "T2", "Run"];
      const segColors  = ["#00aeef", "#48cae4", "#ffd166", "#48cae4", "#f4742b"];
      const DEFAULT_AGE_GROUPS = ["8 & Under", "9-10", "11-12", "13-14", "15+"];
      // LOGO_B64 is defined in the preceding plain <script> tag (keeps Babel fast)

      // ── Formatting helpers ───────────────────────────────────────────────────
      function formatTime(ms) {
        if (ms === null || ms === undefined) return "--:--.-";
        const totalSecs = Math.floor(ms / 1000);
        const mins = Math.floor(totalSecs / 60);
        const secs = totalSecs % 60;
        const tenths = Math.floor((ms % 1000) / 100);
        return `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}.${tenths}`;
      }

      function formatElapsed(ms) {
        if (ms === null || ms === undefined) return "--:--";
        const totalSecs = Math.floor(ms / 1000);
        const mins = Math.floor(totalSecs / 60);
        const secs = totalSecs % 60;
        return `${String(mins).padStart(2, "0")}:${String(secs).padStart(2, "0")}`;
      }

      function parseTimeInput(str) {
        if (!str) return null;
        const match = str.trim().match(/^(\d+):(\d{2})(?:\.(\d))?$/);
        if (!match) return null;
        const mins = parseInt(match[1]);
        const secs = parseInt(match[2]);
        const tenths = match[3] ? parseInt(match[3]) : 0;
        return (mins * 60 + secs) * 1000 + tenths * 100;
      }

      // ── Pace calculators ─────────────────────────────────────────────────────
      function calcSwimPace(ms, dist, unit) {
        if (!ms || !dist || dist <= 0) return null;
        const secsPerHundred = (ms / 1000) / dist * 100;
        const mins = Math.floor(secsPerHundred / 60);
        const secs = Math.floor(secsPerHundred % 60);
        return `${mins}:${String(secs).padStart(2, "0")} /100${unit === "meters" ? "m" : "y"}`;
      }

      function calcBikeMph(ms, dist, unit) {
        if (!ms || !dist || dist <= 0) return null;
        return `${(dist / (ms / 3600000)).toFixed(1)} ${unit === "km" ? "km/h" : "mph"}`;
      }

      function calcRunPace(ms, dist, unit) {
        if (!ms || !dist || dist <= 0) return null;
        const ppu = (ms / 60000) / dist;
        const mins = Math.floor(ppu);
        const secs = Math.floor((ppu - mins) * 60);
        return `${mins}:${String(secs).padStart(2, "0")} /${unit === "km" ? "km" : "mi"}`;
      }

      function calcAge(dob) {
        if (!dob) return null;
        const d = new Date(dob), today = new Date();
        let age = today.getFullYear() - d.getFullYear();
        if (today.getMonth() - d.getMonth() < 0 || (today.getMonth() === d.getMonth() && today.getDate() < d.getDate())) age--;
        return age;
      }

      function placeSuffix(n) {
        if (n === 11 || n === 12 || n === 13) return `${n}th`;
        const s = ["th","st","nd","rd"];
        return `${n}${s[n % 10] || s[0]}`;
      }

      // ── Athlete time helpers ─────────────────────────────────────────────────
      function segmentDuration(athlete, segIndex) {
        const times = athlete.splits;
        if (segIndex === 0) {
          if (times[0] === null || athlete.startOffset === null) return null;
          return times[0] - athlete.startOffset;
        }
        if (times[segIndex] === null || times[segIndex - 1] === null) return null;
        return times[segIndex] - times[segIndex - 1];
      }

      function totalChipTime(athlete) {
        const last = athlete.splits[SEGMENTS.length - 1];
        if (last === null || athlete.startOffset === null) return null;
        return last - athlete.startOffset;
      }

      function gunTime(athlete) {
        const last = athlete.splits[SEGMENTS.length - 1];
        return last !== null ? last : null;
      }

      function freshAthlete(name = "", id = Date.now(), gender = "Male", ageGroup = "9-10") {
        return { id, name, gender, ageGroup, startOffset: null, splits: Array(SEGMENTS.length).fill(null), started: false, finished: false };
      }

      // ── Style helpers ────────────────────────────────────────────────────────
      function btnStyle(color, outline = false) {
        return {
          background: outline ? "transparent" : color,
          border: `2px solid ${color}`,
          color: outline ? color : "#071829",
          padding: "10px 20px",
          borderRadius: 4,
          fontWeight: 700,
          fontSize: 13,
          letterSpacing: 1,
          cursor: "pointer",
        };
      }

      function thStyle(color) {
        return { textAlign: "center", padding: "8px 6px", color, fontWeight: 700, letterSpacing: 1, fontSize: 10, textTransform: "uppercase", whiteSpace: "nowrap" };
      }

      // ── App ──────────────────────────────────────────────────────────────────
      function App() {
        const [view, setView] = useState("home");
        const [homeSection, setHomeSection] = useState(null); // "races" when Existing Race expanded
        const [athletes, setAthletes] = useState([
          { id: 1, name: "Sam",     gender: "Male",   ageGroup: "9-10",  startOffset: null, splits: Array(SEGMENTS.length).fill(null), started: false, finished: false },
          { id: 2, name: "Kai",     gender: "Male",   ageGroup: "9-10",  startOffset: null, splits: Array(SEGMENTS.length).fill(null), started: false, finished: false },
          { id: 3, name: "Larson",  gender: "Male",   ageGroup: "11-12", startOffset: null, splits: Array(SEGMENTS.length).fill(null), started: false, finished: false },
          { id: 4, name: "Everett", gender: "Male",   ageGroup: "11-12", startOffset: null, splits: Array(SEGMENTS.length).fill(null), started: false, finished: false },
          { id: 5, name: "Remy",    gender: "Female", ageGroup: "9-10",  startOffset: null, splits: Array(SEGMENTS.length).fill(null), started: false, finished: false },
          { id: 6, name: "Krish",   gender: "Male",   ageGroup: "11-12", startOffset: null, splits: Array(SEGMENTS.length).fill(null), started: false, finished: false },
          { id: 7, name: "Nixon",   gender: "Male",   ageGroup: "9-10",  startOffset: null, splits: Array(SEGMENTS.length).fill(null), started: false, finished: false },
          { id: 8, name: "Jack",    gender: "Male",   ageGroup: "11-12", startOffset: null, splits: Array(SEGMENTS.length).fill(null), started: false, finished: false },
        ]);

        // Race courses — each athlete is assigned to one; supports mixed-distance events
        const [courses, setCourses] = useState([
          { id: 1, name: "Sprint", swimYards: 100, bikeMiles: 6, runMiles: 1.5 }
        ]);

        // Age groups — fully customizable per race
        const [ageGroups, setAgeGroups] = useState(DEFAULT_AGE_GROUPS);
        const [certConfig, setCertConfig] = useState({ eventName: "Timeathon Race Event", accentColor: "#00aeef", orgName: "", customLogoB64: null });
        const [units, setUnits] = useState({ swim: "yards", bike: "miles", run: "miles" });
        const [loadedRaceId, setLoadedRaceId] = useState(null);

        const [clockMs, setClockMs]         = useState(0);
        const [clockRunning, setClockRunning] = useState(false);
        const [clockStarted, setClockStarted] = useState(false);
        const [resetConfirm, setResetConfirm] = useState(false);
        const [editTarget, setEditTarget]   = useState(null);
        const [editValues, setEditValues]   = useState({});

        // Auth state
        const [currentUser, setCurrentUser] = useState(null);
        const [authLoading, setAuthLoading] = useState(true);
        const [authMode, setAuthMode] = useState("login");
        const [authEmail, setAuthEmail] = useState("");
        const [authPassword, setAuthPassword] = useState("");
        const [authFirstName, setAuthFirstName] = useState("");
        const [authLastName, setAuthLastName] = useState("");
        const [authBirthday, setAuthBirthday] = useState("");
        const [authGender, setAuthGender] = useState("");
        const [authRole, setAuthRole] = useState("participant");
        const [authError, setAuthError] = useState("");
        const [authWorking, setAuthWorking] = useState(false);
        const [userProfile, setUserProfile] = useState(null);
        const [spectatorCode, setSpectatorCode] = useState("");
        const [liveRace, setLiveRace] = useState(null);
        const [liveRaceError, setLiveRaceError] = useState("");
        const [liveRaceLoading, setLiveRaceLoading] = useState(false);
        const liveRaceUnsubRef = useRef(null);

        // Saved race presets (persisted to localStorage + Firestore)
        const [savedRaces, setSavedRaces] = useState(() => {
          try { return JSON.parse(localStorage.getItem("tri-saved-races") || "[]"); } catch { return []; }
        });
        const [saveRaceName, setSaveRaceName] = useState("");
        const [deleteConfirm, setDeleteConfirm] = useState(null);
        const [raceMode, setRaceMode] = useState("separate");
        const [liveRaceCode, setLiveRaceCode] = useState(null);
        const [livePublishError, setLivePublishError] = useState("");
        const [livePublishing, setLivePublishing] = useState(false);
        const [editProfile, setEditProfile] = useState({ firstName: "", lastName: "", birthday: "", gender: "", role: "participant" });
        const [profileSaving, setProfileSaving] = useState(false);
        const [profileSaved, setProfileSaved] = useState(false);
        const [newPassword, setNewPassword] = useState("");
        const [pwSaving, setPwSaving] = useState(false);
        const [pwMsg, setPwMsg] = useState("");
        const [showAthletePicker, setShowAthletePicker] = useState(false);
        const [athletePickerSearch, setAthletePickerSearch] = useState("");
        const [editingAthleteKey, setEditingAthleteKey] = useState(null);
        const [editingAthleteData, setEditingAthleteData] = useState(null);

        // Saved athlete roster (persisted to localStorage — separate from race-specific athletes)
        const [savedAthletes, setSavedAthletes] = useState(() => {
          try { return JSON.parse(localStorage.getItem("tri-saved-athletes") || "[]"); } catch { return []; }
        });

        const clockRef     = useRef(null);
        const startTimeRef = useRef(null);
        const offsetRef    = useRef(0);

        useEffect(() => {
          if (clockRunning) {
            startTimeRef.current = Date.now() - offsetRef.current;
            clockRef.current = setInterval(() => {
              setClockMs(Date.now() - startTimeRef.current);
            }, 50);
          } else {
            clearInterval(clockRef.current);
            offsetRef.current = clockMs;
          }
          return () => clearInterval(clockRef.current);
        }, [clockRunning]);

        useEffect(() => {
          if (liveRaceCode && athletes.some(a => a.started)) updateLiveRace(liveRaceCode);
        }, [athletes, clockMs]);

        // Firebase auth listener — loads Firestore data on login
        useEffect(() => {
          const unsub = auth.onAuthStateChanged(async user => {
            setCurrentUser(user);
            if (user) {
              try {
                const doc = await db.collection("users").doc(user.uid).get();
                if (doc.exists) {
                  const data = doc.data();
                  if (data.profile) { setUserProfile(data.profile); setEditProfile({ firstName: data.profile.firstName || "", lastName: data.profile.lastName || "", birthday: data.profile.birthday || "", gender: data.profile.gender || "", role: data.profile.role || "participant" }); }
                  if (data.races && data.races.length > 0) { setSavedRaces(data.races); localStorage.setItem("tri-saved-races", JSON.stringify(data.races)); }
                  if (data.athletes && data.athletes.length > 0) { setSavedAthletes(data.athletes); localStorage.setItem("tri-saved-athletes", JSON.stringify(data.athletes)); }
                }
              } catch(e) { console.error("Firestore load:", e); }
            }
            setAuthLoading(false);
          });
          return unsub;
        }, []);

        async function authSignIn() {
          setAuthError(""); setAuthWorking(true);
          try { await auth.signInWithEmailAndPassword(authEmail, authPassword); }
          catch(e) { setAuthError(friendlyAuthError(e.code)); }
          setAuthWorking(false);
        }
        async function authSignUp() {
          if (!authFirstName.trim() || !authLastName.trim()) { setAuthError("Please enter your first and last name."); return; }
          if (!authGender) { setAuthError("Please select your gender."); return; }
          setAuthError(""); setAuthWorking(true);
          try {
            const displayName = `${authFirstName.trim()} ${authLastName.trim()}`;
            const cred = await auth.createUserWithEmailAndPassword(authEmail, authPassword);
            await cred.user.updateProfile({ displayName });
            const profile = { firstName: authFirstName.trim(), lastName: authLastName.trim(), displayName, email: authEmail, birthday: authBirthday, gender: authGender, role: authRole, createdAt: new Date().toISOString() };
            await db.collection("users").doc(cred.user.uid).set({ profile }, { merge: true });
            setUserProfile(profile);
          } catch(e) { setAuthError(friendlyAuthError(e.code)); }
          setAuthWorking(false);
        }
        async function authResetPassword() {
          if (!authEmail) { setAuthError("Enter your email first."); return; }
          setAuthWorking(true);
          try { await auth.sendPasswordResetEmail(authEmail); setAuthError("Reset email sent — check your inbox."); }
          catch(e) { setAuthError(friendlyAuthError(e.code)); }
          setAuthWorking(false);
        }
        function authSignOut() {
          if (liveRaceUnsubRef.current) { liveRaceUnsubRef.current(); liveRaceUnsubRef.current = null; }
          auth.signOut();
          setSavedRaces([]); setSavedAthletes([]); setUserProfile(null); setLiveRace(null); setSpectatorCode("");
        }

        function generateRaceCode() {
          return Math.random().toString(36).substring(2, 8).toUpperCase();
        }

        async function publishLiveRace(code) {
          if (!currentUser) return false;
          const payload = {
            code, publishedBy: currentUser.uid,
            publisherName: userProfile?.displayName || currentUser.email,
            startedAt: Date.now(), clockMs,
            athletes: athletes.map(a => ({ id: a.id, name: a.name, gender: a.gender, ageGroup: a.ageGroup, started: a.started, finished: a.finished, startOffset: a.startOffset, splits: a.splits })),
            courses, segments: SEGMENTS, updatedAt: Date.now()
          };
          try {
            await db.collection("liveRaces").doc(code).set(payload);
            return true;
          } catch(e) {
            console.error("publishLiveRace failed:", e.code, e.message);
            return `${e.code}: ${e.message}`;
          }
        }

        function updateLiveRace(code) {
          if (!code || !currentUser) return;
          db.collection("liveRaces").doc(code).update({
            clockMs, athletes: athletes.map(a => ({ id: a.id, name: a.name, gender: a.gender, ageGroup: a.ageGroup, started: a.started, finished: a.finished, startOffset: a.startOffset, splits: a.splits })), updatedAt: Date.now()
          }).catch(console.error);
        }

        function watchRace(code) {
          if (!code.trim()) { setLiveRaceError("Enter a race code."); return; }
          setLiveRaceLoading(true); setLiveRaceError("");
          if (liveRaceUnsubRef.current) liveRaceUnsubRef.current();
          liveRaceUnsubRef.current = db.collection("liveRaces").doc(code.trim().toUpperCase()).onSnapshot(snap => {
            setLiveRaceLoading(false);
            if (!snap.exists) { setLiveRaceError("No active race found with that code."); setLiveRace(null); }
            else { setLiveRace({ ...snap.data(), code: snap.id }); setLiveRaceError(""); }
          }, () => { setLiveRaceLoading(false); setLiveRaceError("Could not connect. Check the code and try again."); });
        }
        function friendlyAuthError(code) {
          const map = { "auth/invalid-email": "Invalid email address.", "auth/user-not-found": "No account with that email.", "auth/wrong-password": "Incorrect password.", "auth/email-already-in-use": "An account with that email already exists.", "auth/weak-password": "Password must be at least 6 characters.", "auth/invalid-credential": "Incorrect email or password." };
          return map[code] || "Something went wrong. Please try again.";
        }

        function startClock() {
          offsetRef.current = 0;
          setClockMs(0);
          setClockRunning(true);
          setClockStarted(true);
          if (raceMode === "simultaneous") {
            setAthletes(a => a.map(ath => ath.started ? ath : { ...ath, startOffset: 0, started: true }));
          }
        }
        function pauseClock()  { setClockRunning(false); }
        function resumeClock() { setClockRunning(true); }
        function resetClock()  { setClockRunning(false); setClockStarted(false); offsetRef.current = 0; setClockMs(0); }

        function resetTimers() {
          setAthletes(a => a.map(ath => ({ ...freshAthlete(ath.name, ath.id), gender: ath.gender || "Male", ageGroup: ath.ageGroup || ageGroups[0] || "9-10", dob: ath.dob || "", courseId: ath.courseId || courses[0]?.id || null })));
          resetClock();
          setResetConfirm(false);
          setEditTarget(null);
          setView("setup");
        }

        function persistRaces(races) {
          setSavedRaces(races);
          localStorage.setItem("tri-saved-races", JSON.stringify(races));
          if (currentUser) db.collection("users").doc(currentUser.uid).set({ races }, { merge: true }).catch(console.error);
        }

        function saveRace() {
          const name = saveRaceName.trim() || `Race ${savedRaces.length + 1}`;
          const entry = {
            id: Date.now(),
            name,
            savedAt: new Date().toLocaleDateString(),
            ageGroups,
            courses,
            athletes: athletes.map(a => ({ name: a.name, gender: a.gender, ageGroup: a.ageGroup, dob: a.dob || "", courseId: a.courseId || null })),
          };
          persistRaces([...savedRaces, entry]);
          setSaveRaceName("");
        }

        function updateSavedRace() {
          if (!loadedRaceId) return;
          const updated = savedRaces.map(r => r.id === loadedRaceId
            ? { ...r, ageGroups, courses, units, athletes: athletes.map(a => ({ name: a.name, gender: a.gender, ageGroup: a.ageGroup, dob: a.dob || "", courseId: a.courseId })), savedAt: new Date().toLocaleString() }
            : r);
          persistRaces(updated);
        }
        function loadRace(race) {
          setLoadedRaceId(race.id);
          if (race.units) setUnits(race.units);
          const loadedCourses = race.courses || [{ id: 1, name: "Sprint", swimYards: race.swimYards || 100, bikeMiles: race.bikeMiles || 6, runMiles: race.runMiles || 1.5 }];
          const loadedAgeGroups = race.ageGroups || DEFAULT_AGE_GROUPS;
          setCourses(loadedCourses);
          setAgeGroups(loadedAgeGroups);
          setAthletes(race.athletes.map((a, i) => ({ ...freshAthlete(a.name, i + 1), gender: a.gender || "Male", ageGroup: a.ageGroup || loadedAgeGroups[0] || "9-10", dob: a.dob || "", courseId: a.courseId || loadedCourses[0].id })));
          resetClock();
          setEditTarget(null);
        }

        function deleteRace(id) {
          persistRaces(savedRaces.filter(r => r.id !== id));
          setDeleteConfirm(null);
        }

            <div class="dist">${courses.map(c => `${c.name}: ${c.swimYards}y / ${c.bikeMiles}mi / ${c.runMiles}mi`).join(" &nbsp;&middot;&nbsp; ")}</div>

            <table>
              <thead><tr><th>#</th><th>Athlete</th><th>Gender</th><th>Age Grp</th><th>Ag #</th><th>Course</th>${SEGMENTS.map(s=>`<th>${s}</th>`).join("")}<th>Chip</th><th>Gun</th></tr></thead>

            <h2>Age Group Breakdown</h2>
            ${agSections}
            <script>window.onload=()=>window.print();<\/script>
          </body></html>`);
          win.document.close();
        }

        const allFinished  = athletes.length > 0 && athletes.every(a => a.finished);
        const anyStarted   = athletes.some(a => a.started);
        const anyUnstarted = athletes.some(a => !a.started);

        const sorted = [...athletes].sort((a, b) => {
          const ta = totalChipTime(a), tb = totalChipTime(b);
          if (ta === null && tb === null) return 0;
          if (ta === null) return 1;
          if (tb === null) return -1;
          return ta - tb;
        });

        function ageGroupPlace(ath) {
          const chip = totalChipTime(ath);
          if (chip === null) return null;
          const group = sorted.filter(a => a.gender === ath.gender && a.ageGroup === ath.ageGroup && totalChipTime(a) !== null);
          return group.findIndex(a => a.id === ath.id) + 1;
        }

        const ageGroupSections = (() => {
          const groups = {};
          sorted.forEach(ath => {
            if (totalChipTime(ath) === null) return;
            const key = `${ath.gender} · ${ath.ageGroup}`;
            if (!groups[key]) groups[key] = [];
            groups[key].push(ath);
          });
          return Object.entries(groups);
        })();

        const editInputStyle = {
          background: "#071829", border: "1px solid rgba(0,174,239,0.4)", borderRadius: 4,
          padding: "6px 10px", color: "#e8f4fb", fontSize: 13, width: 90, outline: "none", fontFamily: "monospace",
        };

        const distInputStyle = {
          background: "#0c2240", border: "1px solid rgba(0,174,239,0.25)", borderRadius: 4,
          padding: "8px 10px", color: "#e8f4fb", fontSize: 14, width: 80, outline: "none", textAlign: "center",
        };

        // Auth loading screen
        if (authLoading) return (

        // Login / Sign up screen

          <div style={{ minHeight: "100vh", background: "#071829", fontFamily: "'DM Sans', Arial, sans-serif", color: "#e8f4fb", display: "flex", alignItems: "center", justifyContent: "center", padding: "20px" }}>
            <div style={{ width: "100%", maxWidth: 400 }}>
              <div style={{ textAlign: "center", marginBottom: 32 }}>
                <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 52, letterSpacing: 6, color: "#f0f6ff", lineHeight: 1 }}><span style={{ color: "#00aeef" }}>Time</span>athon</div>
                <div style={{ fontSize: 11, letterSpacing: 3, textTransform: "uppercase", color: "#5a86a8", marginTop: 6 }}>Swim &nbsp;&middot;&nbsp; Bike &nbsp;&middot;&nbsp; Run</div>
              </div>

              <div style={{ background: "#0c2240", border: "1px solid rgba(0,174,239,0.2)", borderRadius: 12, padding: "28px 24px" }}>
                <div style={{ display: "flex", marginBottom: 24, background: "#071829", borderRadius: 6, padding: 3 }}>
                  {[["login","Sign In"],["signup","Create Account"]].map(([mode, label]) => (
                    <button key={mode} onClick={() => { setAuthMode(mode); setAuthError(""); }}
                      style={{ flex: 1, padding: "8px", fontSize: 12, fontWeight: 700, letterSpacing: 1, background: authMode === mode ? "#00aeef" : "transparent", color: authMode === mode ? "#071829" : "#5a86a8", border: "none", borderRadius: 4, cursor: "pointer" }}>
                      {label}
                    </button>
                  ))}
                </div>

                <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                  {authMode === "signup" && (<>
                    <div style={{ display: "flex", gap: 8 }}>
                      <input value={authFirstName} onChange={e => setAuthFirstName(e.target.value)} placeholder="First name"
                        style={{ flex: 1, background: "#071829", border: "1px solid rgba(0,174,239,0.3)", borderRadius: 6, padding: "12px 14px", color: "#e8f4fb", fontSize: 14, outline: "none" }} />
                      <input value={authLastName} onChange={e => setAuthLastName(e.target.value)} placeholder="Last name"
                        style={{ flex: 1, background: "#071829", border: "1px solid rgba(0,174,239,0.3)", borderRadius: 6, padding: "12px 14px", color: "#e8f4fb", fontSize: 14, outline: "none" }} />
                    </div>
                    <div style={{ display: "flex", gap: 8 }}>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 10, color: "#5a86a8", letterSpacing: 1, textTransform: "uppercase", marginBottom: 4 }}>Birthday</div>
                        <input type="date" value={authBirthday} onChange={e => setAuthBirthday(e.target.value)}
                          style={{ width: "100%", background: "#071829", border: "1px solid rgba(0,174,239,0.3)", borderRadius: 6, padding: "11px 12px", color: "#e8f4fb", fontSize: 13, outline: "none", colorScheme: "dark" }} />
                      </div>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 10, color: "#5a86a8", letterSpacing: 1, textTransform: "uppercase", marginBottom: 4 }}>Gender</div>
                        <select value={authGender} onChange={e => setAuthGender(e.target.value)}
                          style={{ width: "100%", background: "#071829", border: "1px solid rgba(0,174,239,0.3)", borderRadius: 6, padding: "11px 12px", color: authGender ? "#e8f4fb" : "#5a86a8", fontSize: 13, outline: "none", cursor: "pointer" }}>
                          <option value="">Select…</option>
                          <option value="Male">Male</option>
                          <option value="Female">Female</option>
                          <option value="Non-binary">Non-binary</option>
                          <option value="Prefer not to say">Prefer not to say</option>
                        </select>
                      </div>
                    </div>
                    <div>
                      <div style={{ fontSize: 10, color: "#5a86a8", letterSpacing: 1, textTransform: "uppercase", marginBottom: 6 }}>I am a…</div>
                      <div style={{ display: "flex", gap: 8 }}>
                        {[["participant","🏊 Participant","I race"],["spectator","👀 Spectator","I watch"]].map(([role, label, sub]) => (
                          <button key={role} onClick={() => setAuthRole(role)}
                            style={{ flex: 1, padding: "10px 8px", background: authRole === role ? "rgba(0,174,239,0.12)" : "transparent", border: `2px solid ${authRole === role ? "#00aeef" : "rgba(0,174,239,0.2)"}`, borderRadius: 8, color: authRole === role ? "#00aeef" : "#5a86a8", cursor: "pointer", textAlign: "center" }}>
                            <div style={{ fontSize: 16, marginBottom: 2 }}>{label.split(" ")[0]}</div>
                            <div style={{ fontSize: 12, fontWeight: 700 }}>{label.split(" ")[1]}</div>
                            <div style={{ fontSize: 10, color: "#3a6080", marginTop: 2 }}>{sub}</div>
                          </button>
                        ))}
                      </div>
                    </div>
                  </>)}
                  <input type="email" value={authEmail} onChange={e => setAuthEmail(e.target.value)} placeholder="Email address"
                    onKeyDown={e => e.key === "Enter" && (authMode === "login" ? authSignIn() : authSignUp())}
                    style={{ background: "#071829", border: "1px solid rgba(0,174,239,0.3)", borderRadius: 6, padding: "12px 14px", color: "#e8f4fb", fontSize: 14, outline: "none", width: "100%" }} />
                  <input type="password" value={authPassword} onChange={e => setAuthPassword(e.target.value)} placeholder="Password"
                    onKeyDown={e => e.key === "Enter" && (authMode === "login" ? authSignIn() : authSignUp())}
                    style={{ background: "#071829", border: "1px solid rgba(0,174,239,0.3)", borderRadius: 6, padding: "12px 14px", color: "#e8f4fb", fontSize: 14, outline: "none", width: "100%" }} />

                  {authError && (
                    <div style={{ fontSize: 12, color: authError.includes("sent") ? "#4ade80" : "#f87171", background: authError.includes("sent") ? "rgba(74,222,128,0.08)" : "rgba(248,113,113,0.08)", border: `1px solid ${authError.includes("sent") ? "rgba(74,222,128,0.2)" : "rgba(248,113,113,0.2)"}`, borderRadius: 6, padding: "8px 12px" }}>
                      {authError}
                    </div>
                  )}

                  <button onClick={authMode === "login" ? authSignIn : authSignUp} disabled={authWorking}
                    style={{ background: "#00aeef", border: "none", borderRadius: 6, padding: "13px", fontSize: 14, fontWeight: 700, color: "#071829", cursor: authWorking ? "default" : "pointer", opacity: authWorking ? 0.7 : 1, letterSpacing: 1 }}>
                    {authWorking ? "Please wait…" : authMode === "login" ? "Sign In" : "Create Account"}
                  </button>

                  {authMode === "login" && (
                    <button onClick={authResetPassword} style={{ background: "none", border: "none", color: "#5a86a8", fontSize: 12, cursor: "pointer", textAlign: "center", padding: "4px" }}>
                      Forgot password?
                    </button>
                  )}
                </div>
              </div>
            </div>
          </div>
        );

        // Spectator view
        const isSpectator = userProfile?.role === "spectator";
        if (isSpectator) {
          const liveSegs = liveRace ? (liveRace.segments || SEGMENTS) : SEGMENTS;
          const liveSegColors = ["#00aeef", "#48cae4", "#ffd166", "#48cae4", "#f4742b"];

          // Build ranked list: finished (by chip time asc) → in-progress (by elapsed desc) → not started
          const rankedAthletes = liveRace ? (() => {
            const clock = liveRace.clockMs || 0;
            return (liveRace.athletes || []).map(ath => {
              const chipMs = ath.started && ath.startOffset !== null ? clock - ath.startOffset : null;
              const finishMs = ath.finished && ath.startOffset !== null && ath.splits
                ? ath.splits[ath.splits.length - 1] - ath.startOffset : null;
              let curSeg = null;
              if (ath.started && !ath.finished && ath.splits) {
                for (let i = 0; i < ath.splits.length; i++) {
                  if (ath.splits[i] === null) { curSeg = i; break; }
                }
              }
              return { ...ath, chipMs, finishMs, curSeg };
            }).sort((a, b) => {
              if (a.finished && b.finished) return a.finishMs - b.finishMs;
              if (a.finished) return -1;
              if (b.finished) return 1;
              if (a.started && b.started) return b.chipMs - a.chipMs;
              if (a.started) return -1;
              if (b.started) return 1;
              return 0;
            });
          })() : [];

          const medals = ["🥇", "🥈", "🥉"];
          const finishedCount = rankedAthletes.filter(a => a.finished).length;
          const onCourseCount = rankedAthletes.filter(a => a.started && !a.finished).length;

          return (
            <div style={{ minHeight: "100vh", background: "#071829", fontFamily: "'DM Sans', Arial, sans-serif", color: "#e8f4fb" }}>
              <div style={{ background: "linear-gradient(135deg,#071829,#0d3a6e)", borderBottom: "3px solid #00aeef", padding: "16px 20px 14px", textAlign: "center", position: "relative" }}>
                <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 32, letterSpacing: 4, color: "#f0f6ff" }}><span style={{ color: "#00aeef" }}>Time</span>athon</div>
                <div style={{ fontSize: 11, letterSpacing: 2, color: "#5a86a8", marginTop: 2 }}>SPECTATOR</div>
                <button onClick={authSignOut} style={{ position: "absolute", right: 14, top: "50%", transform: "translateY(-50%)", background: "none", border: "1px solid rgba(90,134,168,0.3)", borderRadius: 4, color: "#5a86a8", fontSize: 11, cursor: "pointer", padding: "4px 8px" }}>
                  {userProfile?.firstName} &#8594;
                </button>
              </div>

              <div style={{ maxWidth: 520, margin: "0 auto", padding: "20px 16px 40px" }}>
                {!liveRace ? (
                  <div>
                    <div style={{ textAlign: "center", marginBottom: 28 }}>
                      <div style={{ fontSize: 44, marginBottom: 10 }}>👀</div>
                      <div style={{ fontFamily: "'Bebas Neue'", fontSize: 28, letterSpacing: 3, color: "#e8f4fb" }}>Watch a Race</div>
                      <div style={{ fontSize: 13, color: "#5a86a8", marginTop: 4 }}>Enter the code from your race organizer</div>
                    </div>
                    <input value={spectatorCode} onChange={e => setSpectatorCode(e.target.value.toUpperCase())}
                      onKeyDown={e => e.key === "Enter" && watchRace(spectatorCode)}
                      placeholder="RACE CODE" maxLength={6}
                      style={{ width: "100%", boxSizing: "border-box", background: "#0c2240", border: "2px solid rgba(0,174,239,0.3)", borderRadius: 8, padding: "16px", marginBottom: 12, color: "#00aeef", fontSize: 28, fontFamily: "'Bebas Neue'", letterSpacing: 8, outline: "none", textAlign: "center", display: "block" }} />
                    <button onClick={() => watchRace(spectatorCode)} disabled={liveRaceLoading}
                      style={{ width: "100%", background: "#00aeef", border: "none", borderRadius: 8, padding: "15px", fontSize: 15, fontWeight: 700, color: "#071829", cursor: "pointer", letterSpacing: 1 }}>
                      {liveRaceLoading ? "Connecting…" : "Watch Race"}
                    </button>
                    {liveRaceError && <div style={{ marginTop: 12, fontSize: 13, color: "#f87171", textAlign: "center" }}>{liveRaceError}</div>}
                  </div>
                ) : (
                  <div>
                    {/* Race header row */}
                    <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: 14 }}>
                      <div>
                        <div style={{ fontFamily: "'Bebas Neue'", fontSize: 22, letterSpacing: 3, color: "#e8f4fb", lineHeight: 1 }}>{liveRace.publisherName}'s Race</div>
                        <div style={{ fontSize: 10, color: "#5a86a8", letterSpacing: 1, marginTop: 3 }}>
                          CODE: {liveRace.code}&nbsp;&nbsp;·&nbsp;&nbsp;{finishedCount} finished&nbsp;&nbsp;·&nbsp;&nbsp;{onCourseCount} on course
                        </div>
                      </div>
                      <button onClick={() => { if (liveRaceUnsubRef.current) liveRaceUnsubRef.current(); setLiveRace(null); setSpectatorCode(""); }}
                        style={{ background: "none", border: "1px solid rgba(90,134,168,0.3)", borderRadius: 4, color: "#5a86a8", fontSize: 11, cursor: "pointer", padding: "5px 10px", flexShrink: 0 }}>Leave</button>
                    </div>

                    {/* Live clock */}
                    <div style={{ background: "linear-gradient(135deg,#0c2240,#0d3a6e)", borderRadius: 10, padding: "12px 20px", marginBottom: 18, textAlign: "center", border: "1px solid rgba(0,174,239,0.25)" }}>
                      <div style={{ fontSize: 10, letterSpacing: 3, color: "#5a86a8", marginBottom: 2 }}>RACE CLOCK</div>
                      <div style={{ fontFamily: "'Bebas Neue'", fontSize: 56, letterSpacing: 4, color: "#00aeef", lineHeight: 1 }}>{formatTime(liveRace.clockMs || 0)}</div>
                    </div>

                    {/* Leaderboard label */}
                    <div style={{ fontSize: 10, letterSpacing: 3, color: "#5a86a8", textAlign: "center", marginBottom: 12 }}>LEADERBOARD</div>

                    {rankedAthletes.length === 0 && (
                      <div style={{ textAlign: "center", color: "#3a6080", padding: "40px 0" }}>Waiting for athletes…</div>
                    )}

                    {rankedAthletes.map((ath, idx) => {
                      const place = idx + 1;
                      const medal = medals[idx] || null;
                      const curSeg = ath.curSeg;

                      const splitDurs = (ath.splits || []).map((s, si) => {
                        if (s === null || s === undefined) return null;
                        const prev = si === 0 ? ath.startOffset : ath.splits[si - 1];
                        return (prev !== null && prev !== undefined) ? s - prev : null;
                      });

                      const borderColor = ath.finished ? "rgba(74,222,128,0.4)" : ath.started ? "rgba(0,174,239,0.3)" : "rgba(255,255,255,0.07)";
                      const topAccent = ath.finished ? "#4ade80" : ath.started ? "#00aeef" : "transparent";

                      return (
                        <div key={ath.id} style={{ background: "#0c2240", borderRadius: 10, marginBottom: 10, border: `1px solid ${borderColor}`, borderTop: `3px solid ${topAccent}`, overflow: "hidden" }}>
                          <div style={{ padding: "12px 14px" }}>
                            {/* Top row: place + name + status/time */}
                            <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                              {/* Placement */}
                              <div style={{ minWidth: 40, textAlign: "center", flexShrink: 0 }}>
                                {medal && ath.finished ? (
                                  <div style={{ fontSize: 28, lineHeight: 1 }}>{medal}</div>
                                ) : (
                                  <div style={{ fontFamily: "'Bebas Neue'", fontSize: 30, color: ath.finished ? "#4ade80" : ath.started ? "#00aeef" : "#2a4060", lineHeight: 1 }}>{place}</div>
                                )}
                              </div>

                              {/* Name + meta */}
                              <div style={{ flex: 1, minWidth: 0 }}>
                                <div style={{ fontWeight: 700, fontSize: 15, color: "#e8f4fb", whiteSpace: "nowrap", overflow: "hidden", textOverflow: "ellipsis" }}>{ath.name}</div>
                                <div style={{ fontSize: 11, color: "#5a86a8", marginTop: 1 }}>{ath.ageGroup}{ath.ageGroup && ath.gender ? " · " : ""}{ath.gender}</div>
                              </div>

                              {/* Status + time */}
                              <div style={{ textAlign: "right", flexShrink: 0 }}>
                                {ath.finished ? (
                                  <div>
                                    <div style={{ fontSize: 9, fontWeight: 700, color: "#4ade80", letterSpacing: 1 }}>FINISHED</div>
                                    <div style={{ fontFamily: "'Bebas Neue'", fontSize: 24, color: "#4ade80", letterSpacing: 2, lineHeight: 1.2 }}>{formatElapsed(ath.finishMs)}</div>
                                  </div>
                                ) : ath.started ? (
                                  <div>
                                    <div style={{ fontSize: 9, fontWeight: 700, letterSpacing: 1, color: curSeg !== null ? liveSegColors[curSeg % liveSegColors.length] : "#00aeef", background: curSeg !== null ? `${liveSegColors[curSeg % liveSegColors.length]}18` : "transparent", borderRadius: 3, padding: "1px 6px", display: "inline-block", marginBottom: 2 }}>
                                      {curSeg !== null ? liveSegs[curSeg] : "RACING"}
                                    </div>
                                    <div style={{ fontFamily: "'Bebas Neue'", fontSize: 24, color: "#00aeef", letterSpacing: 2, lineHeight: 1 }}>{formatElapsed(ath.chipMs)}</div>
                                  </div>
                                ) : (
                                  <div style={{ fontSize: 11, color: "#3a6080" }}>Waiting…</div>
                                )}
                              </div>
                            </div>

                            {/* Splits row */}
                            {ath.started && (
                              <div style={{ display: "flex", gap: 4, marginTop: 10 }}>
                                {liveSegs.map((seg, si) => {
                                  const done = splitDurs[si] !== null;
                                  const isCurrent = curSeg === si;
                                  const col = liveSegColors[si % liveSegColors.length];
                                  return (
                                    <div key={seg} style={{ flex: "1 1 0", background: done ? `${col}15` : isCurrent ? "rgba(0,174,239,0.06)" : "rgba(255,255,255,0.03)", border: `1px solid ${done ? col + "50" : isCurrent ? "rgba(0,174,239,0.2)" : "rgba(255,255,255,0.06)"}`, borderRadius: 5, padding: "4px 4px 5px", textAlign: "center", minWidth: 0 }}>
                                      <div style={{ fontSize: 8, color: done ? col : isCurrent ? "#4a9abf" : "#2a4060", letterSpacing: 0.5, fontWeight: 700, marginBottom: 2 }}>{seg}</div>
                                      <div style={{ fontSize: 11, color: done ? "#e8f4fb" : isCurrent ? "#4a7a9b" : "#1a3050", fontFamily: done ? "'Bebas Neue'" : "inherit", letterSpacing: done ? 1 : 0 }}>
                                        {done ? formatElapsed(splitDurs[si]) : isCurrent ? "···" : "—"}
                                      </div>
                                    </div>
                                  );
                                })}
                              </div>
                            )}
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            </div>
          );
        }

        return (
          <div style={{ minHeight: "100vh", background: "#071829", fontFamily: "'DM Sans', Arial, sans-serif", color: "#e8f4fb" }}>

            {/* HEADER */}
            <div style={{ background: "linear-gradient(135deg,#071829,#0d3a6e)", borderBottom: "3px solid #00aeef", padding: "16px 20px 14px", textAlign: "center", position: "relative" }}>
              {view !== "home" && (
                <button onClick={() => setView("home")} style={{ position: "absolute", left: 14, top: "50%", transform: "translateY(-50%)", background: "none", border: "none", color: "#5a86a8", fontSize: 20, cursor: "pointer", padding: "4px 8px", lineHeight: 1 }}>&#8592;</button>
              )}
              <div onClick={() => setView("home")} style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 32, letterSpacing: 4, color: "#f0f6ff", cursor: "pointer" }}>
                <span style={{ color: "#00aeef" }}>Time</span>athon
              </div>
              <div style={{ fontSize: 11, letterSpacing: 3, textTransform: "uppercase", color: "#5a86a8", marginTop: 4 }}>
                Swim &nbsp;&middot;&nbsp; Bike &nbsp;&middot;&nbsp; Run
              </div>
              <button onClick={() => setView("profile")} title="Profile" style={{ position: "absolute", right: 14, top: "50%", transform: "translateY(-50%)", background: "none", border: "1px solid rgba(90,134,168,0.3)", borderRadius: 4, color: "#5a86a8", fontSize: 11, cursor: "pointer", padding: "4px 8px", letterSpacing: 1 }}>
                &#128100; {currentUser?.displayName ? currentUser.displayName.split(" ")[0] : currentUser?.email?.split("@")[0]}
              </button>
            </div>

            {/* NAV — only during race flow */}
            {["setup", "race", "results"].includes(view) && (
              <div style={{ display: "flex", borderBottom: "1px solid rgba(255,255,255,0.08)", background: "#0c2240" }}>
                {["setup", "race", "results"].map(v => (
                  <button key={v} onClick={() => setView(v)} style={{
                    flex: 1, padding: "12px 0", background: "none", border: "none",
                    borderBottom: view === v ? "3px solid #00aeef" : "3px solid transparent",
                    color: view === v ? "#00aeef" : "#5a86a8",
                    fontFamily: "'Bebas Neue', sans-serif", fontSize: 16, letterSpacing: 3,
                    textTransform: "uppercase", cursor: "pointer",
                  }}>
                    {v === "setup" ? "Setup" : v === "race" ? "Race" : "Results"}
                  </button>
                ))}
              </div>
            )}

            <div style={{ maxWidth: 640, margin: "0 auto", padding: "16px 16px 60px" }}>

              {/* STOPWATCH — race flow only */}
              {["setup", "race", "results"].includes(view) && <div style={{ background: "#0c2240", borderRadius: 8, border: "1px solid rgba(0,174,239,0.3)", padding: "14px 20px", marginBottom: 16, textAlign: "center", position: "sticky", top: 0, zIndex: 100, boxShadow: "0 6px 24px rgba(0,0,0,0.6)" }}>
                <div style={{ fontFamily: "'Bebas Neue', sans-serif", fontSize: 56, letterSpacing: 4, color: clockRunning ? "#00aeef" : clockStarted ? "#ffd166" : "#3a6080", lineHeight: 1 }}>
                  {formatTime(clockMs)}
                </div>
                <div style={{ display: "flex", gap: 10, justifyContent: "center", marginTop: 12, flexWrap: "wrap" }}>
                  {!clockStarted
                    ? <button onClick={startClock} style={btnStyle("#00aeef")}>Start Clock</button>
                    : clockRunning
                      ? <button onClick={pauseClock} style={btnStyle("#ffd166")}>Pause</button>
